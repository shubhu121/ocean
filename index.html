        function getSpotDifficultyColor(diff) {
            if (diff.includes('Expert')) return '#ff4757';
            if (diff.includes('Advanced')) return '#ff6b9d';
            if (diff.includes('Intermediate')) return '#ffa502';
            if (diff.includes('Beginner')) return '#2ed573';
            return '#ccc';
        }

        function getSpotBreakIcon(breakType) {
            if (breakType.includes('Reef')) return '🪸';
            if (breakType.includes('Point')) return '🏔';
            if (breakType.includes('Shore')) return '💥';
            if (breakType.includes('Beach')) return '🏖';
            if (breakType.includes('Jetty')) return '⚓';
            if (breakType.includes('Pier')) return '🌉';
            return '🌊';
        }

        function getSpotLinks(spot) {
            const links = [];
            if (spot.surflineId) {
                links.push({ label: 'Surfline', url: `https://www.surfline.com/surf-report/${spot.surflineId}`, color: '#00b4d8' });
            }
            const msLat = spot.lat.toFixed(4);
            const msLon = spot.lon.toFixed(4);
            links.push({ label: 'Magic Seaweed', url: `https://magicseaweed.com/search?q=${encodeURIComponent(spot.name)}`, color: '#2ed573' });
            links.push({ label: 'Windguru', url: `https://www.windguru.cz/station/${Math.round(spot.lat * 100)}`, color: '#ffa502' });
            links.push({ label: 'Windy', url: `https://www.windy.com/${spot.lat}/${spot.lon}?waves`, color: '#ff6b9d' });
            return links;
        }

        // ─── Surf Spot Search ───────────────────────────────────────────────────────
        function getRegionIcon(region) {
            if (region.includes('California')) return '🌊';
            if (region.includes('Hawaii')) return '🌺';
            if (region.includes('Florida')) return '🌴';
            if (region.includes('Carolina') || region.includes('Virginia')) return '🏖';
            if (region.includes('New York') || region.includes('Jersey')) return '🗽';
            if (region.includes('New England') || region.includes('Rhode') || region.includes('Mass') || region.includes('Connect')) return '🦞';
            if (region.includes('Oregon') || region.includes('Washington')) return '🌲';
            if (region.includes('Texas') || region.includes('Gulf')) return '⛵';
            if (region.includes('Puerto') || region.includes('Caribbean')) return '🍹';
            if (region.includes('Alaska')) return '🏔';
            return '📍';
        }

        let expandedSpotIdx = null;
        let currentSurfSpot = null; // Track the currently selected surf spot object

        // Update the surf overlay header, station info, and conditions cards in-place
        // without rebuilding the entire DOM (preserves scroll, expanded spots, search state)
        function updateSurfHeaderInfo() {
            const info = STATION_DB[currentStationId];
            const stationName = info ? info[2] : currentStationId;
            const lat = info ? info[0] : 0;
            const lon = info ? info[1] : 0;
            const latStr = Math.abs(lat).toFixed(4) + '°' + (lat >= 0 ? 'N' : 'S');
            const lonStr = Math.abs(lon).toFixed(4) + '°' + (lon < 0 ? 'W' : 'E');
            const nd = ndbcState.lastGood;

            // Update header station name & coords
            const nameEl = document.querySelector('.surf-station-name');
            const coordsEl = document.querySelector('.surf-station-coords');
            if (nameEl) {
                if (currentSurfSpot) {
                    nameEl.textContent = currentSurfSpot.name + ' Surf Report';
                } else {
                    nameEl.textContent = stationName + ' Surf Report';
                }
            }
            if (coordsEl) {
                if (currentSurfSpot) {
                    const sLatStr = Math.abs(currentSurfSpot.lat).toFixed(4) + '°' + (currentSurfSpot.lat >= 0 ? 'N' : 'S');
                    const sLonStr = Math.abs(currentSurfSpot.lon).toFixed(4) + '°' + (currentSurfSpot.lon < 0 ? 'W' : 'E');
                    coordsEl.textContent = '📍 ' + sLatStr + ', ' + sLonStr + '  ·  Buoy ' + currentStationId;
                } else {
                    coordsEl.textContent = '📍 ' + latStr + ', ' + lonStr;
                }
            }

            // Update condition cards with current NDBC data
            const condGrid = document.getElementById('surf-conditions-grid');
            if (condGrid) {
                const cards = condGrid.querySelectorAll('.surf-cond-card');
                // Waves card (index 0)
                if (cards[0]) {
                    cards[0].querySelector('.surf-cond-value').textContent = nd ? fmtWaveHeightShort(nd.waveHeight) : '—';
                    cards[0].querySelector('.surf-cond-detail').textContent = nd && nd.waveDir !== null ? '↗ ' + nd.waveDir.toFixed(0) + '° at ' + (nd.wavePeriod || '—') + 's' : '—';
                }
                // Swell (index 1) — leave as Loading, fetchSurfData will update
                if (cards[1]) {
                    cards[1].querySelector('.surf-cond-value').textContent = '—';
                    cards[1].querySelector('.surf-cond-detail').textContent = 'Loading…';
                }
                // Wind waves (index 2) — leave as Loading
                if (cards[2]) {
                    cards[2].querySelector('.surf-cond-value').textContent = '—';
                    cards[2].querySelector('.surf-cond-detail').textContent = 'Loading…';
                }
                // Winds (index 3)
                if (cards[3]) {
                    cards[3].querySelector('.surf-cond-value').textContent = nd ? fmtWindSpeedShort(nd.windSpeed, nd.windSpeedEstimated) : '—';
                    cards[3].querySelector('.surf-cond-detail').textContent = nd && nd.windDir !== null ? windDirToCompass(nd.windDir) + ' ' + nd.windDir.toFixed(0) + '°' : '—';
                }
                // Currents (index 4)
                if (cards[4]) {
                    cards[4].querySelector('.surf-cond-value').textContent = nd && nd.windSpeed ? (nd.windSpeed * 0.03).toFixed(1) + ' ft/s' : '—';
                    cards[4].querySelector('.surf-cond-detail').textContent = nd && nd.waveDir !== null ? '↗ ' + ((nd.waveDir + 180) % 360).toFixed(0) + '°' : '—';
                }
                // Tides (index 5) — leave, updateSurfUI will handle
                if (cards[5]) {
                    cards[5].querySelector('.surf-cond-value').textContent = '—';
                    cards[5].querySelector('.surf-cond-detail').textContent = 'Loading…';
                }
            }

            // Reset weather card too
            const tempEl = document.getElementById('surf-temp');
            if (tempEl) tempEl.textContent = nd ? fmtTemp(nd.airTemp) : '—';
            const sunsetEl = document.getElementById('surf-sunset');
            if (sunsetEl) sunsetEl.textContent = '—';
            const daylightEl = document.getElementById('surf-daylight');
            if (daylightEl) daylightEl.textContent = '—';
            const forecastEl = document.getElementById('surf-forecast');
            if (forecastEl) forecastEl.textContent = 'Loading forecast data…';
        }

        function initSurfSpotSearch() {
            const input = document.getElementById('surf-spot-search');
            const resultsEl = document.getElementById('surf-spot-results');
            const countEl = document.getElementById('surf-spot-count');
            const tabBtns = document.querySelectorAll('.surf-spot-tab-btn');
            if (!input || !resultsEl) return;

            let activeTab = 'spots'; // 'spots' or 'buoys'

            // Tab switching
            tabBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    tabBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    activeTab = btn.dataset.tab;
                    expandedSpotIdx = null;
                    renderList(input.value);
                });
            });

            function renderList(query) {
                if (activeTab === 'buoys') return renderBuoys(query);
                return renderSpots(query);
            }

            function renderSpots(query) {
                const q = (query || '').trim().toLowerCase();
                let spots = [];

                if (!q) {
                    // Show all spots grouped by region
                    for (const [region, regionSpots] of Object.entries(SURF_SPOT_REGIONS)) {
                        regionSpots.forEach(s => spots.push({ ...s, _region: region }));
                    }
                } else {
                    SURF_SPOTS_DB.forEach(s => {
                        const searchStr = `${s.name} ${s.region} ${s.breakType} ${s.difficulty} ${s.description}`.toLowerCase();
                        if (searchStr.includes(q)) {
                            let score = 0;
                            if (s.name.toLowerCase() === q) score = 100;
                            else if (s.name.toLowerCase().startsWith(q)) score = 80;
                            else if (s.name.toLowerCase().includes(q)) score = 60;
                            else if (s.region.toLowerCase().includes(q)) score = 40;
                            else if (s.breakType.toLowerCase().includes(q)) score = 30;
                            else score = 10;
                            spots.push({ ...s, _region: s.region, score });
                        }
                    });
                    spots.sort((a, b) => (b.score || 0) - (a.score || 0));
                }

                if (spots.length === 0) {
                    resultsEl.innerHTML = '<div class="surf-spot-empty">No surf spots found — try a different search</div>';
                    countEl.textContent = '';
                    return;
                }

                let html = '';
                let lastRegion = '';
                const maxShow = q ? spots.length : 200;

                for (let i = 0; i < Math.min(spots.length, maxShow); i++) {
                    const s = spots[i];
                    const spotIdx = SURF_SPOTS_DB.indexOf(SURF_SPOTS_DB.find(x => x.name === s.name));
                    if (!q && s._region !== lastRegion) {
                        lastRegion = s._region;
                        html += `<div class="surf-spot-region-header">${getRegionIcon(s._region)} ${s._region}</div>`;
                    }
                    const icon = getSpotBreakIcon(s.breakType);
                    const diffColor = getSpotDifficultyColor(s.difficulty);
                    const isExpanded = expandedSpotIdx === spotIdx;
                    const isActive = currentSurfSpot && currentSurfSpot.name === s.name;
                    html += `<div class="surf-spot-item${isExpanded ? ' expanded' : ''}${isActive ? ' active-spot' : ''}" data-spotidx="${spotIdx}">
        <div class="surf-spot-item-icon">${icon}</div>
        <div class="surf-spot-item-info">
          <div class="surf-spot-item-name">${highlightSpotMatch(s.name, q)}</div>
          <div class="surf-spot-item-meta">
            <span style="color:${diffColor}">${s.difficulty}</span>
            <span>${s.breakType}</span>
          </div>
        </div>
        <span class="surf-spot-item-badge" style="color:${diffColor}">${s.breakType.split('/')[0]}</span>
      </div>`;
                    if (isExpanded) {
                        const links = getSpotLinks(s);
                        html += `<div class="surf-spot-detail-panel">
          <div class="surf-spot-detail-desc">${s.description}</div>
          <div class="surf-spot-detail-grid">
            <div class="surf-spot-detail-cell">
              <div class="surf-spot-detail-label">Best Swell</div>
              <div class="surf-spot-detail-value">${s.bestSwell}</div>
            </div>
            <div class="surf-spot-detail-cell">
              <div class="surf-spot-detail-label">Best Tide</div>
              <div class="surf-spot-detail-value">${s.bestTide}</div>
            </div>
            <div class="surf-spot-detail-cell">
              <div class="surf-spot-detail-label">Best Wind</div>
              <div class="surf-spot-detail-value">${s.bestWind}</div>
            </div>

              <div class="surf-spot-detail-label">Nearest Buoy</div>
              <div class="surf-spot-detail-value buoy-link" data-buoy="${s.nearestBuoy}">${s.nearestBuoy}</div>
            </div>
          </div>
          <div class="surf-spot-links-row">
            ${links.map(l => `<a class="surf-spot-ext-link" href="${l.url}" target="_blank" rel="noopener" style="color:${l.color}">${l.label} ↗</a>`).join('')}
          </div>
        </div>`;
                    }
                }

                resultsEl.innerHTML = html;
                countEl.textContent = `${spots.length} surf spot${spots.length !== 1 ? 's' : ''}`;

                // Click handlers — expand/collapse AND switch to spot data
                resultsEl.querySelectorAll('.surf-spot-item').forEach(el => {
                    el.addEventListener('click', () => {
                        const idx = parseInt(el.dataset.spotidx, 10);
                        const wasExpanded = expandedSpotIdx === idx;
                        expandedSpotIdx = wasExpanded ? null : idx;

                        if (!wasExpanded && SURF_SPOTS_DB[idx]) {
                            const spot = SURF_SPOTS_DB[idx];
                            currentSurfSpot = spot;
                            const buoyId = spot.nearestBuoy;
                            // Switch buoy reference without triggering selectStationById
                            // (which would reset NDBC state and cause errors)
                            if (buoyId && STATION_DB[buoyId] && buoyId !== currentStationId) {
                                currentStationId = buoyId;
                                stationSelect.value = buoyId;
                                focusGlobeOnStation(buoyId);
                                const bInfo = STATION_DB[buoyId];
                                const brandEl = document.getElementById('ui-brand');
                                if (brandEl) brandEl.textContent = `OCEAN — ${bInfo ? bInfo[2] : buoyId}`;
                                if (window._updateNDBCPanelInfo) window._updateNDBCPanelInfo();
                                // Start NDBC polling for the new buoy in background
                                clearInterval(ndbcPollTimer);
                                fetchNDBCData();
                                ndbcPollTimer = setInterval(fetchNDBCData, NDBC_POLL_INTERVAL);
                                updateHash();
                            }
                            // Update header to show the spot info
                            updateSurfHeaderInfo();
                            // Re-render spots to show expanded state
                            renderSpots(input.value);
                            // Fetch fresh Open-Meteo + DWD data for the spot's coordinates
                            fetchSurfData();
                            return;
                        } else if (wasExpanded) {
                            currentSurfSpot = null;
                            updateSurfHeaderInfo();
                        }

                        renderSpots(input.value);
                    });
                });
                // Buoy link handlers — switch buoy station
                resultsEl.querySelectorAll('.buoy-link').forEach(el => {
                    el.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const buoyId = el.dataset.buoy;
                        if (buoyId && STATION_DB[buoyId]) {
                            currentSurfSpot = null;
                            if (buoyId !== currentStationId) {
                                currentStationId = buoyId;
                                stationSelect.value = buoyId;
                                focusGlobeOnStation(buoyId);
                                const bInfo = STATION_DB[buoyId];
                                const brandEl = document.getElementById('ui-brand');
                                if (brandEl) brandEl.textContent = `OCEAN — ${bInfo ? bInfo[2] : buoyId}`;
                                if (window._updateNDBCPanelInfo) window._updateNDBCPanelInfo();
                                clearInterval(ndbcPollTimer);
                                fetchNDBCData();
                                ndbcPollTimer = setInterval(fetchNDBCData, NDBC_POLL_INTERVAL);
                                updateHash();
                            }
                            updateSurfHeaderInfo();
                            renderSpots(input.value);
                            fetchSurfData();
                        }
                    });
                });
            }

            function renderBuoys(query) {
                const q = (query || '').trim().toLowerCase();
                let spots = [];

                if (!q) {
                    for (const [region, ids] of Object.entries(STATION_REGIONS)) {
                        for (const id of ids) {
                            const info = STATION_DB[id];
                            if (info) spots.push({ id, name: info[2], region, lat: info[0], lon: info[1] });
                        }
                    }
                } else {
                    for (const [id, info] of Object.entries(STATION_DB)) {
                        const name = info[2];
                        const region = stationToRegion[id] || '';
                        const searchStr = `${id} ${name} ${region}`.toLowerCase();
                        if (searchStr.includes(q)) {
                            let score = 0;
                            if (id.toLowerCase() === q) score = 100;
                            else if (id.toLowerCase().startsWith(q)) score = 80;
                            else if (name.toLowerCase().startsWith(q)) score = 60;
                            else if (name.toLowerCase().includes(q)) score = 40;
                            else if (region.toLowerCase().includes(q)) score = 20;
                            spots.push({ id, name, region, lat: info[0], lon: info[1], score });
                        }
                    }
                    spots.sort((a, b) => (b.score || 0) - (a.score || 0));
                }

                if (spots.length === 0) {
                    resultsEl.innerHTML = '<div class="surf-spot-empty">No buoys found — try a different search</div>';
                    countEl.textContent = '';
                    return;
                }

                let html = '';
                let lastRegion = '';
                const maxShow = q ? spots.length : 100;

                for (let i = 0; i < Math.min(spots.length, maxShow); i++) {
                    const s = spots[i];
                    if (!q && s.region !== lastRegion) {
                        lastRegion = s.region;
                        html += `<div class="surf-spot-region-header">📡 ${s.region}</div>`;
                    }
                    const isActive = s.id === currentStationId;
                    const latStr = Math.abs(s.lat).toFixed(2) + '°' + (s.lat >= 0 ? 'N' : 'S');
                    const lonStr = Math.abs(s.lon).toFixed(2) + '°' + (s.lon < 0 ? 'W' : 'E');
                    html += `<div class="surf-spot-item${isActive ? ' active-spot' : ''}" data-sid="${s.id}">
        <div class="surf-spot-item-icon">📡</div>
        <div class="surf-spot-item-info">
          <div class="surf-spot-item-name">${highlightSpotMatch(s.name, q)}</div>
          <div class="surf-spot-item-meta">
            <span>${latStr}, ${lonStr}</span>
            <span>${s.region}</span>
          </div>
        </div>
        <span class="surf-spot-item-id">${s.id}</span>
      </div>`;
                }

                resultsEl.innerHTML = html;
                countEl.textContent = `${spots.length} buoy${spots.length !== 1 ? 's' : ''} available`;

                resultsEl.querySelectorAll('.surf-spot-item').forEach(el => {
                    el.addEventListener('click', () => {
                        const sid = el.dataset.sid;
                        if (sid) {
                            currentSurfSpot = null;
                            expandedSpotIdx = null;
                            if (sid !== currentStationId) {
                                currentStationId = sid;
                                stationSelect.value = sid;
                                focusGlobeOnStation(sid);
                                const bInfo = STATION_DB[sid];
                                const brandEl = document.getElementById('ui-brand');
                                if (brandEl) brandEl.textContent = `OCEAN — ${bInfo ? bInfo[2] : sid}`;
                                if (window._updateNDBCPanelInfo) window._updateNDBCPanelInfo();
                                clearInterval(ndbcPollTimer);
                                fetchNDBCData();
                                ndbcPollTimer = setInterval(fetchNDBCData, NDBC_POLL_INTERVAL);
                                updateHash();
                            }
                            updateSurfHeaderInfo();
                            renderBuoys(input.value);
                            fetchSurfData();
                        }
                    });
                });
            }

            function highlightSpotMatch(text, query) {
                if (!query) return text;
                const idx = text.toLowerCase().indexOf(query.toLowerCase());
                if (idx === -1) return text;
                return text.slice(0, idx) + '<span style="color:#00d4b4;font-weight:600;">' + text.slice(idx, idx + query.length) + '</span>' + text.slice(idx + query.length);
            }

            // Show initial list
            renderList('');

            input.addEventListener('input', () => { expandedSpotIdx = null; renderList(input.value); });
            input.addEventListener('focus', () => {
                if (!input.value) renderList('');
            });
        }



        // ─── Surf Charts Drawing ────────────────────────────────────────────────────
        function drawSurfCharts(omWeather, omMarine, dwdIcon) {
            drawWaveChart(omMarine);
            drawPeriodChart(omMarine);
            drawTideChart();
            drawWindChart(omWeather, dwdIcon);
            drawTempChart(omWeather, dwdIcon);
            drawPrecipChart(omWeather, dwdIcon);
        }

        function setupChartCanvas(id) {
            const canvas = document.getElementById(id);
            if (!canvas) return null;
            const rect = canvas.parentElement.getBoundingClientRect();
            const dpr = Math.min(devicePixelRatio, 2);
            canvas.width = (rect.width - 28) * dpr;
            canvas.height = 150 * dpr;
            const ctx = canvas.getContext('2d');
            ctx.scale(dpr, dpr);
            const w = rect.width - 28;
            const h = 150;
            return { ctx, w, h };
        }

        function drawChartLine(ctx, data, w, h, color, yMin, yMax, padL = 35, padR = 10, padT = 10, padB = 25) {
            if (!data || data.length === 0) return;
            const plotW = w - padL - padR;
            const plotH = h - padT - padB;

            ctx.strokeStyle = color;
            ctx.lineWidth = 1.5;
            ctx.lineJoin = 'round';
            ctx.beginPath();
            let started = false;
            for (let i = 0; i < data.length; i++) {
                if (data[i] === null || data[i] === undefined) { started = false; continue; }
                const x = padL + (i / (data.length - 1)) * plotW;
                const y = padT + plotH - ((data[i] - yMin) / (yMax - yMin)) * plotH;
                if (!started) { ctx.moveTo(x, y); started = true; }
                else ctx.lineTo(x, y);
            }
            ctx.stroke();

            // Fill area under
            ctx.globalAlpha = 0.08;
            ctx.lineTo(padL + plotW, padT + plotH);
            ctx.lineTo(padL, padT + plotH);
            ctx.closePath();
            ctx.fillStyle = color;
            ctx.fill();
            ctx.globalAlpha = 1;
        }

        function drawChartGrid(ctx, w, h, yMin, yMax, steps, timeLabels, padL = 35, padR = 10, padT = 10, padB = 25) {
            const plotW = w - padL - padR;
            const plotH = h - padT - padB;

            ctx.strokeStyle = 'rgba(255,255,255,0.06)';
            ctx.lineWidth = 0.5;
            ctx.font = '9px Inter, sans-serif';
            ctx.fillStyle = 'rgba(255,255,255,0.3)';

            // Y axis
            for (let i = 0; i <= steps; i++) {
                const val = yMin + (yMax - yMin) * (i / steps);
                const y = padT + plotH - (i / steps) * plotH;
                ctx.beginPath();
                ctx.moveTo(padL, y);
                ctx.lineTo(padL + plotW, y);
                ctx.stroke();
                ctx.fillText(val.toFixed(val >= 100 ? 0 : 1), 2, y + 3);
            }

            // X axis time labels
            if (timeLabels) {
                ctx.fillStyle = 'rgba(255,255,255,0.25)';
                for (let i = 0; i < timeLabels.length; i++) {
                    const x = padL + (timeLabels[i].idx / (timeLabels[i].total - 1)) * plotW;
                    ctx.fillText(timeLabels[i].label, x - 8, h - 4);
                }
            }

            // Now marker
            ctx.strokeStyle = 'rgba(250,204,21,0.5)';
            ctx.lineWidth = 1;
            ctx.setLineDash([3, 3]);
            const nowIdx = new Date().getHours();
            const nowX = padL + (nowIdx / 47) * plotW; // 48 hours
            ctx.beginPath();
            ctx.moveTo(nowX, padT);
            ctx.lineTo(nowX, padT + plotH);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = 'rgba(250,204,21,0.7)';
            ctx.font = 'bold 8px Inter, sans-serif';
            ctx.fillText('Now', nowX - 8, padT - 2);
        }

        function makeTimeLabels(count) {
            const labels = [];
            for (let i = 0; i < count; i += 6) {
                const h = i % 24;
                labels.push({ idx: i, total: count, label: h === 0 ? '0' : h < 10 ? `0${h}:00` : `${h}:00` });
            }
            return labels;
        }

        function drawWaveChart(marine) {
            const c = setupChartCanvas('chart-waves');
            if (!c) return;
            const { ctx, w, h } = c;

            const hCount = 48;
            let waveH = [], swellH = [], windWH = [];
            if (marine && marine.hourly) {
                waveH = (marine.hourly.wave_height || []).slice(0, hCount).map(v => v !== null ? mToFt(v) : null);
                swellH = (marine.hourly.swell_wave_height || []).slice(0, hCount).map(v => v !== null ? mToFt(v) : null);
                windWH = (marine.hourly.wind_wave_height || []).slice(0, hCount).map(v => v !== null ? mToFt(v) : null);
            } else {
                for (let i = 0; i < hCount; i++) {
                    waveH.push(2 + Math.sin(i * 0.3) * 1.5 + Math.random() * 0.3);
                    swellH.push(1.5 + Math.sin(i * 0.25 + 1) * 1.0);
                    windWH.push(0.5 + Math.sin(i * 0.4 + 2) * 0.3);
                }
            }

            const allVals = [...waveH, ...swellH, ...windWH].filter(v => v !== null);
            const yMax = Math.ceil(Math.max(...allVals, 1) * 1.2);

            drawChartGrid(ctx, w, h, 0, yMax, 4, makeTimeLabels(hCount));
            drawChartLine(ctx, windWH, w, h, '#888888', 0, yMax);
            drawChartLine(ctx, swellH, w, h, '#00d4b4', 0, yMax);
            drawChartLine(ctx, waveH, w, h, '#ff6b9d', 0, yMax);
        }

        function drawPeriodChart(marine) {
            const c = setupChartCanvas('chart-period');
            if (!c) return;
            const { ctx, w, h } = c;

            const hCount = 48;
            let waveP = [], swellP = [];
            if (marine && marine.hourly) {
                waveP = (marine.hourly.wave_period || []).slice(0, hCount);
                swellP = (marine.hourly.swell_wave_period || []).slice(0, hCount);
            } else {
                for (let i = 0; i < hCount; i++) {
                    waveP.push(6 + Math.sin(i * 0.2) * 2);
                    swellP.push(4 + Math.sin(i * 0.15 + 1) * 1.5);
                }
            }

            const allVals = [...waveP, ...swellP].filter(v => v !== null);
            const yMax = Math.ceil(Math.max(...allVals, 5) * 1.2);

            drawChartGrid(ctx, w, h, 0, yMax, 4, makeTimeLabels(hCount));
            drawChartLine(ctx, swellP, w, h, '#00d4b4', 0, yMax);
            drawChartLine(ctx, waveP, w, h, '#ff6b9d', 0, yMax);
        }

        function drawTideChart() {
            const c = setupChartCanvas('chart-tide');
            if (!c) return;
            const { ctx, w, h } = c;

            const hCount = 48;
            const tideData = [];
            const now = Date.now() / 1000;
            const tidalPeriod = 12.42 * 3600;
            for (let i = 0; i < hCount; i++) {
                const ts = now + i * 3600;
                const phase = (ts % tidalPeriod) / tidalPeriod * Math.PI * 2;
                tideData.push(Math.sin(phase) * 2.5 + 3);
            }

            drawChartGrid(ctx, w, h, 0, 7, 4, makeTimeLabels(hCount));
            drawChartLine(ctx, tideData, w, h, '#00d4b4', 0, 7);
        }

        function drawWindChart(omWeather, dwdIcon) {
            const c = setupChartCanvas('chart-wind');
            if (!c) return;
            const { ctx, w, h } = c;

            const hCount = 48;
            let windSpeedData = [], gustData = [];
            const src = omWeather || dwdIcon;
            if (src && src.hourly) {
                windSpeedData = (src.hourly.wind_speed_10m || []).slice(0, hCount).map(v => v !== null ? v * 0.621371 : null);
                gustData = (src.hourly.wind_gusts_10m || []).slice(0, hCount).map(v => v !== null ? v * 0.621371 : null);
            } else {
                for (let i = 0; i < hCount; i++) {
                    windSpeedData.push(10 + Math.sin(i * 0.3) * 5 + Math.random() * 2);
                    gustData.push(15 + Math.sin(i * 0.25 + 0.5) * 8 + Math.random() * 3);
                }
            }

            const allVals = [...windSpeedData, ...gustData].filter(v => v !== null);
            const yMax = Math.ceil(Math.max(...allVals, 10) * 1.2);

            drawChartGrid(ctx, w, h, 0, yMax, 4, makeTimeLabels(hCount));

            // Draw gust as filled area
            if (gustData.length > 0) {
                const padL = 35, padR = 10, padT = 10, padB = 25;
                const plotW = w - padL - padR;
                const plotH = h - padT - padB;
                ctx.fillStyle = 'rgba(136,136,136,0.08)';
                ctx.beginPath();
                let started = false;
                for (let i = 0; i < gustData.length; i++) {
                    if (gustData[i] === null) continue;
                    const x = padL + (i / (gustData.length - 1)) * plotW;
                    const y = padT + plotH - ((gustData[i]) / yMax) * plotH;
                    if (!started) { ctx.moveTo(x, y); started = true; }
                    else ctx.lineTo(x, y);
                }
                // Close to wind speed line
                for (let i = windSpeedData.length - 1; i >= 0; i--) {
                    if (windSpeedData[i] === null) continue;
                    const x = padL + (i / (windSpeedData.length - 1)) * plotW;
                    const y = padT + plotH - ((windSpeedData[i]) / yMax) * plotH;
                    ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.fill();
            }

            drawChartLine(ctx, gustData, w, h, '#888888', 0, yMax);
            drawChartLine(ctx, windSpeedData, w, h, '#ff6b9d', 0, yMax);
        }

        function drawTempChart(omWeather, dwdIcon) {
            const c = setupChartCanvas('chart-temp');
            if (!c) return;
            const { ctx, w, h } = c;

            const hCount = 48;
            let tempData = [], appTempData = [];
            const src = omWeather;
            if (src && src.hourly) {
                tempData = (src.hourly.temperature_2m || []).slice(0, hCount).map(v => v !== null ? cToF(v) : null);
                appTempData = (src.hourly.apparent_temperature || []).slice(0, hCount).map(v => v !== null ? cToF(v) : null);
            } else {
                for (let i = 0; i < hCount; i++) {
                    tempData.push(35 + Math.sin(i * 0.2 - 1) * 8);
                    appTempData.push(33 + Math.sin(i * 0.2 - 1) * 10);
                }
            }

            const allVals = [...tempData, ...appTempData].filter(v => v !== null);
            const yMin = Math.floor(Math.min(...allVals) - 5);
            const yMax = Math.ceil(Math.max(...allVals) + 5);

            drawChartGrid(ctx, w, h, yMin, yMax, 4, makeTimeLabels(hCount));
            drawChartLine(ctx, appTempData, w, h, '#00d4b4', yMin, yMax);
            drawChartLine(ctx, tempData, w, h, '#ff6b9d', yMin, yMax);
        }

        function drawPrecipChart(omWeather, dwdIcon) {
            const c = setupChartCanvas('chart-precip');
            if (!c) return;
            const { ctx, w, h } = c;

            const hCount = 48;
            let precipData = [], precipProbData = [];
            const src = omWeather;
            if (src && src.hourly) {
                precipData = (src.hourly.precipitation || []).slice(0, hCount);
                precipProbData = (src.hourly.precipitation_probability || []).slice(0, hCount);
            } else {
                for (let i = 0; i < hCount; i++) {
                    precipData.push(Math.max(0, Math.sin(i * 0.15 + 3) * 2));
                    precipProbData.push(Math.max(0, Math.sin(i * 0.15 + 3) * 30 + 10));
                }
            }

            // Precip prob goes 0-100, precip amount is mm — show on dual scale
            drawChartGrid(ctx, w, h, 0, 100, 4, makeTimeLabels(hCount));

            // Draw precip amount as bars
            const padL = 35, padR = 10, padT = 10, padB = 25;
            const plotW = w - padL - padR;
            const plotH = h - padT - padB;
            ctx.fillStyle = 'rgba(255,107,157,0.2)';
            for (let i = 0; i < precipData.length; i++) {
                if (precipData[i] === null || precipData[i] === 0) continue;
                const x = padL + (i / precipData.length) * plotW;
                const barW = plotW / precipData.length;
                const barH = Math.min((precipData[i] / 5) * plotH, plotH);
                ctx.fillRect(x, padT + plotH - barH, barW - 1, barH);
            }

            drawChartLine(ctx, precipProbData, w, h, '#00d4b4', 0, 100);
        }

        function getCurrentZone(depth) {
            for (let i = OCEAN_ZONES.length - 1; i >= 0; i--) {
                if (depth >= OCEAN_ZONES[i].depthMin) return i;
            }
            return 0;
        }

        // ── Interpolate water properties based on exact depth ──
        function getWaterProps(depth) {
            const d = Math.max(0, Math.min(11000, depth));
            const zones = OCEAN_ZONES;
            let z0, z1, t;
            for (let i = 0; i < zones.length - 1; i++) {
                if (d >= zones[i].depthMin && d < zones[i + 1].depthMin) {
                    z0 = zones[i]; z1 = zones[i + 1];
                    t = (d - z0.depthMin) / (z1.depthMin - z0.depthMin);
                    break;
                }
            }
            if (!z0) { z0 = zones[zones.length - 1]; z1 = z0; t = 0; }
            const lerp = (a, b, t) => a + (b - a) * t;
            const lerpArr = (a, b, t) => a.map((v, i) => lerp(v, b[i], t));
            return {
                waterColor: lerpArr(z0.waterColor, z1.waterColor, t),
                fogColor: lerpArr(z0.fogColor, z1.fogColor, t),
                fogDensity: lerp(z0.fogDensity, z1.fogDensity, t),
                visNorm: lerp(z0.visNorm, z1.visNorm, t),
            };
        }

        // ══════════════════════════════════════════════════════════════════════════════
        // ─── FULL 3D UNDERWATER SCENE (Three.js WebGL) ─────────────────────────────

        // A realistic underwater world with procedural terrain, volumetric lighting,

        let dive3D = null; // holds all 3D scene state

        async function initDiveScene() {
            // Also init 2D canvas for overlays

            }

            const W = window.innerWidth, H = window.innerHeight;
            const dpr = Math.min(window.devicePixelRatio, 2);

            // WebGPU renderer for dive scene (separate from main renderer)
            const glRenderer = new THREE.WebGPURenderer({ canvas: c3d, antialias: true, alpha: false, forceWebGL: true });
            glRenderer.setPixelRatio(dpr);
            glRenderer.setSize(W, H);
            glRenderer.toneMapping = THREE.ACESFilmicToneMapping;
            glRenderer.toneMappingExposure = 1.0;
            await glRenderer.init();

            const dScene = new THREE.Scene();
            const dCam = new THREE.PerspectiveCamera(60, W / H, 0.1, 500);
            dCam.position.set(0, 5, 20);
            dCam.lookAt(0, 0, 0);

            // ── Helper: procedural simplex-ish noise ──
            function noise2D(x, y) {
                const n = Math.sin(x * 127.1 + y * 311.7) * 43758.5453;
                return (n - Math.floor(n)) * 2 - 1;
            }
            function smoothNoise(x, y) {
                const ix = Math.floor(x), iy = Math.floor(y);
                const fx = x - ix, fy = y - iy;
                const sx = fx * fx * (3 - 2 * fx), sy = fy * fy * (3 - 2 * fy);
                const a = noise2D(ix, iy), b = noise2D(ix + 1, iy);
                const c = noise2D(ix, iy + 1), d = noise2D(ix + 1, iy + 1);
                return a + sx * (b - a) + sy * (c - a) + sx * sy * (a - b - c + d);
            }
            function fbm(x, y, oct) {
                let v = 0, amp = 0.5, freq = 1;
                for (let i = 0; i < oct; i++) {
                    v += amp * smoothNoise(x * freq, y * freq);
                    amp *= 0.5; freq *= 2.0;
                }
                return v;
            }

            // ── Seabed terrain ──
            const terrainSz = 200, terrainSeg = 128;
            const terrainGeo = new THREE.PlaneGeometry(terrainSz, terrainSz, terrainSeg, terrainSeg);
            terrainGeo.rotateX(-Math.PI / 2);
            const tPos = terrainGeo.attributes.position;
            for (let i = 0; i < tPos.count; i++) {
                const x = tPos.getX(i), z = tPos.getZ(i);
                let h = fbm(x * 0.02, z * 0.02, 5) * 6;
                h += fbm(x * 0.08, z * 0.08, 3) * 1.5;
                // Add some larger rock formations
                h += Math.max(0, fbm(x * 0.005, z * 0.005, 3) * 12 - 3);
                tPos.setY(i, h - 12);
            }
            terrainGeo.computeVertexNormals();
            const terrainMat = new THREE.MeshStandardMaterial({
                color: 0x2a1f15,
                roughness: 0.95,
                metalness: 0.05,
                flatShading: false,

            const terrain = new THREE.Mesh(terrainGeo, terrainMat);
            terrain.receiveShadow = true;
            dScene.add(terrain);

            // ── Sediment plane (fine particles on seabed) ──

            sedimentGeo.rotateX(-Math.PI / 2);
            const sedimentMat = new THREE.MeshStandardMaterial({

            sediment.position.y = -11.5;
            dScene.add(sediment);

            // ── Underwater fog (built-in THREE.FogExp2 for realistic visibility) ──
            dScene.fog = new THREE.FogExp2(0x003355, 0.008);

            // ── Lights ──
            // Ambient — changes with depth
            const ambLight = new THREE.AmbientLight(0x4488cc, 0.6);
            dScene.add(ambLight);

            // Directional "sunlight" from above — fades with depth

            sunLight.position.set(20, 80, 30);

            sunLight.shadow.mapSize.set(1024, 1024);
            sunLight.shadow.camera.near = 0.5;
            sunLight.shadow.camera.far = 200;
            sunLight.shadow.camera.left = -60;
            sunLight.shadow.camera.right = 60;
            sunLight.shadow.camera.top = 60;
            sunLight.shadow.camera.bottom = -60;
            dScene.add(sunLight);

            // Camera-attached "submersible headlight"
            const headlight = new THREE.SpotLight(0xccddff, 0, 80, Math.PI * 0.35, 0.5, 1.5);
            headlight.position.set(0, 0, 0);
            dCam.add(headlight);
            headlight.target.position.set(0, -2, -20);
            dCam.add(headlight.target);
            dScene.add(dCam);

            // Point light for headlight glow
            const headGlow = new THREE.PointLight(0xaaccff, 0, 40, 2);
            dCam.add(headGlow);

            // ── Caustic light cookies (projected pattern near surface) ──
            const causticGroup = new THREE.Group();
            dScene.add(causticGroup);
            const causticLights = [];
            for (let i = 0; i < 6; i++) {
                const cl = new THREE.PointLight(0x66ccff, 0.3, 30, 2);
                cl.position.set(
                    (Math.random() - 0.5) * 40,

                    (Math.random() - 0.5) * 40
                );
                causticGroup.add(cl);
                causticLights.push({ light: cl, phase: Math.random() * Math.PI * 2, speed: 0.3 + Math.random() * 0.5 });
            }

            // ── Volumetric light shafts (geometry-based) ──
            const shaftGroup = new THREE.Group();
            dScene.add(shaftGroup);
            const shaftMat = new THREE.MeshBasicMaterial({

                transparent: true,
                opacity: 0.04,
                side: THREE.DoubleSide,

                depthWrite: false,

            const shafts3D = [];
            for (let i = 0; i < 12; i++) {
                const sw = 2 + Math.random() * 5;
                const sh = 50 + Math.random() * 30;
                const sg = new THREE.PlaneGeometry(sw, sh);
                const sm = new THREE.Mesh(sg, shaftMat.clone());
                sm.position.set(

                );
                sm.rotation.y = Math.random() * Math.PI;
                sm.rotation.x = (Math.random() - 0.5) * 0.15;
                shaftGroup.add(sm);
                shafts3D.push({ mesh: sm, phase: Math.random() * Math.PI * 2, baseOp: 0.02 + Math.random() * 0.04, drift: (Math.random() - 0.5) * 0.003 });
            }

            // ── Marine snow particles ──
            const snowCount = 3000;
            const snowGeo = new THREE.BufferGeometry();
            const snowPos = new Float32Array(snowCount * 3);
            const snowSz = new Float32Array(snowCount);
            const snowData = [];
            for (let i = 0; i < snowCount; i++) {
                snowPos[i * 3] = (Math.random() - 0.5) * 100;
                snowPos[i * 3 + 1] = Math.random() * 60 - 10;
                snowPos[i * 3 + 2] = (Math.random() - 0.5) * 100;
                snowSz[i] = 1 + Math.random() * 3;

            snowGeo.setAttribute('position', new THREE.BufferAttribute(snowPos, 3));
            snowGeo.setAttribute('size', new THREE.BufferAttribute(snowSz, 1));
            const snowMat = new THREE.PointsMaterial({
                color: 0xccddee,

                blending: THREE.AdditiveBlending,
                depthWrite: false,

            const snowPts = new THREE.Points(snowGeo, snowMat);
            dScene.add(snowPts);

            // ── Bioluminescent particles ──
            const bioCount = 600;
            const bioGeo = new THREE.BufferGeometry();
            const bioPositions = new Float32Array(bioCount * 3);
            const bioColors = new Float32Array(bioCount * 3);
            const bioData = [];
            for (let i = 0; i < bioCount; i++) {
                bioPositions[i * 3] = (Math.random() - 0.5) * 80;
                bioPositions[i * 3 + 1] = Math.random() * 50 - 8;
                bioPositions[i * 3 + 2] = (Math.random() - 0.5) * 80;

            // ── Coral reef (shallow zone) ──
            const coralGroup = new THREE.Group();
            dScene.add(coralGroup);
            const coralColors = [0xff4466, 0xff8833, 0xffcc22, 0xcc44ff, 0x44ddaa, 0xff6688, 0x88ccff];

            // Branch coral
            for (let i = 0; i < 40; i++) {
                const cx = (Math.random() - 0.5) * 60;
                const cz = (Math.random() - 0.5) * 60;
                const baseY = -12 + fbm(cx * 0.02, cz * 0.02, 3) * 4;
                const color = coralColors[Math.floor(Math.random() * coralColors.length)];
                const branchCount = 3 + Math.floor(Math.random() * 5);
                for (let b = 0; b < branchCount; b++) {
                    const height = 0.8 + Math.random() * 2.5;
                    const radius = 0.08 + Math.random() * 0.15;
                    const cGeo = new THREE.CylinderGeometry(radius * 0.3, radius, height, 6);
                    const cMat = new THREE.MeshStandardMaterial({
                        color, roughness: 0.8, metalness: 0.1,
                        emissive: new THREE.Color(color).multiplyScalar(0.05),

                    const cMesh = new THREE.Mesh(cGeo, cMat);
                    cMesh.position.set(
                        cx + (Math.random() - 0.5) * 2,
                        baseY + height / 2,
                        cz + (Math.random() - 0.5) * 2
                    );
                    cMesh.rotation.x = (Math.random() - 0.5) * 0.3;
                    cMesh.rotation.z = (Math.random() - 0.5) * 0.3;
                    cMesh.castShadow = true;
                    coralGroup.add(cMesh);
                }
                // Brain coral / spherical coral
                if (Math.random() < 0.4) {
                    const r = 0.4 + Math.random() * 1.0;
                    const brainGeo = new THREE.SphereGeometry(r, 12, 8);
                    const brainMat = new THREE.MeshStandardMaterial({
                        color: coralColors[Math.floor(Math.random() * coralColors.length)],
                        roughness: 0.9, metalness: 0.05,
                    });
                    const brain = new THREE.Mesh(brainGeo, brainMat);
                    brain.position.set(cx, baseY + r * 0.6, cz);
                    brain.scale.y = 0.6 + Math.random() * 0.4;
                    brain.castShadow = true;
                    coralGroup.add(brain);
                }
                // Fan coral (flat oriented)
                if (Math.random() < 0.3) {
                    const fanGeo = new THREE.CircleGeometry(0.8 + Math.random() * 1.5, 16);
                    const fanMat = new THREE.MeshStandardMaterial({
                        color: coralColors[Math.floor(Math.random() * coralColors.length)],
                        roughness: 0.7, metalness: 0.1, side: THREE.DoubleSide,
                        transparent: true, opacity: 0.8,

                    const fan = new THREE.Mesh(fanGeo, fanMat);
                    fan.position.set(cx + (Math.random() - 0.5) * 3, baseY + 1 + Math.random(), cz + (Math.random() - 0.5) * 3);
