<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebGPU Ocean Simulation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #000;
            -webkit-tap-highlight-color: transparent;
        }

        canvas {
            display: block;
            touch-action: none;
        }

        button,
        select,
        input,
        .sr-item {
            touch-action: manipulation;
        }

        #no-webgpu {
            display: none;
            position: fixed;
            inset: 0;
            background: #0a1628;
            color: #7ec8e3;
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            padding: 40px;
        }

        #no-webgpu h1 {
            font-size: 28px;
            margin-bottom: 16px;
            color: #fff;
        }

        #no-webgpu p {
            font-size: 16px;
            line-height: 1.7;
            max-width: 520px;
            opacity: 0.8;
        }

        #no-webgpu .hint {
            margin-top: 24px;
            padding: 16px 24px;
            background: rgba(126, 200, 227, 0.08);
            border: 1px solid rgba(126, 200, 227, 0.2);
            border-radius: 8px;
            font-size: 14px;
        }

        /* ── Custom UI Panel ── */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        /* ── Wave Checker Mode Toggle ── */
        #surf-mode-toggle {
            position: fixed;
            top: 20px;
            right: 62px;
            z-index: 1001;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            background: rgba(10, 18, 30, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Inter', -apple-system, sans-serif;
            font-size: 11px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.6);
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        #surf-mode-toggle:hover {
            background: rgba(10, 18, 30, 0.8);
            border-color: rgba(255, 255, 255, 0.25);
            color: rgba(255, 255, 255, 0.9);
        }

        #surf-mode-toggle.active {
            background: rgba(0, 210, 180, 0.15);
            border-color: rgba(0, 210, 180, 0.4);
            color: #00d4b4;
        }

        #surf-mode-toggle .surf-icon {
            font-size: 14px;
        }

        /* ── Ocean Layers Deep Dive Toggle ── */
        #deep-dive-toggle {
            position: fixed;
            top: 20px;
            right: 210px;
            z-index: 1001;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            background: rgba(10, 18, 30, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Inter', -apple-system, sans-serif;
            font-size: 11px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.6);
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        #deep-dive-toggle:hover {
            background: rgba(10, 18, 30, 0.8);
            border-color: rgba(255, 255, 255, 0.25);
            color: rgba(255, 255, 255, 0.9);
        }

        #deep-dive-toggle.active {
            background: rgba(0, 120, 255, 0.15);
            border-color: rgba(0, 120, 255, 0.4);
            color: #4da6ff;
        }

        #deep-dive-toggle .dive-icon {
            font-size: 14px;
        }

        /* ── Deep Dive Full-Screen Overlay ── */
        #deep-dive-overlay {
            position: fixed;
            inset: 0;
            z-index: 3000;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            font-family: 'Inter', -apple-system, sans-serif;
            background: #000;
            overflow: hidden;
        }

        #deep-dive-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        #deep-dive-overlay * {
            box-sizing: border-box;
        }

        /* Main underwater canvas */
        #dive-scene-canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        #dive-3d-canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* Close button */
        .dive-close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 50%;
            color: rgba(255, 255, 255, 0.8);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            transition: all 0.3s;
        }

        .dive-close-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            color: #fff;
        }

        /* ── Right-side depth rail ── */
        .dive-rail {
            position: absolute;
            right: 32px;
            top: 50%;
            transform: translateY(-50%);
            height: 65vh;
            width: 52px;
            z-index: 15;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .dive-rail-track {
            position: relative;
            width: 6px;
            height: 100%;
            border-radius: 3px;
            overflow: visible;
            cursor: pointer;
        }

        .dive-rail-fill {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 0%;
            border-radius: 3px;
            background: linear-gradient(to bottom,
                    rgba(80, 200, 255, 0.7) 0%,
                    rgba(30, 100, 200, 0.7) 20%,
                    rgba(10, 40, 120, 0.7) 40%,
                    rgba(5, 15, 50, 0.7) 65%,
                    rgba(2, 5, 20, 0.7) 85%,
                    rgba(0, 0, 0, 0.8) 100%);
            transition: height 0.15s;
        }

        .dive-rail-bg {
            position: absolute;
            inset: 0;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .dive-rail-thumb {
            position: absolute;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: radial-gradient(circle, #4fc3f7 30%, rgba(0, 120, 255, 0.3) 100%);
            border: 2px solid rgba(255, 255, 255, 0.85);
            box-shadow: 0 0 20px rgba(0, 150, 255, 0.5), 0 0 6px rgba(0, 150, 255, 0.3) inset;
            cursor: grab;
            z-index: 2;
            transition: box-shadow 0.2s;
        }

        .dive-rail-thumb:active {
            cursor: grabbing;
            box-shadow: 0 0 30px rgba(0, 150, 255, 0.8), 0 0 10px rgba(0, 200, 255, 0.5) inset;
        }

        /* Zone tick marks */
        .dive-rail-zones {
            position: absolute;
            left: 20px;
            top: 0;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .dive-rail-zone-tick {
            position: absolute;
            left: 0;
            display: flex;
            align-items: center;
            gap: 6px;
            transform: translateY(-50%);
            white-space: nowrap;
            transition: opacity 0.5s, transform 0.4s;
        }

        .dive-rail-zone-tick .tick-line {
            width: 10px;
            height: 1px;
            background: rgba(255, 255, 255, 0.2);
        }

        .dive-rail-zone-tick .tick-label {
            font-size: 8px;
            font-weight: 500;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.3);
            transition: color 0.4s;
        }

        .dive-rail-zone-tick.active .tick-label {
            color: rgba(255, 255, 255, 0.85);
        }

        .dive-rail-zone-tick .tick-depth {
            font-size: 7px;
            color: rgba(255, 255, 255, 0.18);
            margin-left: 2px;
        }

        /* ── Left Info Panel ── */
        .dive-info-panel {
            position: absolute;
            left: 32px;
            top: 50%;
            transform: translateY(-50%);
            width: 340px;
            z-index: 15;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Zone card */
        .dive-zone-card {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 18px;
            padding: 24px;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .dive-zone-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 6px;
        }

        .dive-zone-icon {
            font-size: 32px;
            line-height: 1;
        }

        .dive-zone-titles {
            flex: 1;
        }

        .dive-zone-name {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.3px;
            line-height: 1.2;
        }

        .dive-zone-aka {
            font-size: 11px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.35);
            letter-spacing: 0.4px;
        }

        .dive-zone-desc {
            font-size: 12px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.6;
            margin: 12px 0 16px;
        }

        .dive-zone-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .dive-zone-stat {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 10px;
            padding: 10px 12px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .dive-zone-stat-label {
            font-size: 8px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.3);
            margin-bottom: 3px;
        }

        .dive-zone-stat-value {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            font-variant-numeric: tabular-nums;
        }

        .dive-zone-creatures {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 14px;
        }

        .dive-creature-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.55);
        }

        .dive-creature-badge .creature-emoji {
            font-size: 13px;
        }

        /* Visibility & environment card */
        .dive-env-card {
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            padding: 16px 20px;
        }

        .dive-env-title {
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.3);
            margin-bottom: 10px;
        }

        .dive-env-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 5px 0;
        }

        .dive-env-label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.45);
            font-weight: 400;
        }

        .dive-env-value {
            font-size: 12px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.8);
            font-variant-numeric: tabular-nums;
        }

        .dive-vis-bar {
            width: 60px;
            height: 4px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 2px;
            overflow: hidden;
            margin-left: 8px;
            display: inline-block;
            vertical-align: middle;
        }

        .dive-vis-bar-fill {
            height: 100%;
            border-radius: 2px;
            background: linear-gradient(90deg, #4fc3f7, #00bcd4);
            transition: width 0.6s ease;
        }

        /* ── Bottom HUD ── */
        .dive-hud {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 15;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 0 32px 28px;
            pointer-events: none;
        }

        .dive-hud>* {
            pointer-events: all;
        }

        .dive-depth-readout {
            text-align: center;
        }

        .dive-depth-number {
            font-size: 72px;
            font-weight: 100;
            color: rgba(255, 255, 255, 0.75);
            letter-spacing: -4px;
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }

        .dive-depth-unit {
            font-size: 12px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.25);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 4px;
        }

        /* Auto-descent button */
        .dive-auto-btn {
            position: absolute;
            bottom: 32px;
            right: 100px;
            padding: 8px 18px;
            background: rgba(0, 150, 255, 0.12);
            border: 1px solid rgba(0, 150, 255, 0.25);
            border-radius: 20px;
            color: rgba(100, 200, 255, 0.8);
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.5px;
            cursor: pointer;
            z-index: 15;
            transition: all 0.3s;
        }

        .dive-auto-btn:hover {
            background: rgba(0, 150, 255, 0.2);
            border-color: rgba(0, 150, 255, 0.45);
            color: #fff;
        }

        .dive-auto-btn.active {
            background: rgba(255, 80, 80, 0.12);
            border-color: rgba(255, 80, 80, 0.3);
            color: rgba(255, 120, 120, 0.9);
        }

        /* Audio toggle button */
        .dive-audio-btn {
            position: absolute;
            bottom: 32px;
            right: 280px;
            padding: 8px 16px;
            background: rgba(0, 150, 255, 0.12);
            border: 1px solid rgba(0, 150, 255, 0.25);
            border-radius: 20px;
            color: rgba(100, 200, 255, 0.8);
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.5px;
            cursor: pointer;
            z-index: 15;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .dive-audio-btn:hover {
            background: rgba(0, 150, 255, 0.2);
            border-color: rgba(0, 150, 255, 0.45);
            color: #fff;
        }

        .dive-audio-btn.active {
            background: rgba(0, 200, 130, 0.12);
            border-color: rgba(0, 200, 130, 0.35);
            color: rgba(80, 230, 160, 0.9);
        }

        .dive-audio-btn .audio-bars {
            display: flex;
            align-items: flex-end;
            gap: 1.5px;
            height: 12px;
        }

        .dive-audio-btn .audio-bars span {
            display: block;
            width: 2.5px;
            background: currentColor;
            border-radius: 1px;
            transition: height 0.3s;
        }

        .dive-audio-btn.active .audio-bars span {
            animation: audioBarPulse 0.8s ease-in-out infinite alternate;
        }

        .dive-audio-btn.active .audio-bars span:nth-child(1) {
            animation-delay: 0s;
        }

        .dive-audio-btn.active .audio-bars span:nth-child(2) {
            animation-delay: 0.15s;
        }

        .dive-audio-btn.active .audio-bars span:nth-child(3) {
            animation-delay: 0.3s;
        }

        .dive-audio-btn.active .audio-bars span:nth-child(4) {
            animation-delay: 0.45s;
        }

        .dive-audio-btn.active .audio-bars span:nth-child(5) {
            animation-delay: 0.1s;
        }

        @keyframes audioBarPulse {
            0% {
                height: 3px;
            }

            100% {
                height: 11px;
            }
        }

        .dive-audio-btn:not(.active) .audio-bars span {
            height: 3px !important;
        }

        /* Volume slider container */
        .dive-volume-wrap {
            position: absolute;
            bottom: 32px;
            right: 420px;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease, transform 0.4s ease;
            transform: translateX(10px);
        }

        .dive-volume-wrap.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(0);
        }

        .dive-volume-icon {
            font-size: 14px;
            color: rgba(100, 200, 255, 0.7);
            user-select: none;
            min-width: 16px;
            text-align: center;
        }

        .dive-volume-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 100px;
            height: 4px;
            border-radius: 2px;
            background: linear-gradient(to right, rgba(0, 200, 130, 0.4), rgba(0, 150, 255, 0.4));
            outline: none;
            cursor: pointer;
        }

        .dive-volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: rgba(0, 200, 130, 0.9);
            border: 2px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .dive-volume-slider::-webkit-slider-thumb:hover {
            transform: scale(1.25);
            box-shadow: 0 0 8px rgba(0, 200, 130, 0.5);
        }

        .dive-volume-slider::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: rgba(0, 200, 130, 0.9);
            border: 2px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
        }

        .dive-volume-pct {
            font-family: 'JetBrains Mono', 'SF Mono', monospace;
            font-size: 10px;
            color: rgba(180, 220, 255, 0.6);
            min-width: 28px;
            text-align: right;
            letter-spacing: 0.5px;
        }

        /* Heartbeat indicator */
        .dive-heartbeat-indicator {
            position: absolute;
            bottom: 78px;
            right: 280px;
            display: flex;
            align-items: center;
            gap: 6px;
            opacity: 0;
            transition: opacity 0.6s ease;
            pointer-events: none;
        }

        .dive-heartbeat-indicator.visible {
            opacity: 1;
        }

        .dive-heartbeat-icon {
            font-size: 16px;
            color: rgba(255, 80, 80, 0.8);
            animation: heartbeatPulseIcon 1s ease-in-out infinite;
        }

        .dive-heartbeat-label {
            font-family: 'JetBrains Mono', 'SF Mono', monospace;
            font-size: 10px;
            color: rgba(255, 120, 120, 0.6);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .dive-heartbeat-bpm {
            font-family: 'JetBrains Mono', 'SF Mono', monospace;
            font-size: 11px;
            font-weight: 600;
            color: rgba(255, 80, 80, 0.9);
        }

        @keyframes heartbeatPulseIcon {

            0%,
            100% {
                transform: scale(1);
            }

            15% {
                transform: scale(1.3);
            }

            30% {
                transform: scale(1);
            }

            45% {
                transform: scale(1.2);
            }

            60% {
                transform: scale(1);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            #deep-dive-toggle {
                top: auto;
                bottom: 72px;
                right: 12px;
                padding: 6px 10px;
                font-size: 10px;
            }

            .dive-info-panel {
                left: 12px;
                right: 12px;
                top: 66px;
                transform: none;
                width: auto;
            }

            .dive-zone-card {
                padding: 16px;
                border-radius: 14px;
            }

            .dive-zone-name {
                font-size: 17px;
            }

            .dive-zone-desc {
                font-size: 11px;
            }

            .dive-rail {
                right: 14px;
                height: 35vh;
            }

            .dive-rail-zones {
                display: none;
            }

            .dive-depth-number {
                font-size: 48px;
                letter-spacing: -2px;
            }

            .dive-hud {
                padding: 0 16px 16px;
            }

            .dive-auto-btn {
                right: 60px;
                bottom: 20px;
                font-size: 10px;
            }

            .dive-audio-btn {
                right: 170px;
                bottom: 20px;
                font-size: 10px;
                padding: 6px 12px;
            }

            .dive-volume-wrap {
                right: 60px;
                bottom: 60px;
            }

            .dive-volume-slider {
                width: 70px;
            }

            .dive-heartbeat-indicator {
                right: 170px;
                bottom: 58px;
            }

            .dive-env-card {
                display: none;
            }
        }

        /* ── Surf Check Overlay ── */
        #surf-overlay {
            position: fixed;
            inset: 0;
            z-index: 2000;
            background: #111118;
            overflow-y: auto;
            overflow-x: hidden;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            font-family: 'Inter', -apple-system, sans-serif;
            color: #e0e0e0;
        }

        #surf-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        #surf-overlay * {
            box-sizing: border-box;
        }

        .surf-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            background: rgba(17, 17, 24, 0.95);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .surf-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .surf-logo {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 1px;
            color: #00d4b4;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .surf-logo svg {
            width: 24px;
            height: 24px;
        }

        .surf-close-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.6);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .surf-close-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
        }

        .surf-spot-selector {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 12px;
            font-family: inherit;
            padding: 6px 10px;
            outline: none;
            cursor: pointer;
            max-width: 220px;
        }

        .surf-spot-selector option {
            background: #1a1a24;
            color: #e0e0e0;
        }

        .surf-body {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 24px 40px;
        }

        /* Station Info Bar */
        .surf-station-info {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .surf-station-name {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
        }

        .surf-station-coords {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.35);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .surf-data-sources {
            margin-left: auto;
            display: flex;
            gap: 8px;
        }

        .surf-source-badge {
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.5px;
            padding: 3px 8px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .surf-source-noaa {
            background: rgba(0, 100, 200, 0.2);
            color: #4da6ff;
            border: 1px solid rgba(0, 100, 200, 0.3);
        }

        .surf-source-openmeteo {
            background: rgba(0, 200, 100, 0.15);
            color: #4ade80;
            border: 1px solid rgba(0, 200, 100, 0.25);
        }

        .surf-source-dwd {
            background: rgba(200, 160, 0, 0.15);
            color: #facc15;
            border: 1px solid rgba(200, 160, 0, 0.25);
        }

        /* Top Grid: Weather + Spot Search */
        .surf-top-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }

        @media (max-width: 700px) {
            .surf-top-grid {
                grid-template-columns: 1fr;
            }
        }

        .surf-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 16px;
            transition: border-color 0.3s;
        }

        .surf-card:hover {
            border-color: rgba(255, 255, 255, 0.12);
        }

        .surf-card-title {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            color: #ff6b9d;
            margin-bottom: 12px;
        }

        .surf-card-title.teal {
            color: #00d4b4;
        }

        .surf-card-title.purple {
            color: #a78bfa;
        }

        /* Weather Sub-Cards */
        .surf-weather-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .surf-weather-sub {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 8px;
            padding: 12px;
        }

        .surf-weather-sub-label {
            font-size: 9px;
            font-weight: 500;
            letter-spacing: 0.6px;
            text-transform: uppercase;
            color: #ff6b9d;
            margin-bottom: 6px;
        }

        .surf-weather-sub-value {
            font-size: 22px;
            font-weight: 600;
            color: #fff;
            line-height: 1;
        }

        .surf-weather-sub-detail {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Spot Search Panel */
        .surf-spot-search-wrap {
            position: relative;
        }

        .surf-spot-search-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #e0e0e0;
            font-size: 13px;
            font-family: inherit;
            padding: 10px 12px 10px 34px;
            outline: none;
            transition: border-color 0.2s;
        }

        .surf-spot-search-input:focus {
            border-color: rgba(0, 212, 180, 0.4);
        }

        .surf-spot-search-input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .surf-spot-search-icon {
            position: absolute;
            left: 11px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            color: rgba(255, 255, 255, 0.3);
            pointer-events: none;
            z-index: 1;
        }

        .surf-spot-results {
            margin-top: 8px;
            max-height: 360px;
            overflow-y: auto;
            border-radius: 8px;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
        }

        .surf-spot-results::-webkit-scrollbar {
            width: 4px;
        }

        .surf-spot-results::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.12);
            border-radius: 4px;
        }

        .surf-spot-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s;
            border: 1px solid transparent;
        }

        .surf-spot-item:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.08);
        }

        .surf-spot-item.active-spot {
            background: rgba(0, 212, 180, 0.08);
            border-color: rgba(0, 212, 180, 0.2);
        }

        .surf-spot-item-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.04);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .surf-spot-item-info {
            flex: 1;
            min-width: 0;
        }

        .surf-spot-item-name {
            font-size: 12px;
            font-weight: 500;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .surf-spot-item-meta {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.35);
            margin-top: 2px;
            display: flex;
            gap: 8px;
        }

        .surf-spot-item-id {
            font-size: 9px;
            color: rgba(0, 212, 180, 0.6);
            font-family: 'JetBrains Mono', monospace;
            flex-shrink: 0;
        }

        .surf-spot-region-header {
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.25);
            padding: 10px 12px 4px;
        }

        .surf-spot-empty {
            text-align: center;
            padding: 20px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 12px;
        }

        .surf-spot-count {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.2);
            text-align: right;
            padding: 4px 4px 0;
        }

        /* Spot/Buoy Tabs */
        .surf-spot-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            padding: 3px;
        }

        .surf-spot-tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            font-size: 11px;
            font-family: inherit;
            padding: 7px 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .surf-spot-tab-btn:hover {
            color: rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.04);
        }

        .surf-spot-tab-btn.active {
            background: rgba(0, 212, 180, 0.12);
            color: #00d4b4;
        }

        /* Spot item badge */
        .surf-spot-item-badge {
            font-size: 8px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            flex-shrink: 0;
            opacity: 0.7;
        }

        .surf-spot-item.expanded {
            background: rgba(0, 212, 180, 0.06);
            border-color: rgba(0, 212, 180, 0.15);
            border-bottom-left-radius: 0;
            border-bottom-right-radius: 0;
        }

        /* Expanded detail panel */
        .surf-spot-detail-panel {
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(0, 212, 180, 0.1);
            border-top: none;
            border-radius: 0 0 10px 10px;
            padding: 12px;
            margin-bottom: 4px;
            animation: spotDetailIn 0.2s ease;
        }

        @keyframes spotDetailIn {
            from {
                opacity: 0;
                transform: translateY(-6px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .surf-spot-detail-desc {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.55);
            line-height: 1.5;
            margin-bottom: 10px;
        }

        .surf-spot-detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-bottom: 10px;
        }

        .surf-spot-detail-cell {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 6px;
            padding: 8px 10px;
        }

        .surf-spot-detail-label {
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: rgba(255, 255, 255, 0.3);
            margin-bottom: 3px;
        }

        .surf-spot-detail-value {
            font-size: 12px;
            color: #fff;
            font-weight: 500;
        }

        .surf-spot-detail-value.buoy-link {
            color: #00d4b4;
            cursor: pointer;
            text-decoration: underline;
            text-decoration-style: dotted;
            text-underline-offset: 2px;
        }

        .surf-spot-detail-value.buoy-link:hover {
            color: #2ed573;
        }

        .surf-spot-links-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .surf-spot-ext-link {
            font-size: 10px;
            font-weight: 600;
            padding: 5px 10px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            text-decoration: none;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .surf-spot-ext-link:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.12);
        }

        /* Surf Conditions Row */
        .surf-conditions-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .surf-conditions-title {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
        }

        .surf-unit-toggle {
            display: flex;
            margin-left: auto;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            overflow: hidden;
        }

        .surf-unit-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            font-size: 11px;
            font-weight: 600;
            padding: 5px 14px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            letter-spacing: 0.3px;
        }

        .surf-unit-btn:hover {
            color: rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.04);
        }

        .surf-unit-btn.active {
            background: rgba(0, 212, 180, 0.15);
            color: #00d4b4;
        }

        .surf-rating-badge {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .surf-rating-good {
            background: rgba(74, 222, 128, 0.15);
            color: #4ade80;
            border: 1px solid rgba(74, 222, 128, 0.3);
        }

        .surf-rating-fair {
            background: rgba(250, 204, 21, 0.15);
            color: #facc15;
            border: 1px solid rgba(250, 204, 21, 0.3);
        }

        .surf-rating-poor {
            background: rgba(248, 113, 113, 0.15);
            color: #f87171;
            border: 1px solid rgba(248, 113, 113, 0.3);
        }

        .surf-conditions-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .surf-cond-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            padding: 14px;
        }

        .surf-cond-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 8px;
        }

        .surf-cond-value {
            font-size: 24px;
            font-weight: 700;
            color: #00d4b4;
            line-height: 1;
        }

        .surf-cond-detail {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.35);
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .surf-cond-arrows {
            display: flex;
            gap: 4px;
            margin-top: 8px;
        }

        .surf-cond-arrow {
            width: 22px;
            height: 22px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            cursor: pointer;
        }

        .surf-cond-arrow.down {
            background: rgba(99, 102, 241, 0.2);
            color: #818cf8;
        }

        .surf-cond-arrow.mid {
            background: rgba(250, 204, 21, 0.2);
            color: #facc15;
        }

        .surf-cond-arrow.up {
            background: rgba(248, 113, 113, 0.2);
            color: #f87171;
        }

        /* Charts Section */
        .surf-section-title {
            font-size: 14px;
            font-weight: 600;
            color: #ff6b9d;
            margin-bottom: 14px;
        }

        .surf-section-title.teal {
            color: #00d4b4;
        }

        .surf-charts-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            margin-bottom: 24px;
        }

        .surf-chart-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            padding: 14px;
            min-height: 200px;
        }

        .surf-chart-title {
            font-size: 12px;
            font-weight: 600;
            color: #00d4b4;
            margin-bottom: 10px;
        }

        .surf-chart-canvas {
            width: 100%;
            height: 150px;
            display: block;
        }

        .surf-chart-legend {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .surf-legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 9px;
            color: rgba(255, 255, 255, 0.5);
        }

        .surf-legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* Footer */
        .surf-footer {
            text-align: center;
            padding: 20px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            margin-top: 20px;
        }

        .surf-footer a {
            color: rgba(255, 255, 255, 0.35);
            text-decoration: none;
            transition: color 0.2s;
        }

        .surf-footer a:hover {
            color: #00d4b4;
        }

        /* Loading shimmer */
        .surf-loading {
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.03) 25%, rgba(255, 255, 255, 0.06) 50%, rgba(255, 255, 255, 0.03) 75%);
            background-size: 200% 100%;
            animation: surf-shimmer 1.5s infinite;
            border-radius: 6px;
            min-height: 40px;
        }

        @keyframes surf-shimmer {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        /* Responsive */
        @media (max-width: 900px) {
            .surf-top-grid {
                grid-template-columns: 1fr;
            }

            .surf-conditions-grid {
                grid-template-columns: repeat(3, 1fr);
            }

            .surf-charts-grid {
                grid-template-columns: 1fr;
            }

            .surf-data-sources {
                margin-left: 0;
            }
        }

        @media (max-width: 600px) {
            .surf-conditions-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .surf-body {
                padding: 14px 12px 30px;
            }

            .surf-header {
                padding: 12px 14px;
            }

            #surf-mode-toggle {
                right: auto;
                left: 50%;
                transform: translateX(-50%);
                top: auto;
                bottom: 56px;
                z-index: 1001;
            }
        }

        #ui-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            width: 36px;
            height: 36px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(10, 18, 30, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            color: rgba(255, 255, 255, 0.6);
            font-size: 16px;
        }

        #ui-toggle:hover {
            background: rgba(10, 18, 30, 0.8);
            border-color: rgba(255, 255, 255, 0.25);
            color: rgba(255, 255, 255, 0.9);
        }

        #ui-toggle.active {
            border-color: rgba(120, 180, 255, 0.3);
        }

        #ui-panel {
            position: fixed;
            top: 20px;
            right: 178px;
            z-index: 999;
            width: 260px;
            max-height: calc(100vh - 40px);
            background: rgba(8, 14, 26, 0.72);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            font-family: 'Inter', -apple-system, sans-serif;
            color: rgba(255, 255, 255, 0.8);
            overflow-y: auto;
            overflow-x: hidden;
            transform: translateX(10px);
            opacity: 0;
            pointer-events: none;
            transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.12) transparent;
        }

        #ui-panel::-webkit-scrollbar {
            width: 4px;
        }

        #ui-panel::-webkit-scrollbar-track {
            background: transparent;
        }

        #ui-panel::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.12);
            border-radius: 4px;
        }

        #ui-panel::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        #ui-panel.open {
            transform: translateX(0);
            opacity: 1;
            pointer-events: all;
        }

        .ui-section {
            padding: 0 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .ui-section:last-child {
            border-bottom: none;
        }

        .ui-section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0 8px;
            cursor: pointer;
            user-select: none;
        }

        .ui-section-title {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.8);
        }

        .ui-section-arrow {
            font-size: 8px;
            color: rgba(255, 255, 255, 0.2);
            transition: transform 0.25s ease;
        }

        .ui-section.collapsed .ui-section-arrow {
            transform: rotate(-90deg);
        }

        .ui-section-body {
            overflow: hidden;
            max-height: 600px;
            transition: max-height 0.3s ease, opacity 0.25s ease;
            padding-bottom: 10px;
        }

        .ui-section.collapsed .ui-section-body {
            max-height: 0;
            opacity: 0;
            padding-bottom: 0;
        }

        .ui-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 28px;
            margin-bottom: 2px;
        }

        .ui-label {
            font-size: 11px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.55);
            white-space: nowrap;
            flex-shrink: 0;
            margin-right: 10px;
        }

        .ui-slider-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 0;
        }

        .ui-slider {
            flex: 1;
            -webkit-appearance: none;
            appearance: none;
            height: 3px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }

        .ui-slider::-webkit-slider-thumb {
            -webkit-appearance: none;

    <script type="module">

        // ─── WebGPU Check ────────────────────────────────────────────────────────────
        if (!navigator.gpu) {
            document.getElementById('no-webgpu').style.display = 'flex';
            document.getElementById('loading').style.display = 'none';
            throw new Error('WebGPU not supported');
        }

        import * as THREE from 'three/webgpu';
        import {
            Fn, uniform, float, int, vec3, vec4,
            instancedArray, instanceIndex, positionGeometry, positionWorld,
            sin, cos, pow, sqrt, abs, floor, fract, max, exp,
            smoothstep, mix, select, dot, normalize, time,
            Loop, cameraPosition, hash, atan, clamp, vec2, mx_noise_float,
        } from 'three/tsl';

        const TWO_PI = float(Math.PI * 2);
        import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls.js';
        import { SkyMesh } from 'three/examples/jsm/objects/SkyMesh.js';
        import Stats from 'stats-gl';

        // ─── Constants ───────────────────────────────────────────────────────────────
        const G = 9.81;
        const FFT_SIZE = 256;
        const FFT_SIZE_SQ = FFT_SIZE * FFT_SIZE;
        const GRID_K = 16;
        const WAVES_PER_CASCADE = GRID_K * GRID_K;
        const TOTAL_WAVES = WAVES_PER_CASCADE * 2;
        const PATCH_COARSE = 250;
        const PATCH_FINE = 37;

        // ─── Scene ───────────────────────────────────────────────────────────────────
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.5, 30000);
        camera.position.set(0, 22, 120);

        const renderer = new THREE.WebGPURenderer({ antialias: true, sampleCount: 4 });
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.setSize(innerWidth, innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 0.6;
        document.body.appendChild(renderer.domElement);
        await renderer.init();



        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 0, 0);
        controls.minDistance = 5;
        controls.maxDistance = 500;
        controls.maxPolarAngle = Math.PI * 0.48;

        const stats = new Stats({ trackGPU: true });
        // document.body.appendChild(stats.dom);
        stats.init(renderer);

        // ─── Sun & Sky ───────────────────────────────────────────────────────────────
        const sunDir = uniform(new THREE.Vector3());

        const sky = new SkyMesh();
        sky.scale.setScalar(15000);
        sky.turbidity.value = 3;
        sky.rayleigh.value = 1.5;
        sky.mieCoefficient.value = 0.008;
        sky.mieDirectionalG.value = 0.85;

        // Procedural cloud layers
        const cloudCoverage = uniform(0.45);
        const cloudDensity = uniform(0.8);
        const cloudSpeed = uniform(0.006);

        function createCloudLayer(radius, yPos, scaleUV, alpha, geo) {
            const mat = new THREE.MeshBasicNodeMaterial({ side: THREE.BackSide, transparent: true, depthWrite: false });
            mat.colorNode = Fn(() => {
                const wPos = positionWorld;
                const uv = vec2(wPos.x, wPos.z).mul(scaleUV);
                const t = time.mul(cloudSpeed);

                // Domain warping for more natural shapes
                const warpN = mx_noise_float(uv.mul(0.7).add(vec2(t.mul(0.5), t.mul(-0.3))));
                const warpedUV = uv.add(vec2(warpN.mul(0.15), warpN.mul(0.12)));

                // Multi-octave cloud noise with warping
                const n1 = mx_noise_float(warpedUV.mul(1.0).add(vec2(t, t.mul(0.3))));
                const n2 = mx_noise_float(warpedUV.mul(2.2).add(vec2(t.mul(-0.6), t.mul(0.8))));
                const n3 = mx_noise_float(warpedUV.mul(5.0).add(vec2(t.mul(0.9), t.mul(-0.5))));
                const n4 = mx_noise_float(warpedUV.mul(10.0).add(vec2(t.mul(-0.4), t.mul(1.1))));
                const n5 = mx_noise_float(warpedUV.mul(20.0).add(vec2(t.mul(1.2), t.mul(0.4))));

                const cloud = n1.mul(0.4).add(n2.mul(0.25)).add(n3.mul(0.18)).add(n4.mul(0.1)).add(n5.mul(0.07));

                // Coverage threshold
                const coverageThresh = float(1.0).sub(cloudCoverage);
                const cloudMask = smoothstep(coverageThresh, coverageThresh.add(0.2), cloud);

                // Density ramp for soft edges
                const densityMask = pow(cloudMask, float(0.6)).mul(cloudDensity);

                // Cloud lighting - approximate sun angle
                const L = normalize(sunDir);
                const cloudNormalApprox = normalize(vec3(
                    mx_noise_float(warpedUV.add(vec2(0.001, 0.0))).sub(n1),
                    float(0.08),
                    mx_noise_float(warpedUV.add(vec2(0.0, 0.001))).sub(n1)
                ));
                const NdotL = max(dot(cloudNormalApprox, L), float(0.0));

                // Sun-influenced cloud colors
                const sunColorWarm = vec3(1.0, 0.92, 0.8);
                const sunColorCool = vec3(0.95, 0.97, 1.0);
                const sunTint = mix(sunColorWarm, sunColorCool, smoothstep(float(0.0), float(30.0), float(params.sunElevation)));

                const brightColor = sunTint;
                const midColor = vec3(0.78, 0.8, 0.85);
                const shadowColor = vec3(0.4, 0.42, 0.52);
                const darkEdge = vec3(0.28, 0.3, 0.38);

                // Multi-tone cloud shading
                const lightMix = NdotL.mul(0.6).add(cloud.mul(0.4));
                const col1 = mix(darkEdge, shadowColor, smoothstep(float(0.0), float(0.3), lightMix));
                const col2 = mix(col1, midColor, smoothstep(float(0.3), float(0.55), lightMix));
                const cloudCol = mix(col2, brightColor, smoothstep(float(0.55), float(0.85), lightMix));

                // Silver lining effect at cloud edges
                const edgeMask = smoothstep(float(0.0), float(0.15), cloudMask).mul(smoothstep(float(0.5), float(0.15), cloudMask));
                const silverLining = edgeMask.mul(0.35).mul(max(NdotL, float(0.2)));
                const finalCol = cloudCol.add(vec3(silverLining));

                // Fade at horizon for depth
                const horizonFade = smoothstep(float(0.0), float(0.15), normalize(wPos).y);

                return vec4(finalCol, densityMask.mul(alpha).mul(horizonFade));
            })();

            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.y = yPos;
            mesh.renderOrder = 1;
            return mesh;
        }

        // ─── URL Hash State Persistence ─────────────────────────────────────────────
        // Key params encoded in hash for shareability. Station is always encoded.

        const HASH_PARAM_KEYS = [
            'windSpeed', 'choppiness', 'heightScale', 'sunElevation', 'sunAzimuth',

        ];

        function parseHash() {
            const hash = location.hash.replace(/^#/, '');
            if (!hash) return {};
            const result = {};
            for (const part of hash.split('&')) {
                const eq = part.indexOf('=');
                if (eq === -1) continue;
                const key = decodeURIComponent(part.slice(0, eq));
                const val = decodeURIComponent(part.slice(eq + 1));
                result[key] = val;
            }
            return result;
        }

        // One-time feature detection for history.replaceState support
        // Use a hash-only argument to avoid cross-origin errors in about:srcdoc iframes
        const _canReplaceState = (() => {
            try {
                history.replaceState(null, '', '#__test__');
                history.replaceState(null, '', location.hash || '#');
                return true;
            } catch (e) {
                return false;
            }
        })();

        let _hashUpdateTimer = null;
        function updateHash() {
            clearTimeout(_hashUpdateTimer);
            _hashUpdateTimer = setTimeout(() => {
                const parts = [`station=${encodeURIComponent(currentStationId)}`];
                for (const key of HASH_PARAM_KEYS) {
                    const cur = params[key];
                    const def = defaultParams[key];
                    // Only encode if different from default
                    if (typeof cur === 'string') {
                        if (cur !== def) parts.push(`${key}=${encodeURIComponent(cur)}`);
                    } else {
                        // Round to avoid float noise
                        const rounded = Math.round(cur * 10000) / 10000;
                        const defRounded = Math.round(def * 10000) / 10000;
                        if (rounded !== defRounded) parts.push(`${key}=${rounded}`);
                    }
                }
                const newHash = '#' + parts.join('&');
                if ('#' + location.hash.replace(/^#/, '') !== newHash) {
                    if (_canReplaceState) {
                        history.replaceState(null, '', newHash);
                    } else {
                        location.hash = newHash.slice(1);
                    }
                }
            }, 300);
        }

        // Parse initial hash to get overrides
        const _initHash = parseHash();
        const _initStation = _initHash.station || null;

        // Build params with hash overrides applied
        const params = { ...defaultParams };
        for (const key of HASH_PARAM_KEYS) {
            if (_initHash[key] !== undefined) {
                const val = _initHash[key];
                if (key.endsWith('Color') || key === 'skyColor') {
                    // Color value — keep as string if it starts with #
                    if (val.startsWith('#')) params[key] = val;
                } else {
                    const n = parseFloat(val);
                    if (!isNaN(n)) params[key] = n;
                }
            }
        }

        // ─── Uniforms ────────────────────────────────────────────────────────────────

        // ─── Mini Globe (Canvas 2D) ──────────────────────────────────────────────────
        const globeCanvas = document.getElementById('globe-canvas');
