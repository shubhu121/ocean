        let globeDragging = false, globeLastMX = 0, globeLastMY = 0;
        let globeTargetRotY = -1.4, globeTargetRotX = 0.35;

        function latLonTo3D(lat, lon, r) {
            const phi = (90 - lat) * Math.PI / 180;
            const theta = (lon + 180) * Math.PI / 180;
            return [
                -r * Math.sin(phi) * Math.cos(theta),
                r * Math.cos(phi),
                r * Math.sin(phi) * Math.sin(theta)
            ];
        }

        function rotateY(x, y, z, a) {
            const c = Math.cos(a), s = Math.sin(a);
            return [x * c + z * s, y, -x * s + z * c];
        }
        function rotateX(x, y, z, a) {
            const c = Math.cos(a), s = Math.sin(a);
            return [x, y * c - z * s, y * s + z * c];
        }

        function project3D(lat, lon) {
            let [x, y, z] = latLonTo3D(lat, lon, GR);
            [x, y, z] = rotateY(x, y, z, globeRotY);
            [x, y, z] = rotateX(x, y, z, globeRotX);
            return { x: GCX + x, y: GCY - y, z };
        }

        function drawGlobe() {
            globeCtx.clearRect(0, 0, GW, GH);

            // Globe sphere background with atmosphere
            const bgGrad = globeCtx.createRadialGradient(GCX - GR * 0.2, GCY - GR * 0.2, GR * 0.1, GCX, GCY, GR * 1.15);
            bgGrad.addColorStop(0, 'rgba(20,60,120,0.35)');
            bgGrad.addColorStop(0.7, 'rgba(8,25,60,0.5)');
            bgGrad.addColorStop(0.9, 'rgba(40,100,180,0.15)');
            bgGrad.addColorStop(1, 'rgba(40,100,180,0)');
            globeCtx.beginPath();
            globeCtx.arc(GCX, GCY, GR * 1.15, 0, Math.PI * 2);
            globeCtx.fillStyle = bgGrad;
            globeCtx.fill();

            // Ocean fill
            const oceanGrad = globeCtx.createRadialGradient(GCX - GR * 0.25, GCY - GR * 0.25, 0, GCX, GCY, GR);
            oceanGrad.addColorStop(0, '#0d2847');
            oceanGrad.addColorStop(1, '#061428');
            globeCtx.beginPath();
            globeCtx.arc(GCX, GCY, GR, 0, Math.PI * 2);
            globeCtx.fillStyle = oceanGrad;
            globeCtx.fill();

            // Graticule (every 30°)
            globeCtx.strokeStyle = 'rgba(60,120,180,0.12)';
            globeCtx.lineWidth = 0.5;
            for (let lat = -60; lat <= 60; lat += 30) {
                globeCtx.beginPath();
                let started = false;
                for (let lon = -180; lon <= 180; lon += 3) {
                    const p = project3D(lat, lon);
                    if (p.z < 0) { started = false; continue; }
                    if (!started) { globeCtx.moveTo(p.x, p.y); started = true; }
                    else globeCtx.lineTo(p.x, p.y);
                }
                globeCtx.stroke();
            }
            for (let lon = -180; lon < 180; lon += 30) {
                globeCtx.beginPath();
                let started = false;
                for (let lat = -90; lat <= 90; lat += 3) {
                    const p = project3D(lat, lon);
                    if (p.z < 0) { started = false; continue; }
                    if (!started) { globeCtx.moveTo(p.x, p.y); started = true; }
                    else globeCtx.lineTo(p.x, p.y);
                }
                globeCtx.stroke();
            }

            // Draw coastlines
            globeCtx.strokeStyle = 'rgba(120,180,220,0.45)';
            globeCtx.lineWidth = 1;
            globeCtx.beginPath();
            let penDown = false;
            for (const pt of COASTLINES) {
                if (pt === null) { penDown = false; continue; }
                const p = project3D(pt[1], pt[0]);
                if (p.z < 0) { penDown = false; continue; }
                if (!penDown) { globeCtx.moveTo(p.x, p.y); penDown = true; }
                else globeCtx.lineTo(p.x, p.y);
            }
            globeCtx.stroke();

            // Fill continents (very subtle)
            // We skip fill for simplicity — outlines look cleaner on mini globe

            // Draw all station dots (dim, with hover highlight)
            for (const [sid, info] of Object.entries(STATION_DB)) {
                const p = project3D(info[0], info[1]);
                if (p.z < 0) continue;
                if (sid === currentStationId) continue; // draw active separately below
                const isHovered = sid === globeHoveredStation;
                const radius = isHovered ? 3 : 1.5;
                const alpha = isHovered ? 0.7 : 0.25;
                globeCtx.beginPath();
                globeCtx.arc(p.x, p.y, radius, 0, Math.PI * 2);
                globeCtx.fillStyle = isHovered ? `rgba(120,200,255,${alpha})` : `rgba(100,180,255,${alpha})`;
                globeCtx.fill();
                if (isHovered) {
                    globeCtx.strokeStyle = 'rgba(120,200,255,0.4)';
                    globeCtx.lineWidth = 1;
                    globeCtx.stroke();
                }
            }

            // Draw active station (bright pulsing dot)
            const active = STATION_DB[currentStationId];
            if (active) {
                const p = project3D(active[0], active[1]);
                if (p.z >= 0) {
                    const pulse = 0.6 + 0.4 * Math.sin(performance.now() * 0.003);
                    // Glow
                    const glow = globeCtx.createRadialGradient(p.x, p.y, 0, p.x, p.y, 10);
                    glow.addColorStop(0, `rgba(74,222,128,${0.5 * pulse})`);
                    glow.addColorStop(1, 'rgba(74,222,128,0)');
                    globeCtx.beginPath();
                    globeCtx.arc(p.x, p.y, 10, 0, Math.PI * 2);
                    globeCtx.fillStyle = glow;
                    globeCtx.fill();
                    // Dot
                    globeCtx.beginPath();
                    globeCtx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                    globeCtx.fillStyle = '#4ade80';
                    globeCtx.fill();
                    globeCtx.strokeStyle = 'rgba(74,222,128,0.5)';
                    globeCtx.lineWidth = 1;
                    globeCtx.stroke();
                }
            }

            // Specular highlight on globe
            const specGrad = globeCtx.createRadialGradient(GCX - GR * 0.3, GCY - GR * 0.35, 0, GCX - GR * 0.3, GCY - GR * 0.35, GR * 0.6);
            specGrad.addColorStop(0, 'rgba(180,220,255,0.07)');
            specGrad.addColorStop(1, 'rgba(180,220,255,0)');
            globeCtx.beginPath();
            globeCtx.arc(GCX, GCY, GR, 0, Math.PI * 2);
            globeCtx.fillStyle = specGrad;
            globeCtx.fill();

            // Edge ring
            globeCtx.beginPath();
            globeCtx.arc(GCX, GCY, GR, 0, Math.PI * 2);
            globeCtx.strokeStyle = 'rgba(80,150,220,0.15)';
            globeCtx.lineWidth = 1;
            globeCtx.stroke();
        }

        // Globe drag interaction — mouse
        globeCanvas.addEventListener('mousedown', e => {
            globeDragging = true;
            globeLastMX = e.clientX;
            globeLastMY = e.clientY;
            globeCanvas.style.cursor = 'grabbing';
        });
        window.addEventListener('mousemove', e => {
            if (!globeDragging) return;
            const dx = e.clientX - globeLastMX;
            const dy = e.clientY - globeLastMY;
            globeTargetRotY += dx * 0.008;
            globeTargetRotX = Math.max(-1.2, Math.min(1.2, globeTargetRotX + dy * 0.008));
            globeLastMX = e.clientX;
            globeLastMY = e.clientY;
        });
        window.addEventListener('mouseup', () => {
            globeDragging = false;
            globeCanvas.style.cursor = 'grab';
        });

        // Globe drag interaction — touch
        let globeTouchStart = null;
        globeCanvas.addEventListener('touchstart', e => {
            if (e.touches.length !== 1) return;
            e.preventDefault();
            const t = e.touches[0];
            globeDragging = true;
            globeLastMX = t.clientX;
            globeLastMY = t.clientY;
            globeTouchStart = { x: t.clientX, y: t.clientY, time: performance.now() };
        }, { passive: false });

        globeCanvas.addEventListener('touchmove', e => {
            if (!globeDragging || e.touches.length !== 1) return;
            e.preventDefault();
            const t = e.touches[0];
            const dx = t.clientX - globeLastMX;
            const dy = t.clientY - globeLastMY;
            globeTargetRotY += dx * 0.008;
            globeTargetRotX = Math.max(-1.2, Math.min(1.2, globeTargetRotX + dy * 0.008));
            globeLastMX = t.clientX;
            globeLastMY = t.clientY;
        }, { passive: false });

        globeCanvas.addEventListener('touchend', e => {
            if (!globeTouchStart) { globeDragging = false; return; }
            const ct = e.changedTouches[0];
            const dx = ct.clientX - globeTouchStart.x;
            const dy = ct.clientY - globeTouchStart.y;
            const dt = performance.now() - globeTouchStart.time;
            const dist = Math.sqrt(dx * dx + dy * dy);
            // Tap detection: short movement + short duration = tap (select station)
            if (dist < 12 && dt < 350) {
                const sid = getGlobeStationAtPixel(ct.clientX, ct.clientY);
                if (sid && STATION_DB[sid]) {
                    selectStationById(sid);
                }
            }
            globeDragging = false;
            globeTouchStart = null;
        });

        function animateGlobe() {
            globeRotY += (globeTargetRotY - globeRotY) * 0.12;
            globeRotX += (globeTargetRotX - globeRotX) * 0.12;
            drawGlobe();
        }

        function focusGlobeOnStation(stationId) {
            const info = STATION_DB[stationId];
            if (!info) return;
            // Rotate globe so station faces viewer
            globeTargetRotY = -info[1] * Math.PI / 180 - Math.PI;
            globeTargetRotX = info[0] * Math.PI / 180 * 0.5;
        }

        // ─── Station Selector ────────────────────────────────────────────────────────
        const stationSelect = document.getElementById('station-select');
        for (const [region, ids] of Object.entries(STATION_REGIONS)) {
            const grp = document.createElement('optgroup');
            grp.label = region;
            for (const id of ids) {
                const info = STATION_DB[id];
                if (!info) continue;
                const opt = document.createElement('option');
                opt.value = id;
                opt.textContent = `${id} — ${info[2]}`;
                if (id === currentStationId) opt.selected = true;
                grp.appendChild(opt);
            }
            stationSelect.appendChild(grp);
        }

        stationSelect.addEventListener('change', () => {
            const newId = stationSelect.value;
            if (newId === currentStationId) return;
            currentStationId = newId;
            const info = STATION_DB[newId];
            const ndbcLabel = document.getElementById('ndbc-label');
            ndbcLabel.textContent = `NDBC ${newId} — ${info ? info[2] : ''}`;
            document.getElementById('ndbc-details').textContent = 'Fetching…';
            document.getElementById('ndbc-dot').className = '';
            ndbcState.status = 'connecting';
            ndbcState.current = null;
            ndbcState.target = null;
            ndbcState.lastGood = null;
            focusGlobeOnStation(newId);
            // Update brand & panel info
            const brandEl = document.getElementById('ui-brand');
            if (brandEl) brandEl.textContent = `OCEAN — ${info ? info[2] : newId}`;
            if (window._updateNDBCPanelInfo) window._updateNDBCPanelInfo();
            // Reset poll timer
            clearInterval(ndbcPollTimer);
            fetchNDBCData();
            ndbcPollTimer = setInterval(fetchNDBCData, NDBC_POLL_INTERVAL);
            // Persist station change to URL hash
            updateHash();
        });

        focusGlobeOnStation(currentStationId);

        // ─── Station Search ──────────────────────────────────────────────────────────
        const searchInput = document.getElementById('station-search');
        const searchResults = document.getElementById('station-results');
        let searchActiveIdx = -1;
        let searchFiltered = [];

        // Build reverse lookup: station ID → region name
        const stationToRegion = {};
        for (const [region, ids] of Object.entries(STATION_REGIONS)) {
            for (const id of ids) stationToRegion[id] = region;
        }

        function highlightMatch(text, query) {
            if (!query) return text;
            const idx = text.toLowerCase().indexOf(query.toLowerCase());
            if (idx === -1) return text;
            return text.slice(0, idx) + '<span class="sr-match">' + text.slice(idx, idx + query.length) + '</span>' + text.slice(idx + query.length);
        }

        function filterStations(query) {
            const q = query.trim().toLowerCase();
            if (!q) {
                // Show all stations grouped by region (first 5 per region)
                const results = [];
                for (const [region, ids] of Object.entries(STATION_REGIONS)) {
                    for (const id of ids) {
                        const info = STATION_DB[id];
                        if (info) results.push({ id, name: info[2], region, lat: info[0], lon: info[1] });
                    }
                }
                return results;
            }

            const results = [];
            for (const [id, info] of Object.entries(STATION_DB)) {
                const name = info[2];
                const region = stationToRegion[id] || '';
                const searchStr = `${id} ${name} ${region}`.toLowerCase();
                if (searchStr.includes(q)) {
                    // Score: exact ID match first, then name start, then region, then anywhere
                    let score = 0;
                    if (id.toLowerCase() === q) score = 100;
                    else if (id.toLowerCase().startsWith(q)) score = 80;
                    else if (name.toLowerCase().startsWith(q)) score = 60;
                    else if (name.toLowerCase().includes(q)) score = 40;
                    else if (region.toLowerCase().includes(q)) score = 20;
                    results.push({ id, name, region, lat: info[0], lon: info[1], score });
                }
            }
            results.sort((a, b) => b.score - a.score);
            return results;
        }

        function renderSearchResults(query) {
            const items = filterStations(query);
            searchFiltered = items;
            searchActiveIdx = -1;

            if (items.length === 0) {
                searchResults.innerHTML = '<div class="sr-empty">No stations found</div>';
                searchResults.classList.add('open');
                return;
            }

            const maxShow = query.trim() ? items.length : 50; // limit when showing all
            let html = '';
            for (let i = 0; i < Math.min(items.length, maxShow); i++) {
                const it = items[i];
                const q = query.trim();
                html += `<div class="sr-item" data-sid="${it.id}" data-idx="${i}">
      <span class="sr-item-id">${highlightMatch(it.id, q)}</span>
      <span class="sr-item-name">${highlightMatch(it.name, q)}</span>
      <span class="sr-item-region">${highlightMatch(it.region, q)}</span>
    </div>`;
            }
            if (items.length > maxShow) {
                html += `<div class="sr-hint">${items.length - maxShow} more — refine your search</div>`;
            }
            const isMobile = window.matchMedia('(max-width: 768px)').matches;
            html += isMobile
                ? '<div class="sr-hint">Tap a station to select</div>'
                : '<div class="sr-hint">↑↓ Navigate · Enter Select · Esc Close</div>';
            searchResults.innerHTML = html;
            searchResults.classList.add('open');

            // Attach click handlers
            searchResults.querySelectorAll('.sr-item').forEach(el => {
                el.addEventListener('click', () => {
                    selectStationById(el.dataset.sid);
                    closeSearch();
                });
                el.addEventListener('mouseenter', () => {
                    setSearchActive(parseInt(el.dataset.idx));
                });
            });
        }

        function setSearchActive(idx) {
            const items = searchResults.querySelectorAll('.sr-item');
            items.forEach(el => el.classList.remove('active'));
            if (idx >= 0 && idx < items.length) {
                items[idx].classList.add('active');
                items[idx].scrollIntoView({ block: 'nearest' });
            }
            searchActiveIdx = idx;
        }

        function closeSearch() {
            searchResults.classList.remove('open');
            searchInput.blur();
            searchActiveIdx = -1;
        }

        function selectStationById(stationId) {
            if (!STATION_DB[stationId]) return;
            stationSelect.value = stationId;
            stationSelect.dispatchEvent(new Event('change'));
            searchInput.value = '';
        }

        searchInput.addEventListener('focus', () => {
            renderSearchResults(searchInput.value);
        });

        searchInput.addEventListener('input', () => {
            renderSearchResults(searchInput.value);
        });

        searchInput.addEventListener('keydown', (e) => {
            const items = searchResults.querySelectorAll('.sr-item');
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                setSearchActive(Math.min(searchActiveIdx + 1, items.length - 1));
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                setSearchActive(Math.max(searchActiveIdx - 1, 0));
            } else if (e.key === 'Enter') {
                e.preventDefault();
                if (searchActiveIdx >= 0 && searchFiltered[searchActiveIdx]) {
                    selectStationById(searchFiltered[searchActiveIdx].id);
                    closeSearch();
                }
            } else if (e.key === 'Escape') {
                closeSearch();
            }
        });

        // Close search when clicking outside
        document.addEventListener('click', (e) => {
            if (!document.getElementById('station-search-wrap').contains(e.target)) {
                closeSearch();
            }
        });

        // ─── Globe Click-to-Select ───────────────────────────────────────────────────
        const globeTooltip = document.getElementById('globe-tooltip');
        const globeWrap = document.getElementById('globe-wrap');
        let globeHoveredStation = null;

        function getGlobeStationAtPixel(clientX, clientY) {
            const rect = globeCanvas.getBoundingClientRect();
            const scaleX = globeCanvas.width / rect.width;
            const scaleY = globeCanvas.height / rect.height;
            const px = (clientX - rect.left) * scaleX;
            const py = (clientY - rect.top) * scaleY;
            const hitRadius = 12; // px tolerance

            let closest = null;
            let closestDist = Infinity;

            for (const [sid, info] of Object.entries(STATION_DB)) {
                const p = project3D(info[0], info[1]);
                if (p.z < 0) continue;
                const dx = p.x - px;
                const dy = p.y - py;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < hitRadius && dist < closestDist) {
                    closest = sid;
                    closestDist = dist;
                }
            }
            return closest;
        }

        globeCanvas.addEventListener('mousemove', (e) => {
            if (globeDragging) {
                globeTooltip.classList.remove('visible');
                globeHoveredStation = null;
                return;
            }
            const sid = getGlobeStationAtPixel(e.clientX, e.clientY);
            if (sid && STATION_DB[sid]) {
                globeHoveredStation = sid;
                const info = STATION_DB[sid];
                globeTooltip.textContent = `${sid} — ${info[2]}`;
                globeTooltip.style.left = (e.clientX + 12) + 'px';
                globeTooltip.style.top = (e.clientY - 28) + 'px';
                globeTooltip.classList.add('visible');
                globeCanvas.style.cursor = 'pointer';
            } else {
                globeHoveredStation = null;
                globeTooltip.classList.remove('visible');
                if (!globeDragging) globeCanvas.style.cursor = 'grab';
            }
        });

        globeCanvas.addEventListener('mouseleave', () => {
            globeHoveredStation = null;
            globeTooltip.classList.remove('visible');
        });

        // Override mousedown to detect click vs drag
        let globeClickStart = null;
        const origMouseDown = globeCanvas.onmousedown;
        globeCanvas.addEventListener('mousedown', (e) => {
            globeClickStart = { x: e.clientX, y: e.clientY, time: performance.now() };
        });

        globeCanvas.addEventListener('mouseup', (e) => {
            if (!globeClickStart) return;
            const dx = e.clientX - globeClickStart.x;
            const dy = e.clientY - globeClickStart.y;
            const dt = performance.now() - globeClickStart.time;
            const dist = Math.sqrt(dx * dx + dy * dy);
            // It's a click (not a drag) if movement < 5px and duration < 300ms
            if (dist < 5 && dt < 300) {
                const sid = getGlobeStationAtPixel(e.clientX, e.clientY);
                if (sid && STATION_DB[sid]) {
                    selectStationById(sid);
                    globeTooltip.classList.remove('visible');
                }
            }
            globeClickStart = null;
        });

        // ─── NDBC Real-Time Data Integration ─────────────────────────────────────────
        function getNDBCUrls(stationId) {
            const base = `https://www.ndbc.noaa.gov/data/realtime2/${stationId}.txt`;
            return {
                direct: base,
                proxies: [
                    'https://corsproxy.io/?' + encodeURIComponent(base),
                    'https://api.allorigins.win/raw?url=' + encodeURIComponent(base),
                    'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(base),
                ],
            };
        }
        const NDBC_POLL_INTERVAL = 10 * 60 * 1000; // 10 minutes
        const NDBC_LERP_DURATION = 4000; // 4 second smooth transition

        const ndbcState = {
            lastGood: null,        // last successfully parsed row
            current: null,         // currently applied values
            target: null,          // values we're lerping toward
            lerpStart: 0,
            lerpDuration: NDBC_LERP_DURATION,
            isLerping: false,
            lastFetch: 0,
            status: 'connecting',  // 'live' | 'stale' | 'error' | 'connecting'
            rawTimestamp: '',
            latestData: null,      // last data passed to updateNDBCUI (for unit re-render)
        };

        function parseNDBCText(text) {
            const lines = text.split('\n').filter(l => l.trim().length > 0);
            if (lines.length < 3) return null;

            // Line 0: "#YY  MM DD hh mm WDIR WSPD ..." — column headers
            // Line 1: "#yr  mo dy hr mn degT m/s ..." — units (skip)
            // Lines 2+: data rows
            const headerLine = lines[0].replace(/^#/, '').trim();
            const headers = headerLine.split(/\s+/);

            // Build column-name → index map
            const colIdx = {};
            headers.forEach((h, i) => { colIdx[h] = i; });

            // Data rows: skip all lines starting with #
            const dataRows = lines.filter(l => !l.startsWith('#'));
            if (dataRows.length === 0) return null;

            // Helper: read a named column from a split-fields array.
            // Date columns (indices 0–4) are never "missing", so only treat MM as
            // missing for columns at index >= 5 (the measurement columns).
            function readField(fields, name) {
                const idx = colIdx[name];
                if (idx === undefined || idx >= fields.length) return null;
                const raw = fields[idx];
                if (idx >= 5 && raw === 'MM') return null;   // missing measurement
                const v = parseFloat(raw);
                return isNaN(v) ? null : v;
            }

            // Parse the most-recent data row (index 0)
            function parseRow(fields) {
                // Timestamp from first five positional columns: YY MM DD hh mm
                const yr = parseInt(fields[0], 10);
                const mo = parseInt(fields[1], 10);
                const dy = parseInt(fields[2], 10);
                const hr = parseInt(fields[3], 10);
                const mn = parseInt(fields[4], 10);
                const year = yr < 100 ? 2000 + yr : yr;
                const timestamp = (yr && mo && dy != null)
                    ? `${year}-${String(mo).padStart(2, '0')}-${String(dy).padStart(2, '0')} ${String(hr).padStart(2, '0')}:${String(mn).padStart(2, '0')} UTC`
                    : '';

                return {
                    waveHeight: readField(fields, 'WVHT'),   // significant wave height (m)
                    wavePeriod: readField(fields, 'DPD'),     // dominant wave period (s)
                    avgPeriod: readField(fields, 'APD'),     // average wave period (s)
                    waveDir: readField(fields, 'MWD'),     // mean wave direction (°true)
                    windSpeed: readField(fields, 'WSPD'),    // wind speed (m/s)
                    windDir: readField(fields, 'WDIR'),    // wind direction (°true)
                    windGust: readField(fields, 'GST'),     // gust (m/s)
                    pressure: readField(fields, 'PRES'),    // atmospheric pressure (hPa)
                    waterTemp: readField(fields, 'WTMP'),    // water temp (°C)
                    airTemp: readField(fields, 'ATMP'),    // air temp (°C)
                    timestamp,
                };
            }

            const primary = parseRow(dataRows[0].split(/\s+/));

            // Back-fill missing key fields from next 12 rows
            const keyFields = ['waveHeight', 'wavePeriod', 'avgPeriod', 'waveDir', 'windSpeed', 'windDir', 'waterTemp'];
            const colNames = ['WVHT', 'DPD', 'APD', 'MWD', 'WSPD', 'WDIR', 'WTMP'];
            for (let r = 1; r < Math.min(dataRows.length, 12); r++) {
                let allFilled = true;
                const fb = dataRows[r].split(/\s+/);
                for (let k = 0; k < keyFields.length; k++) {
                    if (primary[keyFields[k]] === null) {
                        const v = readField(fb, colNames[k]);
                        if (v !== null) primary[keyFields[k]] = v;
                    }
                    if (primary[keyFields[k]] === null) allFilled = false;
                }
                if (allFilled) break;
            }

            // Station 41113 is a Waverider buoy (wave-only, no wind instruments).
            // Estimate wind speed from wave state via inverse Pierson-Moskowitz:
            //   Hs ≈ 0.0246 · U² → U ≈ sqrt(Hs / 0.0246)
            // This gives the "fully developed sea" equivalent wind — a decent proxy.
            if (primary.windSpeed === null && primary.waveHeight !== null) {
                primary.windSpeedEstimated = true;
                primary.windSpeed = Math.sqrt(primary.waveHeight / 0.0246);
            }
            // Use wave direction as wind direction if WDIR is missing
            if (primary.windDir === null && primary.waveDir !== null) {
                primary.windDir = primary.waveDir;
            }

            return primary;
        }

        // Map NDBC data → ocean simulation parameters
        function mapNDBCToOcean(data) {
            if (!data) return null;

            const mapped = {};

            // Wind speed: NDBC reports in m/s, our sim param is roughly in m/s but scaled for visual effect
            // Cape Canaveral typical: 2–12 m/s. Map to sim range that looks right.
            if (data.windSpeed !== null) {
                // Direct m/s mapping with slight amplification for visual drama
                mapped.windSpeed = Math.max(1, data.windSpeed * 1.8);
            }

            // Wave height → heightScale
            // WVHT at Cape Canaveral: typically 0.3–2.0m, storms up to 4m+
            // Our heightScale default is 1.3; map proportionally
            if (data.waveHeight !== null) {
                mapped.heightScale = THREE.MathUtils.clamp(data.waveHeight * 1.1, 0.2, 3.0);
            }

            // Wave period → choppiness (shorter periods = choppier)
            // DPD typical: 4–14s. Short period (4s) → high chop, long period (14s) → smooth swell
            if (data.wavePeriod !== null) {
                mapped.choppiness = THREE.MathUtils.mapLinear(
                    THREE.MathUtils.clamp(data.wavePeriod, 3, 16),
                    3, 16,
                    2.2, 0.6
                );
            }

            // Wind direction → windDir uniform (radians)
            // NDBC MWD is "direction waves are coming FROM" in degrees true (0=N, 90=E)
            // Convert to our sim's wind direction angle
            if (data.waveDir !== null) {
                mapped.windDirRad = THREE.MathUtils.degToRad(data.waveDir);
            } else if (data.windDir !== null) {
                mapped.windDirRad = THREE.MathUtils.degToRad(data.windDir);
            }

            // Foam: higher waves + shorter periods = more foam
            if (data.waveHeight !== null) {
                const foamBase = THREE.MathUtils.mapLinear(
                    THREE.MathUtils.clamp(data.waveHeight, 0.2, 4.0),
                    0.2, 4.0,
                    0.8, 0.2
                );
                mapped.foamThreshold = foamBase;

                const foamInt = THREE.MathUtils.mapLinear(
                    THREE.MathUtils.clamp(data.waveHeight, 0.2, 4.0),
                    0.2, 4.0,
                    0.6, 3.0
                );
                mapped.foamIntensity = foamInt;
            }

            // SSS intensity: calmer seas → more transparent/SSS visible
            if (data.waveHeight !== null) {
                mapped.sssIntensity = THREE.MathUtils.mapLinear(
                    THREE.MathUtils.clamp(data.waveHeight, 0.3, 3.0),
                    0.3, 3.0,
                    1.2, 0.5
                );
            }

            // Roughness: higher winds → rougher surface micro-detail
            if (data.windSpeed !== null) {
                mapped.roughness = THREE.MathUtils.mapLinear(
                    THREE.MathUtils.clamp(data.windSpeed, 1, 20),
                    1, 20,
                    0.03, 0.18
                );
            }

            return mapped;
        }

        // Smoothly apply mapped values to uniforms
        function applyOceanParams(mapped, instant = false) {
            if (!mapped) return;

            ndbcState.target = mapped;

            if (instant) {
                applyParamsImmediate(mapped);
            } else {
                ndbcState.lerpStart = performance.now();
                ndbcState.isLerping = true;
                if (!ndbcState.current) {
                    ndbcState.current = { ...mapped };
                    applyParamsImmediate(mapped);
                }
            }
        }

        function applyParamsImmediate(m) {
            if (m.windSpeed !== undefined) { windSpeed.value = m.windSpeed; params.windSpeed = m.windSpeed; }
            if (m.heightScale !== undefined) { heightScale.value = m.heightScale; params.heightScale = m.heightScale; }
            if (m.choppiness !== undefined) { choppiness.value = m.choppiness; params.choppiness = m.choppiness; }
            if (m.windDirRad !== undefined) { windDir.value = m.windDirRad; }
            if (m.foamThreshold !== undefined) { foamThreshold.value = m.foamThreshold; params.foamThreshold = m.foamThreshold; }
            if (m.foamIntensity !== undefined) { foamIntensity.value = m.foamIntensity; params.foamIntensity = m.foamIntensity; }
            if (m.sssIntensity !== undefined) { sssIntensity.value = m.sssIntensity; params.sssIntensity = m.sssIntensity; }
            if (m.roughness !== undefined) { roughness_u.value = m.roughness; params.roughness = m.roughness; }

            ndbcState.current = { ...m };

            // Re-init wave spectrum when wind changes
            if (m.windSpeed !== undefined || m.windDirRad !== undefined) {
                renderer.compute(initWaves);
            }
        }

        function lerpParam(key, current, target, t) {
            if (target[key] === undefined) return current[key];
            if (current[key] === undefined) return target[key];
            return current[key] + (target[key] - current[key]) * t;
        }

        function updateNDBCLerp() {
            if (!ndbcState.isLerping || !ndbcState.target || !ndbcState.current) return;

            const elapsed = performance.now() - ndbcState.lerpStart;
            const t = Math.min(elapsed / ndbcState.lerpDuration, 1);
            // Smooth ease-in-out
            const ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;

            const lerped = {};
            for (const key of Object.keys(ndbcState.target)) {
                lerped[key] = lerpParam(key, ndbcState.current, ndbcState.target, ease);
            }
            applyParamsImmediate(lerped);

            if (t >= 1) {
                ndbcState.isLerping = false;
                ndbcState.current = { ...ndbcState.target };
            }
        }

        // ─── Unit System Toggle ─────────────────────────────────────────────────────
        let useImperial = false; // false = metric, true = imperial
        try { useImperial = localStorage.getItem('ndbc-units') === 'imperial'; } catch (e) { }

        function mToFt(m) { return m * 3.28084; }
        function msToMph(ms) { return ms * 2.23694; }
        function msToKnots(ms) { return ms * 1.94384; }
        function cToF(c) { return c * 9 / 5 + 32; }
        function hpaToInhg(hpa) { return hpa * 0.02953; }

        function fmtWaveHeight(v) {
            if (v === null) return 'N/A';
            return useImperial ? mToFt(v).toFixed(1) + ' ft' : v.toFixed(2) + ' m';
        }
        function fmtWaveHeightShort(v) {
            if (v === null) return '—';
            return useImperial ? mToFt(v).toFixed(1) + 'ft' : v.toFixed(1) + 'm';
        }
        function fmtWindSpeed(v, est) {
            if (v === null) return 'N/A';
            const suffix = est ? '~' : '';
            return useImperial ? msToMph(v).toFixed(1) + ' mph' + suffix : v.toFixed(1) + ' m/s' + suffix;
        }
        function fmtWindSpeedShort(v, est) {
            if (v === null) return '—';
            const suffix = est ? '~' : '';
            return useImperial ? msToMph(v).toFixed(1) + 'mph' + suffix : v.toFixed(1) + 'm/s' + suffix;
        }
        function fmtGust(v) {
            if (v === null) return 'N/A';
            return useImperial ? msToMph(v).toFixed(1) + ' mph' : v.toFixed(1) + ' m/s';
        }
        function fmtTemp(v) {
            if (v === null) return 'N/A';
            return useImperial ? cToF(v).toFixed(1) + ' °F' : v.toFixed(1) + ' °C';
        }
        function fmtTempShort(v) {
            if (v === null) return '';
            return useImperial ? cToF(v).toFixed(0) + '°F' : v.toFixed(0) + '°C';
        }
        function fmtPressure(v) {
            if (v === null) return 'N/A';
            return useImperial ? hpaToInhg(v).toFixed(2) + ' inHg' : v.toFixed(1) + ' hPa';
        }

        // UI update
        function updateNDBCUI(data) {
            ndbcState.latestData = data;
            const dot = document.getElementById('ndbc-dot');
            const details = document.getElementById('ndbc-details');
            const card = document.getElementById('ndbc-card');

            dot.className = '';
            if (ndbcState.status === 'live') dot.classList.add('live');
            else if (ndbcState.status === 'stale') dot.classList.add('stale');
            else if (ndbcState.status === 'error') dot.classList.add('error');

            if (ndbcState.status === 'error') {
                details.textContent = 'Fetch failed — using defaults';
                if (card) card.innerHTML = '<div class="ndbc-card-title">No data available</div>';
                return;
            }

            if (!data) {
                details.textContent = 'Connecting…';
                return;
            }

            // Summary line
            const wh = fmtWaveHeightShort(data.waveHeight);
            const wp = data.wavePeriod !== null ? `${data.wavePeriod.toFixed(0)}s` : '—';
            const ws = fmtWindSpeedShort(data.windSpeed, data.windSpeedEstimated);
            const wt = fmtTempShort(data.waterTemp);
            details.textContent = `Hs ${wh} · T ${wp} · Wind ${ws}${wt ? ' · ' + wt : ''}`;

            // Expanded card
            if (card) {
                const metricActive = !useImperial ? 'active' : '';
                const imperialActive = useImperial ? 'active' : '';
                card.innerHTML = `
      <div class="ndbc-card-title">Live Buoy Data</div>
      <div class="unit-toggle-row">
        <span class="unit-toggle-label">Units</span>
        <div class="unit-toggle">
          <button class="unit-toggle-btn ${metricActive}" data-unit="metric">Metric</button>
          <button class="unit-toggle-btn ${imperialActive}" data-unit="imperial">Imperial</button>
        </div>
      </div>
      <div class="ndbc-card-row"><span class="ndbc-card-label">Wave Height (Hs)</span><span class="ndbc-card-value">${fmtWaveHeight(data.waveHeight)}</span></div>
      <div class="ndbc-card-row"><span class="ndbc-card-label">Dom. Period (Tp)</span><span class="ndbc-card-value">${data.wavePeriod !== null ? data.wavePeriod.toFixed(1) + ' s' : 'N/A'}</span></div>
      <div class="ndbc-card-row"><span class="ndbc-card-label">Avg. Period</span><span class="ndbc-card-value">${data.avgPeriod !== null ? data.avgPeriod.toFixed(1) + ' s' : 'N/A'}</span></div>
      <div class="ndbc-card-row"><span class="ndbc-card-label">Wave Dir (from)</span><span class="ndbc-card-value">${data.waveDir !== null ? data.waveDir.toFixed(0) + '°' : 'N/A'}</span></div>
      <div class="ndbc-card-divider"></div>
      <div class="ndbc-card-row"><span class="ndbc-card-label">Wind Speed${data.windSpeedEstimated ? ' (est.)' : ''}</span><span class="ndbc-card-value">${fmtWindSpeed(data.windSpeed, data.windSpeedEstimated)}</span></div>
      <div class="ndbc-card-row"><span class="ndbc-card-label">Wind Gust</span><span class="ndbc-card-value">${fmtGust(data.windGust)}</span></div>
      <div class="ndbc-card-row"><span class="ndbc-card-label">Wind Dir (from)</span><span class="ndbc-card-value">${data.windDir !== null ? data.windDir.toFixed(0) + '°' : 'N/A'}</span></div>
      <div class="ndbc-card-divider"></div>
      <div class="ndbc-card-row"><span class="ndbc-card-label">Water Temp</span><span class="ndbc-card-value">${fmtTemp(data.waterTemp)}</span></div>
      <div class="ndbc-card-row"><span class="ndbc-card-label">Air Temp</span><span class="ndbc-card-value">${fmtTemp(data.airTemp)}</span></div>
      <div class="ndbc-card-row"><span class="ndbc-card-label">Pressure</span><span class="ndbc-card-value">${fmtPressure(data.pressure)}</span></div>
      <div class="ndbc-card-ts">${data.timestamp || 'Unknown time'}</div>
      <div class="ndbc-card-divider"></div>
      <a class="ndbc-card-link" href="https://www.ndbc.noaa.gov/station_page.php?station=${currentStationId}" target="_blank" rel="noopener noreferrer">View on NDBC.noaa.gov ↗</a>
    `;

                // Attach toggle listeners
                card.querySelectorAll('.unit-toggle-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const isImp = btn.dataset.unit === 'imperial';
                        if (isImp !== useImperial) {
                            useImperial = isImp;
                            try { localStorage.setItem('ndbc-units', isImp ? 'imperial' : 'metric'); } catch (e) { }
                            updateNDBCUI(ndbcState.latestData);
                        }
                    });
                });
            }
        }

        // Try fetching from multiple CORS proxy URLs in sequence
        async function fetchWithFallback(stationId) {
            const { direct, proxies } = getNDBCUrls(stationId);
            for (const url of proxies) {
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 8000);
                    const resp = await fetch(url, { signal: controller.signal });
                    clearTimeout(timeoutId);
                    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                    const text = await resp.text();
                    if (!text.trim().startsWith('#')) throw new Error('Invalid NDBC response');
                    return text;
                } catch (err) {
                    console.warn(`[NDBC] Proxy failed (${url.slice(0, 40)}…): ${err.message}`);
                }
            }
            try {
                const resp = await fetch(direct);
                if (resp.ok) return await resp.text();
            } catch (_) { }
            return null;
        }

        // Sensible defaults when fetch fails (varies by latitude)
        function getSeasonalDefaults(stationId) {
            const info = STATION_DB[stationId];
            const lat = info ? Math.abs(info[0]) : 28;
            const isHighLat = lat > 45;
            const isTropical = lat < 25;
            return {
                waveHeight: isHighLat ? 2.0 : isTropical ? 0.7 : 1.0,
                wavePeriod: isHighLat ? 10 : isTropical ? 7 : 8,
                avgPeriod: isHighLat ? 7 : isTropical ? 5 : 5.5,
                waveDir: 180,
                windSpeed: isHighLat ? 8 : isTropical ? 4 : 5.5,
                windDir: 180, windGust: null,
                pressure: 1016,
                waterTemp: isHighLat ? 8 : isTropical ? 28 : 22,
                airTemp: isHighLat ? 6 : isTropical ? 30 : 24,
                windSpeedEstimated: true,
                timestamp: 'Seasonal defaults (fetch failed)',
            };
        }

        async function fetchNDBCData() {
            const stationId = currentStationId;
            const text = await fetchWithFallback(stationId);

            if (stationId !== currentStationId) return; // station changed during fetch

            if (text) {
                const data = parseNDBCText(text);
                if (data && (data.waveHeight !== null || data.windSpeed !== null)) {
                    ndbcState.lastGood = data;
                    ndbcState.lastFetch = Date.now();
                    ndbcState.status = 'live';

                    const mapped = mapNDBCToOcean(data);
                    applyOceanParams(mapped, ndbcState.current === null);
                    updateNDBCUI(data);

                    console.log(`[NDBC ${stationId}] Live data applied:`, data);
                    return;
                }
            }

            if (ndbcState.lastGood) {
                ndbcState.status = 'stale';
                updateNDBCUI(ndbcState.lastGood);
            } else {
                ndbcState.status = 'error';
                const defaults = getSeasonalDefaults(stationId);
                ndbcState.lastGood = defaults;
                const mapped = mapNDBCToOcean(defaults);
                applyOceanParams(mapped, true);
                updateNDBCUI(defaults);
                console.warn(`[NDBC ${stationId}] Using seasonal defaults`);
            }
        }

        // Initialize NDBC polling
        fetchNDBCData();
        let ndbcPollTimer = setInterval(fetchNDBCData, NDBC_POLL_INTERVAL);

        // Re-start poll timer on station change (handled inside select listener above)
        const origFetch = fetchNDBCData;

        // Foam noise type: 0=Domain Warp, 1=Ridged, 2=Cellular, 3=Billow, 4=Swiss, 5=Turbulent
        const foamNoiseType = uniform(0);

        // Height-based color gradient
        const heightColorLow = uniform(new THREE.Color('#021a35'));
        const heightColorMid = uniform(new THREE.Color('#064273'));
        const heightColorHigh = uniform(new THREE.Color('#1a8a7d'));
        const heightColorPeak = uniform(new THREE.Color('#5ec4b0'));
        const heightColorIntensity = uniform(0.6);

        // ─── GPU Buffers ─────────────────────────────────────────────────────────────
        const waveData = instancedArray(TOTAL_WAVES, 'vec4');
        const waveExtra = instancedArray(TOTAL_WAVES, 'vec4');
        const dispGridCoarse = instancedArray(FFT_SIZE_SQ, 'vec4');
        const dispGridFine = instancedArray(FFT_SIZE_SQ, 'vec4');
        const slopeGridCoarse = instancedArray(FFT_SIZE_SQ, 'vec4');
        const slopeGridFine = instancedArray(FFT_SIZE_SQ, 'vec4');

        // ─── Compute: Init JONSWAP Spectrum ──────────────────────────────────────────
        const initWaves = Fn(() => {
            const i = instanceIndex;
            const cascadeIdx = i.div(WAVES_PER_CASCADE);
            const localIdx = i.mod(WAVES_PER_CASCADE);

            const nx = localIdx.mod(GRID_K).sub(GRID_K / 2).toFloat();
            const nz = localIdx.div(GRID_K).sub(GRID_K / 2).toFloat();

            const patchSize = select(cascadeIdx.equal(0), float(PATCH_COARSE), float(PATCH_FINE));
            const dk = TWO_PI.div(patchSize);

            const kx = nx.mul(dk);
            const kz = nz.mul(dk);
            const k = sqrt(kx.mul(kx).add(kz.mul(kz))).max(0.0001);
            const omega = sqrt(float(G).mul(k));

            const dirX = kx.div(k);
            const dirZ = kz.div(k);

            const wSpeed = max(windSpeed, float(0.5));
            const L = wSpeed.mul(wSpeed).div(float(G));
            const kL = k.mul(L);
            const k4 = k.mul(k).mul(k).mul(k);
            const phillips = float(0.01).div(k4).mul(exp(float(-1.0).div(kL.mul(kL))));

            const omegaP = float(G).mul(0.87).div(wSpeed);
            const sigma = select(omega.lessThanEqual(omegaP), float(0.07), float(0.09));
            const rArg = omega.sub(omegaP).mul(omega.sub(omegaP)).negate()
                .div(float(2.0).mul(sigma).mul(sigma).mul(omegaP).mul(omegaP));
            const jonswap = pow(float(3.3), exp(rArg));

            const waveAngle = atan(kz, kx);
            const cosA = cos(waveAngle.sub(windDir));
            const directional = pow(max(cosA, float(0)), 2);

            const suppress = exp(k.mul(k).mul(-0.0001));

            const S = phillips.mul(jonswap).mul(directional).mul(suppress);
            const isCenter = abs(nx).lessThan(0.5).and(abs(nz).lessThan(0.5));
            const amp = select(isCenter, float(0), sqrt(S).mul(dk).mul(heightScale));

            const phase = hash(i.add(12345)).mul(TWO_PI);

            waveData.element(i).assign(vec4(dirX, dirZ, omega, amp));
            waveExtra.element(i).assign(vec4(k, phase, float(0), float(0)));
        })().compute(TOTAL_WAVES);

        // ─── Compute: Ocean Displacement per Cascade ─────────────────────────────────
        function makeOceanCompute(dispGrid, slopeGrid, waveStart, waveCount, patchSizeVal) {
            const ps = float(patchSizeVal);

            return Fn(() => {
                const idx = instanceIndex;
                const gx = idx.mod(FFT_SIZE);
                const gz = idx.div(FFT_SIZE);
                const wx = gx.toFloat().div(float(FFT_SIZE)).mul(ps);
                const wz = gz.toFloat().div(float(FFT_SIZE)).mul(ps);

                const dy = float(0).toVar();
                const dx = float(0).toVar();
                const dz = float(0).toVar();
                const slopeX = float(0).toVar();
                const slopeZ = float(0).toVar();
                const Jxx = float(0).toVar();
                const Jzz = float(0).toVar();
                const Jxz = float(0).toVar();

                Loop(waveCount, ({ i }) => {
                    const wi = i.add(waveStart);
                    const wd = waveData.element(wi);
                    const we = waveExtra.element(wi);

                    const dX = wd.x;
                    const dZ = wd.y;
                    const omega = wd.z;
                    const amp_w = wd.w;
                    const k = we.x;
                    const phase = we.y;

                    const theta = k.mul(dX.mul(wx).add(dZ.mul(wz))).sub(omega.mul(time)).add(phase);
                    const c = cos(theta);
                    const s = sin(theta);

                    dy.addAssign(amp_w.mul(c));
                    dx.subAssign(amp_w.mul(dX).mul(s));
                    dz.subAssign(amp_w.mul(dZ).mul(s));

                    slopeX.subAssign(amp_w.mul(k).mul(dX).mul(s));
                    slopeZ.subAssign(amp_w.mul(k).mul(dZ).mul(s));

                    Jxx.subAssign(amp_w.mul(k).mul(dX).mul(dX).mul(c));
                    Jzz.subAssign(amp_w.mul(k).mul(dZ).mul(dZ).mul(c));
                    Jxz.subAssign(amp_w.mul(k).mul(dX).mul(dZ).mul(c));
                });

                dispGrid.element(idx).assign(vec4(dx.mul(choppiness), dy, dz.mul(choppiness), Jxz.mul(choppiness)));
                slopeGrid.element(idx).assign(vec4(slopeX, slopeZ, Jxx.mul(choppiness), Jzz.mul(choppiness)));
            })().compute(FFT_SIZE_SQ);
        }

        const computeOceanCoarse = makeOceanCompute(dispGridCoarse, slopeGridCoarse, 0, WAVES_PER_CASCADE, PATCH_COARSE);
        const computeOceanFine = makeOceanCompute(dispGridFine, slopeGridFine, WAVES_PER_CASCADE, WAVES_PER_CASCADE, PATCH_FINE);

        // ─── Grid Sampler ────────────────────────────────────────────────────────────
        function sampleGrid(grid, wx, wz, patchSizeVal) {
            const ps = float(patchSizeVal);
            const u = fract(wx.div(ps)).mul(float(FFT_SIZE));
            const v = fract(wz.div(ps)).mul(float(FFT_SIZE));
            const ix = floor(u).toInt();
            const iz = floor(v).toInt();
            const fx = fract(u);
            const fz = fract(v);
            const N = int(FFT_SIZE);
            const i00 = iz.mul(N).add(ix);
            const i10 = iz.mul(N).add(ix.add(1).mod(N));
            const i01 = iz.add(1).mod(N).mul(N).add(ix);
            const i11 = iz.add(1).mod(N).mul(N).add(ix.add(1).mod(N));
            return mix(
                mix(grid.element(i00), grid.element(i10), fx),
                mix(grid.element(i01), grid.element(i11), fx),
                fz,
            );
        }

        // ─── Gerstner Swell ──────────────────────────────────────────────────────────
        const SWELLS = [
            { dx: 0.9, dz: 0.44, wavelength: 120, steepness: 0.18 },
            { dx: -0.3, dz: 0.95, wavelength: 80, steepness: 0.13 },
            { dx: 0.6, dz: -0.8, wavelength: 200, steepness: 0.10 },
            { dx: 0.7, dz: 0.7, wavelength: 400, steepness: 0.06 },
            { dx: -0.5, dz: 0.86, wavelength: 600, steepness: 0.04 },
            { dx: 0.4, dz: 0.92, wavelength: 55, steepness: 0.12 },
        ];

        const SWELL_PARAMS = SWELLS.map((sw) => {
            const len = Math.sqrt(sw.dx * sw.dx + sw.dz * sw.dz);
            const ndx = sw.dx / len;
            const ndz = sw.dz / len;
            const k = (2 * Math.PI) / sw.wavelength;
            const omega = Math.sqrt(G * k);
            const amp = sw.steepness / k;
            return { ndx, ndz, k, omega, amp };
        });

        function buildGerstnerSwells(wx, wz) {
            let dy = float(0);
            let dx = float(0);
            let dz = float(0);
            for (const p of SWELL_PARAMS) {
                const theta = float(p.k).mul(float(p.ndx).mul(wx).add(float(p.ndz).mul(wz))).sub(float(p.omega).mul(time));
                const c = cos(theta);
                const s = sin(theta);
                dy = dy.add(float(p.amp).mul(c));
                dx = dx.sub(float(p.amp * p.ndx).mul(s));
                dz = dz.sub(float(p.amp * p.ndz).mul(s));
            }
            return { dx, dy, dz };
        }

        function buildGerstnerSwellJacobian(wx, wz) {
            let Jxx = float(0);
            let Jzz = float(0);
            let Jxz = float(0);
            for (const p of SWELL_PARAMS) {
                const theta = float(p.k).mul(float(p.ndx).mul(wx).add(float(p.ndz).mul(wz))).sub(float(p.omega).mul(time));
                const c = cos(theta);
                Jxx = Jxx.sub(float(p.amp * p.k * p.ndx * p.ndx).mul(c));
                Jzz = Jzz.sub(float(p.amp * p.k * p.ndz * p.ndz).mul(c));
                Jxz = Jxz.sub(float(p.amp * p.k * p.ndx * p.ndz).mul(c));
            }
            return { Jxx, Jzz, Jxz };
        }

        // ─── Ocean Geometry ──────────────────────────────────────────────────────────
        const oceanGeo = new THREE.PlaneGeometry(2000, 2000, 512, 512);
        oceanGeo.rotateX(-Math.PI / 2);

        // ─── Ocean Material ──────────────────────────────────────────────────────────
        const oceanMat = new THREE.MeshBasicNodeMaterial({ side: THREE.DoubleSide });

        oceanMat.positionNode = Fn(() => {
            const wx = positionGeometry.x;
            const wz = positionGeometry.z;

            const dCoarse = sampleGrid(dispGridCoarse, wx, wz, PATCH_COARSE);
            const dFine = sampleGrid(dispGridFine, wx, wz, PATCH_FINE);
            const swell = buildGerstnerSwells(wx, wz);

            const totalDx = dCoarse.x.add(dFine.x).add(swell.dx);
            const totalDy = dCoarse.y.add(dFine.y).add(swell.dy);
            const totalDz = dCoarse.z.add(dFine.z).add(swell.dz);

            return vec3(wx.add(totalDx), totalDy, wz.add(totalDz));
        })();

        oceanMat.colorNode = Fn(() => {
            const wx = positionGeometry.x;
            const wz = positionGeometry.z;

            const slCoarse = sampleGrid(slopeGridCoarse, wx, wz, PATCH_COARSE);
            const slFine = sampleGrid(slopeGridFine, wx, wz, PATCH_FINE);
            const dCoarse = sampleGrid(dispGridCoarse, wx, wz, PATCH_COARSE);
            const dFine = sampleGrid(dispGridFine, wx, wz, PATCH_FINE);

            const gridJxx = slCoarse.z.add(slFine.z);
            const gridJzz = slCoarse.w.add(slFine.w);
            const gridJxz = dCoarse.w.add(dFine.w);

            const swellJ = buildGerstnerSwellJacobian(wx, wz);
            const totalJxx = gridJxx.add(swellJ.Jxx);
            const totalJzz = gridJzz.add(swellJ.Jzz);
            const totalJxz = gridJxz.add(swellJ.Jxz);

            const J = float(1).add(totalJxx).mul(float(1).add(totalJzz)).sub(totalJxz.mul(totalJxz));

            const foamEdgeUV = vec2(wx, wz);
            const ft = time.mul(0.15);

            // === Shared noise samples at multiple octaves ===
            // Shared noise samples (3 octaves instead of 5 for perf)
            const warpScale = fbmNoiseFreq.mul(0.3);
            const warpX = mx_noise_float(foamEdgeUV.mul(warpScale).add(vec2(ft.mul(0.2), float(0)))).mul(1.8);
            const warpZ = mx_noise_float(foamEdgeUV.mul(warpScale).add(vec2(float(0), ft.mul(-0.15)))).mul(1.8);
            const warpedUV = foamEdgeUV.add(vec2(warpX, warpZ));

            const n1f = mx_noise_float(warpedUV.mul(fbmNoiseFreq).add(vec2(ft.mul(0.35), ft.mul(-0.2))));
            const n2f = mx_noise_float(warpedUV.mul(fbmNoiseFreq.mul(2.3)).add(vec2(ft.mul(-0.25), ft.mul(0.4))));
            const n3f = mx_noise_float(warpedUV.mul(fbmNoiseFreq.mul(5.7)).add(vec2(ft.mul(0.5), ft.mul(0.15))));

            // Unified 3-octave FBM used as base for all foam noise types
            const baseFbm = n1f.mul(0.5).add(n2f.mul(0.3)).add(n3f.mul(0.2));

            // Derive all noise variants from shared samples (no extra texture fetches)
            // --- Type 0: Domain Warp ---
            const ridgedDW = float(1.0).sub(abs(baseFbm.mul(2.0).sub(1.0)));
            const noiseDomainWarp = mix(baseFbm, ridgedDW, float(0.4));

            // --- Type 1: Ridged Multifractal ---
            const r1 = float(1.0).sub(abs(n1f.mul(2.0).sub(1.0)));
            const r2 = float(1.0).sub(abs(n2f.mul(2.0).sub(1.0)));
            const r3 = float(1.0).sub(abs(n3f.mul(2.0).sub(1.0)));
            const noiseRidged = r1.mul(0.5).add(r2.mul(r1).mul(0.3)).add(r3.mul(r2).mul(0.2));

            // --- Type 2: Cellular / Voronoi-like (2 offset samples instead of 4) ---
            const cUV = foamEdgeUV.mul(fbmNoiseFreq.mul(0.8)).add(vec2(ft.mul(0.2), ft.mul(-0.15)));
            const c1 = mx_noise_float(cUV);
            const c2 = mx_noise_float(cUV.add(vec2(0.33, 0.77)));
            const noiseCellular = float(1.0).sub(abs(c1.sub(c2))).mul(1.5);

            // --- Type 3: Billow ---
            const b1 = abs(n1f.mul(2.0).sub(1.0));
            const b2 = abs(n2f.mul(2.0).sub(1.0));
            const b3 = abs(n3f.mul(2.0).sub(1.0));
            const noiseBillow = b1.mul(0.5).add(b2.mul(0.3)).add(b3.mul(0.2));

            // --- Type 4: Swiss (2 octaves instead of 3) ---
            const sw1 = float(1.0).sub(abs(n1f.mul(2.0).sub(1.0)));
            const sw1sq = sw1.mul(sw1);
            const swWarp = warpedUV.add(vec2(sw1.mul(0.3), sw1.mul(-0.25)));
            const sw2raw = mx_noise_float(swWarp.mul(fbmNoiseFreq.mul(2.5)).add(vec2(ft.mul(-0.3), ft.mul(0.2))));
            const sw2 = float(1.0).sub(abs(sw2raw.mul(2.0).sub(1.0))).mul(sw1sq);
            const noiseSwiss = sw1.mul(0.6).add(sw2.mul(0.4));

            // --- Type 5: Turbulent (3 octaves instead of 4) ---
            const t1 = abs(n1f.mul(2.0).sub(1.0));
            const t2 = abs(n2f.mul(2.0).sub(1.0));
            const t3 = abs(n3f.mul(2.0).sub(1.0));
            const noiseTurbulent = float(1.0).sub(t1.mul(0.45).add(t2.mul(0.35)).add(t3.mul(0.2)));

            // Select noise type via step functions
            const isType0 = smoothstep(float(-0.5), float(0.5), foamNoiseType.negate());
            const isType1 = smoothstep(float(0.5), float(1.5), foamNoiseType).mul(smoothstep(float(1.5), float(0.5), foamNoiseType));
            const isType2 = smoothstep(float(1.5), float(2.5), foamNoiseType).mul(smoothstep(float(2.5), float(1.5), foamNoiseType));
            const isType3 = smoothstep(float(2.5), float(3.5), foamNoiseType).mul(smoothstep(float(3.5), float(2.5), foamNoiseType));
            const isType4 = smoothstep(float(3.5), float(4.5), foamNoiseType).mul(smoothstep(float(4.5), float(3.5), foamNoiseType));
            const isType5 = smoothstep(float(4.5), float(5.5), foamNoiseType);

            const foamNoise = noiseDomainWarp.mul(isType0)
                .add(noiseRidged.mul(isType1))
                .add(noiseCellular.mul(isType2))
                .add(noiseBillow.mul(isType3))
                .add(noiseSwiss.mul(isType4))
                .add(noiseTurbulent.mul(isType5))
                .mul(fbmNoiseAmp);

            const foamEdge = foamThreshold.add(foamNoise);
            const foamRaw = pow(smoothstep(foamEdge, foamEdge.sub(0.6), J), foamPower);
            const foamMask = clamp(foamRaw.mul(foamIntensity), 0, 1);

            const sX = slCoarse.x.add(slFine.x);
            const sZ = slCoarse.y.add(slFine.y);

            // Procedural normal-map detail via multi-octave noise derivatives
            const detailUV = vec2(wx, wz);
            const t = time.mul(0.3);
            const eps = float(0.01);
            const epsF = float(0.005);
            const epsVF = float(0.002);

            // ── Bump noise: 2 octaves with distance LOD ──
            const nFreq1 = float(0.8).mul(bumpFrequencyU);
            const nFreq2 = float(3.2).mul(bumpFrequencyU);
            const tOff1 = vec2(t.mul(0.4), t.mul(0.2));
            const tOff2 = vec2(t.mul(-0.6), t.mul(0.35));

            // Shared base noise samples (reused across all bump types)
            const bn1 = mx_noise_float(detailUV.mul(nFreq1).add(tOff1));
            const bn1px = mx_noise_float(detailUV.mul(nFreq1).add(vec2(eps, float(0))).add(tOff1));
            const bn1pz = mx_noise_float(detailUV.mul(nFreq1).add(vec2(float(0), eps)).add(tOff1));
            const bn2 = mx_noise_float(detailUV.mul(nFreq2).add(tOff2));
            const bn2px = mx_noise_float(detailUV.mul(nFreq2).add(vec2(epsF, float(0))).add(tOff2));
            const bn2pz = mx_noise_float(detailUV.mul(nFreq2).add(vec2(float(0), epsF)).add(tOff2));

            // Finite-difference derivatives from shared samples
            const d1x = bn1px.sub(bn1).mul(100.0);
            const d1z = bn1pz.sub(bn1).mul(100.0);
            const d2x = bn2px.sub(bn2).mul(200.0);
            const d2z = bn2pz.sub(bn2).mul(200.0);

            // === Type 0: Standard Perlin ===
            const perlinBumpX = d1x.mul(0.6).add(d2x.mul(0.4));
            const perlinBumpZ = d1z.mul(0.6).add(d2z.mul(0.4));

            // === Type 1: Ridged ===
            const rbn1 = float(1.0).sub(abs(bn1.mul(2.0).sub(1.0)));
            const rbn1px = float(1.0).sub(abs(bn1px.mul(2.0).sub(1.0)));
            const rbn1pz = float(1.0).sub(abs(bn1pz.mul(2.0).sub(1.0)));
            const rbn2 = float(1.0).sub(abs(bn2.mul(2.0).sub(1.0)));
            const rbn2px = float(1.0).sub(abs(bn2px.mul(2.0).sub(1.0)));
            const rbn2pz = float(1.0).sub(abs(bn2pz.mul(2.0).sub(1.0)));
            const ridgedBumpX = rbn1px.sub(rbn1).mul(100.0).mul(0.6).add(rbn2px.sub(rbn2).mul(200.0).mul(0.4));
            const ridgedBumpZ = rbn1pz.sub(rbn1).mul(100.0).mul(0.6).add(rbn2pz.sub(rbn2).mul(200.0).mul(0.4));

            // === Type 2: Domain Warped ===
            const dwWarpN = mx_noise_float(detailUV.mul(0.4).add(vec2(t.mul(0.15), t.mul(-0.1))));
            const dwOff = vec2(dwWarpN.mul(0.3), dwWarpN.mul(-0.25));
            const dwUV = detailUV.add(dwOff);
            const dw1 = mx_noise_float(dwUV.mul(nFreq1).add(tOff1));
            const dw1dx = mx_noise_float(dwUV.mul(nFreq1).add(vec2(eps, float(0))).add(tOff1)).sub(dw1).mul(100.0);
            const dw1dz = mx_noise_float(dwUV.mul(nFreq1).add(vec2(float(0), eps)).add(tOff1)).sub(dw1).mul(100.0);
            const dwBumpX = dw1dx;
            const dwBumpZ = dw1dz;

            // === Type 3: Billow ===
            const bbn1 = abs(bn1.mul(2.0).sub(1.0));
            const bbn1px = abs(bn1px.mul(2.0).sub(1.0));
            const bbn1pz = abs(bn1pz.mul(2.0).sub(1.0));
            const bbn2 = abs(bn2.mul(2.0).sub(1.0));
            const bbn2px = abs(bn2px.mul(2.0).sub(1.0));
            const bbn2pz = abs(bn2pz.mul(2.0).sub(1.0));
            const billowBumpX = bbn1px.sub(bbn1).mul(100.0).mul(0.6).add(bbn2px.sub(bbn2).mul(200.0).mul(0.4));
            const billowBumpZ = bbn1pz.sub(bbn1).mul(100.0).mul(0.6).add(bbn2pz.sub(bbn2).mul(200.0).mul(0.4));

            // === Type 4: Crosshatch ===
            const chFreq1 = nFreq1.mul(1.2);
            const chA1 = mx_noise_float(vec2(detailUV.x.mul(chFreq1).add(detailUV.y.mul(0.3)), detailUV.y.mul(chFreq1).sub(detailUV.x.mul(0.3))).add(tOff1));
            const chB1 = mx_noise_float(vec2(detailUV.x.mul(chFreq1).sub(detailUV.y.mul(0.5)), detailUV.y.mul(chFreq1).add(detailUV.x.mul(0.5))).add(tOff1.mul(-0.7)));
            const ch1 = chA1.mul(0.5).add(chB1.mul(0.5));
            const chA1px = mx_noise_float(vec2(detailUV.x.add(eps).mul(chFreq1).add(detailUV.y.mul(0.3)), detailUV.y.mul(chFreq1).sub(detailUV.x.add(eps).mul(0.3))).add(tOff1));
            const chB1px = mx_noise_float(vec2(detailUV.x.add(eps).mul(chFreq1).sub(detailUV.y.mul(0.5)), detailUV.y.mul(chFreq1).add(detailUV.x.add(eps).mul(0.5))).add(tOff1.mul(-0.7)));
            const ch1px = chA1px.mul(0.5).add(chB1px.mul(0.5));
            const chA1pz = mx_noise_float(vec2(detailUV.x.mul(chFreq1).add(detailUV.y.add(eps).mul(0.3)), detailUV.y.add(eps).mul(chFreq1).sub(detailUV.x.mul(0.3))).add(tOff1));
            const chB1pz = mx_noise_float(vec2(detailUV.x.mul(chFreq1).sub(detailUV.y.add(eps).mul(0.5)), detailUV.y.add(eps).mul(chFreq1).add(detailUV.x.mul(0.5))).add(tOff1.mul(-0.7)));
            const ch1pz = chA1pz.mul(0.5).add(chB1pz.mul(0.5));
            const crossBumpX = ch1px.sub(ch1).mul(100.0);
            const crossBumpZ = ch1pz.sub(ch1).mul(100.0);

            // === Type 5: FBM (4 octaves, distance-culled) ===
            const fbmFreqs = [nFreq1, nFreq1.mul(2.0), nFreq1.mul(4.0), nFreq1.mul(8.0)];
            const fbmWeights = [0.4, 0.3, 0.2, 0.1];
            const fbmTimeOffsets = [tOff1, tOff2, vec2(t.mul(0.55), t.mul(-0.3)), vec2(t.mul(-0.25), t.mul(0.6))];
            const fbmEpsArr = [eps, epsF, epsF, epsVF];
            const fbmDerScale = [100.0, 200.0, 200.0, 500.0];

            let fbmBumpXAcc = float(0);
            let fbmBumpZAcc = float(0);
            for (let oi = 0; oi < 4; oi++) {
                const fn0 = mx_noise_float(detailUV.mul(fbmFreqs[oi]).add(fbmTimeOffsets[oi]));
                const fnpx = mx_noise_float(detailUV.mul(fbmFreqs[oi]).add(vec2(fbmEpsArr[oi], float(0))).add(fbmTimeOffsets[oi]));
                const fnpz = mx_noise_float(detailUV.mul(fbmFreqs[oi]).add(vec2(float(0), fbmEpsArr[oi])).add(fbmTimeOffsets[oi]));
                fbmBumpXAcc = fbmBumpXAcc.add(fnpx.sub(fn0).mul(fbmDerScale[oi]).mul(fbmWeights[oi]));
                fbmBumpZAcc = fbmBumpZAcc.add(fnpz.sub(fn0).mul(fbmDerScale[oi]).mul(fbmWeights[oi]));
            }
            const fbmBumpX = fbmBumpXAcc;
            const fbmBumpZ = fbmBumpZAcc;

            // Select bump noise type
            const bIsT0 = smoothstep(float(-0.5), float(0.5), bumpNoiseType.negate());
            const bIsT1 = smoothstep(float(0.5), float(1.5), bumpNoiseType).mul(smoothstep(float(1.5), float(0.5), bumpNoiseType));
            const bIsT2 = smoothstep(float(1.5), float(2.5), bumpNoiseType).mul(smoothstep(float(2.5), float(1.5), bumpNoiseType));
            const bIsT3 = smoothstep(float(2.5), float(3.5), bumpNoiseType).mul(smoothstep(float(3.5), float(2.5), bumpNoiseType));
            const bIsT4 = smoothstep(float(3.5), float(4.5), bumpNoiseType).mul(smoothstep(float(4.5), float(3.5), bumpNoiseType));
            const bIsT5 = smoothstep(float(4.5), float(5.5), bumpNoiseType);

            const selectedBumpX = perlinBumpX.mul(bIsT0)
                .add(ridgedBumpX.mul(bIsT1))
                .add(dwBumpX.mul(bIsT2))
                .add(billowBumpX.mul(bIsT3))
                .add(crossBumpX.mul(bIsT4))
                .add(fbmBumpX.mul(bIsT5));
            const selectedBumpZ = perlinBumpZ.mul(bIsT0)
                .add(ridgedBumpZ.mul(bIsT1))
                .add(dwBumpZ.mul(bIsT2))
                .add(billowBumpZ.mul(bIsT3))
                .add(crossBumpZ.mul(bIsT4))
                .add(fbmBumpZ.mul(bIsT5));

            // Blend noise normals - attenuate with distance for performance perception  
            const distFade = smoothstep(float(800.0), float(50.0), positionWorld.sub(cameraPosition).length());
            const bumpStrength = bumpStrengthU.mul(distFade);
            const bumpX = selectedBumpX.mul(bumpStrength);
            const bumpZ = selectedBumpZ.mul(bumpStrength);

            const N_vec = normalize(vec3(sX.negate().add(bumpX), float(1), sZ.negate().add(bumpZ)));

            const waveHeight = dCoarse.y.add(dFine.y);

            const V = normalize(cameraPosition.sub(positionWorld));
            const L = normalize(sunDir);
            const NdotL = abs(dot(N_vec, L)).max(float(0.15));
            const NdotV = abs(dot(N_vec, V)).max(float(0.05));

            const F = pow(float(1.0).sub(NdotV), fresnelPower)
                .mul(fresnelStrength)
                .mul(float(1).sub(foamMask.mul(0.8)));

            const deepColor = vec3(0.0, 0.03, 0.12);
            const shallowColor = vec3(0.0, 0.08, 0.18);
            const elevationMask = smoothstep(float(-4.0), float(6.0), waveHeight);
            const baseAlbedo = mix(deepColor, waterColor, elevationMask);
            const depthTint = mix(shallowColor, baseAlbedo, smoothstep(float(-2.0), float(3.0), waveHeight));

            // Height-based color gradient (4-stop)
            const hNorm = smoothstep(float(-5.0), float(8.0), waveHeight);
            const hColor1 = mix(heightColorLow, heightColorMid, smoothstep(float(0.0), float(0.33), hNorm));
            const hColor2 = mix(hColor1, heightColorHigh, smoothstep(float(0.33), float(0.66), hNorm));
            const hColor3 = mix(hColor2, heightColorPeak, smoothstep(float(0.66), float(1.0), hNorm));
            const albedo = mix(depthTint, hColor3, heightColorIntensity);

            const H = normalize(L.add(V));
            const NdotH = max(dot(N_vec, H), float(0));
            const shininess = mix(float(800), float(4), roughness_u);
            const spec = pow(NdotH, shininess).mul(1.2).mul(float(1).sub(foamMask));

            // Sun disc reflection on water
            const R = normalize(L.sub(N_vec.mul(dot(L, N_vec).mul(2.0))));
            const sunReflect = pow(max(dot(V, R), float(0)), float(512)).mul(3.0).mul(float(1).sub(foamMask));

            // ── Advanced Subsurface Scattering ──
            // 1. Forward-scatter through wave crests (backlit translucency)
            const sssForwardDir = normalize(L.add(N_vec.mul(0.4)));
            const sssForward = pow(max(dot(V, sssForwardDir.negate()), float(0)), float(5)).mul(0.8);

            // 2. View-dependent SSS at grazing angles (subtle)
            const sssViewGraze = pow(float(1.0).sub(NdotV), float(4)).mul(0.2);

            // 3. Height-based translucency - thin wave crests scatter more light
            const sssCrestMask = smoothstep(float(0.0), float(6.0), waveHeight);
            const sssThickness = smoothstep(float(2.0), float(7.0), waveHeight).mul(0.5);

            // 4. Ambient SSS - very subtle volume contribution
            const sssAmbient = float(0.06).mul(sssCrestMask);

            // 5. Backlit SSS - reduced for realism
            const sssBacklit = pow(max(dot(V, L.negate()), float(0)), float(4)).mul(0.5);

            // 6. Wave-curvature enhanced SSS - tighter range
            const sssCurvature = smoothstep(float(0.4), float(-0.3), J).mul(0.3);

            // Combine all SSS components with reduced overall contribution
            const sssTotal = sssForward.add(sssViewGraze).add(sssBacklit).add(sssAmbient).add(sssCurvature);
            const sssModulated = sssTotal.mul(sssCrestMask.mul(0.7).add(sssThickness)).mul(sssIntensity);

            // SSS color: more blue-teal, less vivid green; deeper blue dominates
            const sssShallowTint = sssColor;
            const sssDeepColor = vec3(0.01, 0.04, 0.14);
            const sssDepthBlend = smoothstep(float(-1.0), float(5.0), waveHeight);
            const sssMixedColor = mix(sssDeepColor, sssShallowTint, sssDepthBlend.mul(depthBlend));
            const sssFinalColor = sssMixedColor.mul(sssModulated);

            const sss = sssFinalColor;

            // Atmospheric fog / distance fade
            const distToCamera = positionWorld.sub(cameraPosition).length();
            const fogFactor = smoothstep(fogNear, fogFar, distToCamera).mul(fogDensity);
            const fogColor = fogColorU;

            const foamLit = foamColor.mul(NdotL.mul(0.4).add(0.7));
            const foamDetailNoise = mx_noise_float(vec2(wx, wz).mul(8.0)).mul(0.1).add(0.9);
            const foamFinal = foamLit.mul(foamDetailNoise);

            // ── PBR Reflection via procedural sky ──
            // Reflect view vector around perturbed normal
            const reflectDir = V.negate().add(N_vec.mul(dot(V, N_vec).mul(2.0)));
            // Add bump-based distortion for wavy reflections
            const distortedReflect = normalize(reflectDir.add(
                vec3(bumpX.mul(reflectionDistortion.mul(10.0)), float(0), bumpZ.mul(reflectionDistortion.mul(10.0)))
            ));

            // Procedural sky reflection matching the atmospheric scattering sky
            const reflY = distortedReflect.y;
            const reflYClamped = max(reflY, float(0.0));

            // Rayleigh-like sky gradient for reflection
            const sunDotRefl = max(dot(distortedReflect, L), float(0));

            // Sky zenith to horizon gradient
            const skyZenith = vec3(0.15, 0.35, 0.75);  // deep blue zenith
            const skyHorizon = vec3(0.55, 0.70, 0.90);  // pale blue horizon
            const skyDawn = vec3(0.85, 0.55, 0.35);     // warm horizon at low sun

            // Sun elevation factor (low sun = warmer horizon)
            const sunElFactor = smoothstep(float(0.0), float(0.25), L.y);
            const horizonColor = mix(skyDawn, skyHorizon, sunElFactor);

            // Base sky color based on reflection elevation
            const skyGrad = mix(horizonColor, skyZenith, smoothstep(float(0.0), float(0.6), reflYClamped));

            // Mie-like sun glow around sun direction
            const mieGlow = pow(sunDotRefl, float(64)).mul(1.2);
            const mieHalo = pow(sunDotRefl, float(8)).mul(0.25);
            const sunWarmColor = vec3(1.0, 0.85, 0.55);
            const sunWhiteColor = vec3(1.0, 0.95, 0.85);
            const mieContrib = sunWarmColor.mul(mieHalo).add(sunWhiteColor.mul(mieGlow));

            // Sun disc specular (sharp, bright)
            const sunDiscGlow = pow(sunDotRefl, float(512)).mul(5.0).mul(float(1).sub(roughness_u));
            const sunDiscHalo = pow(sunDotRefl, float(128)).mul(1.5).mul(float(1).sub(roughness_u.mul(0.5)));
            const sunReflColor = vec3(1.0, 0.92, 0.75);

            // Below-horizon: use deep water color instead of near-black
            const belowHorizonColor = mix(
                vec3(0.04, 0.08, 0.18),
                vec3(0.08, 0.15, 0.28),
                smoothstep(float(-0.5), float(0.0), reflY)
            );
            // Wider, softer horizon transition to avoid harsh black band
            const horizonBlend = smoothstep(float(-0.25), float(0.12), reflY);

            // Combine sky reflection components
            const skyReflection = mix(belowHorizonColor, skyGrad.add(mieContrib), horizonBlend);

            // Cloud reflection: single noise sample for approximate cloud reflections
            const cloudReflUV = vec2(distortedReflect.x, distortedReflect.z).mul(0.5).div(max(reflYClamped, float(0.05)));
            const cloudReflScale = float(0.00015);
            const crt = time.mul(cloudSpeed);
            const cloudReflNoise = mx_noise_float(cloudReflUV.mul(cloudReflScale.mul(10000.0)).add(vec2(crt, crt.mul(0.3))));
            const cloudReflThresh = float(1.0).sub(cloudCoverage);
            const cloudReflMask = smoothstep(cloudReflThresh, cloudReflThresh.add(0.2), cloudReflNoise).mul(0.35);
            const cloudReflColor = vec3(0.85, 0.88, 0.92);

            // Mix cloud reflection into sky reflection (only above horizon)
            const envReflection = mix(skyReflection, cloudReflColor, cloudReflMask.mul(horizonBlend))
                .add(sunReflColor.mul(sunDiscGlow.add(sunDiscHalo)));

            // PBR roughness-based reflection fade - ensure minimum reflection brightness
            const roughFade = float(1.0).sub(roughness_u.mul(0.5));
            // Add a small ambient reflection floor to prevent pure black
            const ambientReflection = mix(
                vec3(0.03, 0.06, 0.12),
                vec3(0.06, 0.10, 0.18),
                smoothstep(float(-0.3), float(0.2), reflY)
            );
            const finalReflection = max(envReflection.mul(roughFade), ambientReflection);

            // Schlick Fresnel with F0 for water (IOR ~1.33 -> F0 ~0.02)
            // Slightly higher F0 to prevent dark patches at steep angles
            const f0 = float(0.04);
            const fresnelSchlick = f0.add(float(1.0).sub(f0).mul(pow(float(1.0).sub(NdotV), float(5.0))));
            const reflectionMix = fresnelSchlick.mul(reflectionStrength).mul(float(1).sub(foamMask.mul(0.7)));

            // PBR energy conservation: reduce diffuse as reflections increase
            const diffuseWeight = float(1.0).sub(reflectionMix);
            const diffuseColor = albedo.mul(NdotL.mul(0.8).add(0.2)).mul(diffuseWeight);

            // Combine diffuse + reflection + specular + SSS
            const oceanColor = diffuseColor
                .add(finalReflection.mul(reflectionMix))
                .add(vec3(spec).mul(float(1).sub(roughness_u)))
                .add(sss);

            const litOcean = mix(oceanColor, foamFinal, foamMask);
            return mix(litOcean, fogColor, fogFactor);
        })();

        function getSurfRating(data) {
            if (!data) return { label: 'Unknown', cls: 'fair', icon: '🤷' };
            const wh = data.waveHeight || 0;
            const wp = data.wavePeriod || 0;
            const ws = data.windSpeed || 0;
            // Simple rating heuristic
            let score = 0;
            if (wh >= 0.6 && wh <= 2.5) score += 3;
            else if (wh >= 0.3 && wh <= 4.0) score += 1;
            if (wp >= 8) score += 2;
            else if (wp >= 5) score += 1;
            if (ws < 8) score += 2;
            else if (ws < 15) score += 1;
            if (score >= 6) return { label: 'Looks Good', cls: 'good', icon: '👍' };
            if (score >= 3) return { label: 'Fair', cls: 'fair', icon: '🤙' };
            return { label: 'Not for Me', cls: 'poor', icon: '👎' };
        }

            return dirs[Math.round(deg / 22.5) % 16];
        }

        async function fetchOpenMeteoData(lat, lon) {

                const resp = await fetch(url, { signal: AbortSignal.timeout(8000) });
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                return await resp.json();
            } catch (e) {
                console.warn('[OpenMeteo] Fetch failed:', e.message);
                return null;
            }
        }

        // Build region groupings from the surf spots database
        const SURF_SPOT_REGIONS = {};
        SURF_SPOTS_DB.forEach(s => {
            if (!SURF_SPOT_REGIONS[s.region]) SURF_SPOT_REGIONS[s.region] = [];
