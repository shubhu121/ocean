            // Sea anemones
            for (let i = 0; i < 20; i++) {
                const ax = (Math.random() - 0.5) * 50;
                const az = (Math.random() - 0.5) * 50;
                const aBaseY = -12 + fbm(ax * 0.02, az * 0.02, 3) * 4;
                const aColor = new THREE.Color().setHSL(Math.random() * 0.1 + 0.8, 0.8, 0.5);
                for (let t = 0; t < 8; t++) {
                    const tGeo = new THREE.CylinderGeometry(0.02, 0.04, 0.6 + Math.random() * 0.8, 4);
                    const tMat = new THREE.MeshStandardMaterial({ color: aColor, roughness: 0.6, emissive: aColor.clone().multiplyScalar(0.08) });
                    const tentacle = new THREE.Mesh(tGeo, tMat);
                    const angle = (t / 8) * Math.PI * 2;
                    tentacle.position.set(ax + Math.cos(angle) * 0.2, aBaseY + 0.4, az + Math.sin(angle) * 0.2);
                    tentacle.rotation.x = (Math.random() - 0.5) * 0.5;
                    tentacle.rotation.z = (Math.random() - 0.5) * 0.5;
                    coralGroup.add(tentacle);
                }
            }

            // ── Kelp forest (50-300m transition) ──
            const kelpGroup = new THREE.Group();
            dScene.add(kelpGroup);
            const kelpStrands = [];
            for (let i = 0; i < 30; i++) {
                const kx = (Math.random() - 0.5) * 70;
                const kz = (Math.random() - 0.5) * 70;
                const kBaseY = -12 + fbm(kx * 0.02, kz * 0.02, 3) * 4;
                const kHeight = 6 + Math.random() * 10;
                const segments = 10;
                const curve = new THREE.CatmullRomCurve3(
                    Array.from({ length: segments }, (_, j) => {
                        const t = j / (segments - 1);
                        return new THREE.Vector3(
                            kx + Math.sin(j * 0.8) * 0.5,
                            kBaseY + t * kHeight,
                            kz + Math.cos(j * 0.6) * 0.5
                        );
                    })
                );
                const tubeGeo = new THREE.TubeGeometry(curve, 12, 0.06 + Math.random() * 0.04, 5, false);
                const kelpMat = new THREE.MeshStandardMaterial({
                    color: 0x2d6b1e,
                    roughness: 0.7,
                    metalness: 0.05,
                    side: THREE.DoubleSide,
                });
                const kelpMesh = new THREE.Mesh(tubeGeo, kelpMat);
                kelpMesh.castShadow = true;
                kelpGroup.add(kelpMesh);

                // Kelp blades (flat leaves)
                for (let lb = 0; lb < 4; lb++) {
                    const bladeGeo = new THREE.PlaneGeometry(0.3 + Math.random() * 0.4, 1.0 + Math.random() * 1.5);
                    const bladeMat = new THREE.MeshStandardMaterial({
                        color: 0x3a8428,
                        roughness: 0.6, side: THREE.DoubleSide,
                        transparent: true, opacity: 0.85,
                    });
                    const blade = new THREE.Mesh(bladeGeo, bladeMat);
                    const bt = 0.3 + Math.random() * 0.6;
                    const pt = curve.getPointAt(bt);
                    blade.position.copy(pt);
                    blade.rotation.set(Math.random() * 0.5, Math.random() * Math.PI, Math.random() * 0.3);
                    kelpGroup.add(blade);
                }

                kelpStrands.push({ mesh: kelpMesh, curve, baseX: kx, baseZ: kz, baseY: kBaseY, height: kHeight, phase: Math.random() * Math.PI * 2 });
            }

            // ── Fish schools (instanced mesh for performance) ──
            const fishGroup = new THREE.Group();
            dScene.add(fishGroup);
            const fishSchools = [];

            function createFishSchool(count, color, size, yRange, swimRadius, speed) {
                const bodyGeo = new THREE.ConeGeometry(size * 0.3, size, 5);
                bodyGeo.rotateX(Math.PI / 2);
                const bodyMat = new THREE.MeshStandardMaterial({
                    color, roughness: 0.5, metalness: 0.3,
                    emissive: new THREE.Color(color).multiplyScalar(0.02),
                });
                const school = new THREE.InstancedMesh(bodyGeo, bodyMat, count);
                school.castShadow = true;
                fishGroup.add(school);

                const fishData = [];
                const dummy = new THREE.Object3D();
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const r = Math.random() * swimRadius;
                    fishData.push({
                        cx: Math.cos(angle) * r,
                        cy: yRange[0] + Math.random() * (yRange[1] - yRange[0]),
                        cz: Math.sin(angle) * r,
                        angle: angle,
                        speed: speed * (0.7 + Math.random() * 0.6),
                        wobble: Math.random() * Math.PI * 2,
                        radius: 3 + Math.random() * swimRadius * 0.5,
                    });
                }
                fishSchools.push({ mesh: school, data: fishData, dummy, depthRange: yRange, originalColor: color });
                return school;
            }

            // Sunlight zone fish
            createFishSchool(60, 0x44aaff, 0.4, [-2, 8], 25, 0.8);
            createFishSchool(40, 0xff8844, 0.3, [-1, 6], 20, 1.0);
            createFishSchool(25, 0xffcc33, 0.5, [0, 10], 30, 0.6);

            // ── Jellyfish (individual animated meshes) ──
            const jellyGroup = new THREE.Group();
            dScene.add(jellyGroup);
            const jellies = [];
            for (let i = 0; i < 15; i++) {
                const jSize = 0.5 + Math.random() * 1.5;
                const bellGeo = new THREE.SphereGeometry(jSize, 16, 12, 0, Math.PI * 2, 0, Math.PI * 0.6);
                const hue = 0.5 + Math.random() * 0.3;
                const jColor = new THREE.Color().setHSL(hue, 0.8, 0.6);
                const bellMat = new THREE.MeshStandardMaterial({
                    color: jColor,
                    transparent: true,
                    opacity: 0.35,
                    roughness: 0.3,
                    metalness: 0.1,
                    emissive: jColor.clone().multiplyScalar(0.15),
                    side: THREE.DoubleSide,
                });
                const bell = new THREE.Mesh(bellGeo, bellMat);

                // Tentacles
                const tentGroup = new THREE.Group();
                for (let t = 0; t < 6; t++) {
                    const tentLen = jSize * 2 + Math.random() * jSize * 3;
                    const tentGeo = new THREE.CylinderGeometry(0.015, 0.005, tentLen, 3);
                    const tentMat = new THREE.MeshBasicMaterial({
                        color: jColor,
                        transparent: true,
                        opacity: 0.2,
                    });
                    const tent = new THREE.Mesh(tentGeo, tentMat);
                    const ta = (t / 6) * Math.PI * 2;
                    tent.position.set(Math.cos(ta) * jSize * 0.4, -tentLen / 2, Math.sin(ta) * jSize * 0.4);
                    tentGroup.add(tent);
                }

                const jGroup = new THREE.Group();
                jGroup.add(bell);
                jGroup.add(tentGroup);
                jGroup.position.set(
                    (Math.random() - 0.5) * 50,
                    Math.random() * 15 - 2,
                    (Math.random() - 0.5) * 50
                );
                jellyGroup.add(jGroup);
                jellies.push({
                    group: jGroup,
                    bell,
                    tentacles: tentGroup,
                    size: jSize,
                    phase: Math.random() * Math.PI * 2,
                    speed: 0.3 + Math.random() * 0.7,
                    driftX: (Math.random() - 0.5) * 0.01,
                    driftZ: (Math.random() - 0.5) * 0.01,
                    depthMin: 100, depthMax: 2000,
                    hue,
                });
            }

            // ── Anglerfish (deep zones — with glowing lure) ──
            const anglerGroup = new THREE.Group();
            dScene.add(anglerGroup);
            const anglers = [];
            for (let i = 0; i < 5; i++) {
                const aGrp = new THREE.Group();
                // Body
                const bodyGeo = new THREE.SphereGeometry(0.8, 10, 8);
                bodyGeo.scale(1.3, 0.8, 0.9);
                const bodyMat = new THREE.MeshStandardMaterial({
                    color: 0x0a0a12,
                    roughness: 0.95,
                    metalness: 0.1,
                });
                const body = new THREE.Mesh(bodyGeo, bodyMat);
                aGrp.add(body);

                // Jaw
                const jawGeo = new THREE.ConeGeometry(0.5, 0.8, 6);
                jawGeo.rotateX(Math.PI / 2);
                const jaw = new THREE.Mesh(jawGeo, bodyMat);
                jaw.position.set(0.7, -0.2, 0);
                jaw.rotation.z = 0.2;
                aGrp.add(jaw);

                // Lure
                const lureLight = new THREE.PointLight(0x44ddff, 2, 8, 2);
                lureLight.position.set(0.3, 1.2, 0);
                aGrp.add(lureLight);
                const lureSphere = new THREE.Mesh(
                    new THREE.SphereGeometry(0.08, 8, 6),
                    new THREE.MeshBasicMaterial({ color: 0x88ffff })
                );
                lureSphere.position.copy(lureLight.position);
                aGrp.add(lureSphere);

                // Stalk
                const stalkCurve = new THREE.QuadraticBezierCurve3(
                    new THREE.Vector3(0, 0.5, 0),
                    new THREE.Vector3(0.6, 1.4, 0),
                    new THREE.Vector3(0.3, 1.2, 0)
                );
                const stalkGeo = new THREE.TubeGeometry(stalkCurve, 8, 0.02, 4, false);
                const stalkMat = new THREE.MeshBasicMaterial({ color: 0x334455 });
                aGrp.add(new THREE.Mesh(stalkGeo, stalkMat));

                // Eye
                const eyeGeo = new THREE.SphereGeometry(0.12, 8, 6);
                const eyeMat = new THREE.MeshBasicMaterial({ color: 0x88aacc });
                const eye = new THREE.Mesh(eyeGeo, eyeMat);
                eye.position.set(0.6, 0.25, 0.4);
                aGrp.add(eye);

                // Teeth
                for (let t = 0; t < 6; t++) {
                    const toothGeo = new THREE.ConeGeometry(0.03, 0.15, 4);
                    const tooth = new THREE.Mesh(toothGeo, new THREE.MeshBasicMaterial({ color: 0xcccccc }));
                    const ta = ((t / 6) - 0.25) * Math.PI * 0.5;
                    tooth.position.set(1.0 + Math.cos(ta) * 0.2, -0.15 + Math.sin(ta) * 0.15, (t - 2.5) * 0.08);
                    tooth.rotation.z = -0.3 + ta * 0.5;
                    aGrp.add(tooth);
                }

                aGrp.position.set(
                    (Math.random() - 0.5) * 40,
                    Math.random() * 6 - 4,
                    (Math.random() - 0.5) * 40
                );
                anglerGroup.add(aGrp);
                anglers.push({
                    group: aGrp,
                    lureLight,
                    lureSphere,
                    phase: Math.random() * Math.PI * 2,
                    speed: 0.2 + Math.random() * 0.3,
                    direction: Math.random() * Math.PI * 2,
                    depthMin: 1000, depthMax: 5000,
                });
            }

            // ── Hydrothermal vent (abyssal zone — 4000-7000m) ──
            const ventGroup = new THREE.Group();
            dScene.add(ventGroup);
            // Chimney structures
            for (let v = 0; v < 4; v++) {
                const vx = (Math.random() - 0.5) * 20 + 15;
                const vz = (Math.random() - 0.5) * 20;
                const vHeight = 2 + Math.random() * 4;
                const chimGeo = new THREE.CylinderGeometry(0.3 + Math.random() * 0.3, 0.6 + Math.random() * 0.4, vHeight, 8);
                const chimMat = new THREE.MeshStandardMaterial({
                    color: 0x2a1a0a,
                    roughness: 0.95,
                    metalness: 0.3,
                    emissive: 0x331100,
                    emissiveIntensity: 0.1,
                });
                const chim = new THREE.Mesh(chimGeo, chimMat);
                chim.position.set(vx, -12 + vHeight / 2, vz);
                chim.castShadow = true;
                ventGroup.add(chim);

                // Vent glow
                const ventLight = new THREE.PointLight(0xff4400, 1.5, 12, 2);
                ventLight.position.set(vx, -12 + vHeight + 0.5, vz);
                ventGroup.add(ventLight);

                // Mineral deposits around base
                for (let d = 0; d < 6; d++) {
                    const da = (d / 6) * Math.PI * 2;
                    const dr = 0.8 + Math.random() * 1.2;
                    const depGeo = new THREE.DodecahedronGeometry(0.15 + Math.random() * 0.25, 0);
                    const depMat = new THREE.MeshStandardMaterial({
                        color: 0x554422,
                        roughness: 0.9,
                        metalness: 0.5,
                        emissive: 0x221100,
                        emissiveIntensity: 0.05,
                    });
                    const dep = new THREE.Mesh(depGeo, depMat);
                    dep.position.set(vx + Math.cos(da) * dr, -12 + Math.random() * 0.3, vz + Math.sin(da) * dr);
                    ventGroup.add(dep);
                }
            }

            // Tube worms near vents
            const tubeWormGroup = new THREE.Group();
            ventGroup.add(tubeWormGroup);
            for (let tw = 0; tw < 25; tw++) {
                const twx = 10 + (Math.random() - 0.5) * 15;
                const twz = (Math.random() - 0.5) * 15;
                const twH = 0.8 + Math.random() * 2.0;
                const twGeo = new THREE.CylinderGeometry(0.02, 0.04, twH, 5);
                const twMat = new THREE.MeshStandardMaterial({
                    color: 0xcc3322,
                    roughness: 0.7,
                    emissive: 0x440000,
                    emissiveIntensity: 0.1,
                });
                const twMesh = new THREE.Mesh(twGeo, twMat);
                twMesh.position.set(twx, -12 + twH / 2, twz);
                twMesh.rotation.x = (Math.random() - 0.5) * 0.2;
                twMesh.rotation.z = (Math.random() - 0.5) * 0.2;
                tubeWormGroup.add(twMesh);

                // Feathery tip
                const tipGeo = new THREE.SphereGeometry(0.06, 6, 4);
                const tipMat = new THREE.MeshBasicMaterial({ color: 0xff5544 });
                const tip = new THREE.Mesh(tipGeo, tipMat);
                tip.position.set(twx, -12 + twH, twz);
                tubeWormGroup.add(tip);
            }

            // Vent smoke particles
            const ventSmokeCount = 500;
            const ventSmokeGeo = new THREE.BufferGeometry();
            const ventSmokePos = new Float32Array(ventSmokeCount * 3);
            const ventSmokeData = [];
            for (let i = 0; i < ventSmokeCount; i++) {
                const vsx = 10 + (Math.random() - 0.5) * 15;
                const vsz = (Math.random() - 0.5) * 15;
                ventSmokePos[i * 3] = vsx;
                ventSmokePos[i * 3 + 1] = -10 + Math.random() * 15;
                ventSmokePos[i * 3 + 2] = vsz;
                ventSmokeData.push({
                    baseX: vsx, baseZ: vsz,
                    vy: 0.01 + Math.random() * 0.03,
                    life: Math.random(),
                    speed: 0.5 + Math.random(),
                });
            }
            ventSmokeGeo.setAttribute('position', new THREE.BufferAttribute(ventSmokePos, 3));
            const ventSmokeMat = new THREE.PointsMaterial({
                color: 0x554433,
                size: 0.4,
                transparent: true,
                opacity: 0,
                blending: THREE.NormalBlending,
                depthWrite: false,
                sizeAttenuation: true,
            });
            const ventSmoke = new THREE.Points(ventSmokeGeo, ventSmokeMat);
            ventGroup.add(ventSmoke);

            // ── Sea turtles ──
            const turtleGroup = new THREE.Group();
            dScene.add(turtleGroup);
            const turtles = [];
            for (let i = 0; i < 3; i++) {
                const tGrp = new THREE.Group();
                // Shell
                const shellGeo = new THREE.SphereGeometry(0.8, 12, 8);
                shellGeo.scale(1.2, 0.5, 1.0);
                const shellMat = new THREE.MeshStandardMaterial({ color: 0x4a6b3a, roughness: 0.8, metalness: 0.1 });
                const shell = new THREE.Mesh(shellGeo, shellMat);
                tGrp.add(shell);
                // Head
                const headGeo = new THREE.SphereGeometry(0.2, 8, 6);
                const head = new THREE.Mesh(headGeo, new THREE.MeshStandardMaterial({ color: 0x5a7b4a, roughness: 0.7 }));
                head.position.set(0.9, 0.1, 0);
                tGrp.add(head);
                // Flippers
                for (let f = 0; f < 4; f++) {
                    const fGeo = new THREE.BoxGeometry(0.6, 0.05, 0.25);
                    const flip = new THREE.Mesh(fGeo, shellMat);
                    const side = f < 2 ? 1 : -1;
                    const front = f % 2 === 0 ? 1 : -1;
                    flip.position.set(front * 0.5, -0.1, side * 0.7);
                    flip.rotation.y = front * side * 0.3;
                    tGrp.add(flip);
                }

                tGrp.position.set(
                    (Math.random() - 0.5) * 40,
                    3 + Math.random() * 8,
                    (Math.random() - 0.5) * 40
                );
                turtleGroup.add(tGrp);
                turtles.push({
                    group: tGrp,
                    phase: Math.random() * Math.PI * 2,
                    speed: 0.2 + Math.random() * 0.3,
                    radius: 10 + Math.random() * 15,
                    angle: Math.random() * Math.PI * 2,
                    depthMin: 0, depthMax: 200,
                });
            }

            // ── Giant squid (deep zone) ──
            const squidGroup = new THREE.Group();
            dScene.add(squidGroup);
            const squids = [];
            for (let i = 0; i < 3; i++) {
                const sGrp = new THREE.Group();
                const mantleGeo = new THREE.ConeGeometry(0.5, 2.5, 8);
                mantleGeo.rotateX(-Math.PI / 2);
                const mantleMat = new THREE.MeshStandardMaterial({
                    color: 0x442244,
                    roughness: 0.5,
                    metalness: 0.2,
                    transparent: true,
                    opacity: 0.7,
                });
                sGrp.add(new THREE.Mesh(mantleGeo, mantleMat));
                // Tentacles
                for (let t = 0; t < 8; t++) {
                    const tLen = 2 + Math.random() * 3;
                    const tentGeo = new THREE.CylinderGeometry(0.02, 0.06, tLen, 4);
                    tentGeo.rotateX(Math.PI / 2);
                    const tent = new THREE.Mesh(tentGeo, new THREE.MeshStandardMaterial({
                        color: 0x553355, roughness: 0.6, transparent: true, opacity: 0.5,
                    }));
                    const ta = (t / 8) * Math.PI * 2;
                    tent.position.set(Math.cos(ta) * 0.3, Math.sin(ta) * 0.3, 1.2 + tLen / 2);
                    sGrp.add(tent);
                }
                // Eye
                const eyeGeo = new THREE.SphereGeometry(0.15, 8, 6);
                const eye = new THREE.Mesh(eyeGeo, new THREE.MeshBasicMaterial({ color: 0xffcc44 }));
                eye.position.set(0.35, 0.1, -0.3);
                sGrp.add(eye);

                sGrp.position.set(
                    (Math.random() - 0.5) * 50,
                    Math.random() * 10 - 3,
                    (Math.random() - 0.5) * 50
                );
                squidGroup.add(sGrp);
                squids.push({
                    group: sGrp,
                    phase: Math.random() * Math.PI * 2,
                    speed: 0.4 + Math.random() * 0.5,
                    direction: Math.random() * Math.PI * 2,
                    depthMin: 800, depthMax: 4000,
                });
            }

            // ── Water surface (visible from below near surface) ──
            const surfGeo = new THREE.PlaneGeometry(200, 200, 64, 64);
            surfGeo.rotateX(Math.PI / 2);
            const surfMat = new THREE.MeshStandardMaterial({
                color: 0x88ccff,
                transparent: true,
                opacity: 0.3,
                roughness: 0.1,
                metalness: 0.5,
                side: THREE.BackSide,
                emissive: 0x4488cc,
                emissiveIntensity: 0.15,
            });
            const surfMesh = new THREE.Mesh(surfGeo, surfMat);
            surfMesh.position.y = 15;
            dScene.add(surfMesh);

            // ── Rocky outcrops / walls for deeper zones ──
            const rockGroup = new THREE.Group();
            dScene.add(rockGroup);
            for (let i = 0; i < 15; i++) {
                const rSize = 1 + Math.random() * 4;
                const rGeo = new THREE.DodecahedronGeometry(rSize, 1);
                // Deform vertices
                const rPos2 = rGeo.attributes.position;
                for (let v = 0; v < rPos2.count; v++) {
                    const nx = rPos2.getX(v), ny = rPos2.getY(v), nz = rPos2.getZ(v);
                    const noise = 1 + fbm(nx * 0.5, ny * 0.5 + nz * 0.5, 3) * 0.4;
                    rPos2.setXYZ(v, nx * noise, ny * noise * 0.6, nz * noise);
                }
                rGeo.computeVertexNormals();
                const rMat = new THREE.MeshStandardMaterial({
                    color: new THREE.Color().setHSL(0.08, 0.2 + Math.random() * 0.2, 0.1 + Math.random() * 0.1),
                    roughness: 0.95,
                    metalness: 0.1,
                });
                const rock = new THREE.Mesh(rGeo, rMat);
                rock.position.set(
                    (Math.random() - 0.5) * 80,
                    -12 + rSize * 0.3,
                    (Math.random() - 0.5) * 80
                );
                rock.rotation.set(Math.random(), Math.random(), Math.random());
                rock.castShadow = true;
                rock.receiveShadow = true;
                rockGroup.add(rock);
            }

            // ── Hadal zone — trench walls ──
            const trenchGroup = new THREE.Group();
            dScene.add(trenchGroup);
            // Vertical cliff walls
            for (let side = -1; side <= 1; side += 2) {
                const wallGeo = new THREE.PlaneGeometry(80, 30, 32, 16);
                const wallPos = wallGeo.attributes.position;
                for (let v = 0; v < wallPos.count; v++) {
                    const wx = wallPos.getX(v), wy = wallPos.getY(v);
                    wallPos.setZ(v, fbm(wx * 0.05, wy * 0.08, 4) * 3);
                }
                wallGeo.computeVertexNormals();
                const wallMat = new THREE.MeshStandardMaterial({
                    color: 0x0a0808,
                    roughness: 0.98,
                    metalness: 0.05,
                });
                const wall = new THREE.Mesh(wallGeo, wallMat);
                wall.position.set(0, 0, side * 35);
                wall.rotation.y = side > 0 ? Math.PI : 0;
                wall.receiveShadow = true;
                trenchGroup.add(wall);
            }

            // ── Camera auto-animation state ──
            let camAngle = 0;
            let camTargetY = 5;

            // ── Store everything ──
            dive3D = {
                renderer: glRenderer, scene: dScene, camera: dCam, canvas: c3d,
                terrain, sediment, ambLight, sunLight, headlight, headGlow,
                causticLights, causticGroup, shafts3D, shaftGroup,
                snowPts, snowGeo, snowPos, snowData, snowMat, snowCount,
                bioPts, bioGeo, bioPositions, bioData, bioMat, bioCount,
                coralGroup, kelpGroup, kelpStrands,
                fishSchools, fishGroup,
                jellies, jellyGroup,
                anglers, anglerGroup,
                ventGroup, ventSmoke, ventSmokeGeo, ventSmokePos, ventSmokeData, ventSmokeMat, ventSmokeCount,
                turtles, turtleGroup,
                squids, squidGroup,
                surfMesh, surfMat,
                rockGroup, trenchGroup, tubeWormGroup,
                camAngle, camTargetY,
                clock: new THREE.Clock(),
                time: 0,
                fbm,
            };

            // Handle resize
            const onResize = () => {
                if (!dive3D) return;
                const w = window.innerWidth, h = window.innerHeight;
                dive3D.camera.aspect = w / h;
                dive3D.camera.updateProjectionMatrix();
                dive3D.renderer.setSize(w, h);
            };
            window.addEventListener('resize', onResize);
            dive3D._onResize = onResize;
        }

        function spawnCreatureSet(w, h) {
            diveCreatures = [];
            const types = [
                // Sunlight zone
                { minD: 0, maxD: 250, shape: 'fish', count: 12, size: [8, 20], speed: [0.4, 1.2], color: () => `hsla(${180 + Math.random() * 60}, 70%, ${55 + Math.random() * 20}%, 0.7)` },
                { minD: 0, maxD: 200, shape: 'turtle', count: 2, size: [25, 35], speed: [0.2, 0.4], color: () => `hsla(120, 40%, 45%, 0.6)` },
                { minD: 0, maxD: 300, shape: 'school', count: 3, size: [3, 5], speed: [0.6, 1.0], color: () => `hsla(${200 + Math.random() * 40}, 60%, 65%, 0.5)` },
                // Twilight zone
                { minD: 200, maxD: 1200, shape: 'jellyfish', count: 6, size: [12, 28], speed: [0.1, 0.3], color: () => `hsla(${200 + Math.random() * 80}, 80%, 70%, 0.4)` },
                { minD: 200, maxD: 1000, shape: 'squid', count: 3, size: [14, 22], speed: [0.5, 1.0], color: () => `hsla(${280 + Math.random() * 40}, 50%, 55%, 0.5)` },
                // Midnight zone
                { minD: 1000, maxD: 4500, shape: 'angler', count: 3, size: [18, 30], speed: [0.15, 0.35], color: () => `hsla(220, 20%, 20%, 0.6)` },
                { minD: 1000, maxD: 4000, shape: 'bigJelly', count: 2, size: [30, 50], speed: [0.05, 0.15], color: () => `hsla(${180 + Math.random() * 60}, 90%, 60%, 0.25)` },
                // Abyssal zone
                { minD: 4000, maxD: 7000, shape: 'isopod', count: 4, size: [12, 20], speed: [0.08, 0.2], color: () => `hsla(30, 20%, 35%, 0.4)` },
                { minD: 4000, maxD: 6500, shape: 'tubeWorm', count: 0, size: [0, 0], speed: [0, 0], color: () => '' }, // static — drawn separately
                // Hadal zone
                { minD: 6000, maxD: 11000, shape: 'amphipod', count: 5, size: [4, 10], speed: [0.3, 0.6], color: () => `hsla(0, 0%, 70%, 0.3)` },
                { minD: 6000, maxD: 11000, shape: 'snailfish', count: 2, size: [12, 18], speed: [0.12, 0.25], color: () => `hsla(0, 0%, 80%, 0.25)` },
            ];

            for (const t of types) {
                for (let i = 0; i < t.count; i++) {
                    const sz = t.size[0] + Math.random() * (t.size[1] - t.size[0]);
                    const sp = t.speed[0] + Math.random() * (t.speed[1] - t.speed[0]);
                    const dir = Math.random() < 0.5 ? 1 : -1;
                    diveCreatures.push({
                        shape: t.shape,
                        minD: t.minD,
                        maxD: t.maxD,
                        x: Math.random() * w,
                        y: 0.15 * h + Math.random() * 0.7 * h,
                        size: sz,
                        speed: sp * dir,
                        color: t.color(),
                        phase: Math.random() * Math.PI * 2,
                        alpha: 0,
                        glowPhase: Math.random() * Math.PI * 2,
                    });
                }
            }
        }

        // ── Draw a stylized fish shape ──
        function drawFish(ctx, x, y, size, color, phase, dir) {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(dir > 0 ? 1 : -1, 1);
            const wobble = Math.sin(phase) * 2;
            ctx.translate(0, wobble);

            // Body
            ctx.beginPath();
            ctx.ellipse(0, 0, size, size * 0.4, 0, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();

            // Tail
            ctx.beginPath();
            ctx.moveTo(-size * 0.8, 0);
            ctx.lineTo(-size * 1.4, -size * 0.45 + Math.sin(phase * 3) * 2);
            ctx.lineTo(-size * 1.4, size * 0.45 + Math.sin(phase * 3) * 2);
            ctx.closePath();
            ctx.fill();

            // Eye
            ctx.beginPath();
            ctx.arc(size * 0.45, -size * 0.08, size * 0.12, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.8)';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(size * 0.48, -size * 0.08, size * 0.06, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0,0,0,0.8)';
            ctx.fill();

            ctx.restore();
        }

        // ── Draw jellyfish ──
        function drawJellyfish(ctx, x, y, size, color, phase, glow) {
            ctx.save();
            ctx.translate(x, y + Math.sin(phase * 0.7) * 6);

            // Glow
            if (glow > 0) {
                const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, size * 2);
                grad.addColorStop(0, `hsla(200, 90%, 70%, ${glow * 0.15})`);
                grad.addColorStop(1, 'transparent');
                ctx.fillStyle = grad;
                ctx.fillRect(-size * 2, -size * 2, size * 4, size * 4);
            }

            // Bell
            ctx.beginPath();
            ctx.ellipse(0, 0, size * 0.6, size * 0.45, 0, Math.PI, 0);
            ctx.quadraticCurveTo(size * 0.6, size * 0.2, size * 0.3, size * 0.35);
            ctx.quadraticCurveTo(0, size * 0.5 + Math.sin(phase * 2) * 3, -size * 0.3, size * 0.35);
            ctx.quadraticCurveTo(-size * 0.6, size * 0.2, -size * 0.6, 0);
            ctx.fillStyle = color;
            ctx.fill();

            // Tentacles
            for (let i = -2; i <= 2; i++) {
                ctx.beginPath();
                ctx.moveTo(i * size * 0.12, size * 0.3);
                const tx = i * size * 0.12 + Math.sin(phase + i) * 5;
                const ty = size * 0.3 + size * (0.8 + Math.sin(phase * 0.5 + i) * 0.2);
                ctx.quadraticCurveTo(i * size * 0.12 + Math.sin(phase * 1.5 + i * 0.5) * 8, size * 0.3 + size * 0.45, tx, ty);
                ctx.strokeStyle = color;
                ctx.lineWidth = 1;
                ctx.stroke();
            }
            ctx.restore();
        }

        // ── Draw anglerfish with bioluminescent lure ──
        function drawAnglerfish(ctx, x, y, size, phase, dir) {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(dir > 0 ? 1 : -1, 1);

            // Lure glow
            const lureX = size * 0.6;
            const lureY = -size * 0.7 + Math.sin(phase * 2) * 3;
            const lureGlow = 0.5 + 0.5 * Math.sin(phase * 3);
            const grad = ctx.createRadialGradient(lureX, lureY, 0, lureX, lureY, size * 0.8);
            grad.addColorStop(0, `rgba(100,200,255,${lureGlow * 0.4})`);
            grad.addColorStop(0.4, `rgba(50,150,255,${lureGlow * 0.1})`);
            grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad;
            ctx.fillRect(lureX - size, lureY - size, size * 2, size * 2);

            // Lure filament
            ctx.beginPath();
            ctx.moveTo(size * 0.3, -size * 0.25);
            ctx.quadraticCurveTo(size * 0.5, -size * 0.6, lureX, lureY);
            ctx.strokeStyle = `rgba(180,220,255,${0.3 + lureGlow * 0.3})`;
            ctx.lineWidth = 1;
            ctx.stroke();

            // Lure bulb
            ctx.beginPath();
            ctx.arc(lureX, lureY, 3, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(150,220,255,${0.6 + lureGlow * 0.4})`;
            ctx.fill();

            // Body — dark, bulbous
            ctx.beginPath();
            ctx.ellipse(0, 0, size * 0.55, size * 0.45, 0, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(15,20,35,0.7)`;
            ctx.fill();

            // Mouth
            ctx.beginPath();
            ctx.moveTo(size * 0.4, -size * 0.1);
            ctx.lineTo(size * 0.55, 0);
            ctx.lineTo(size * 0.4, size * 0.12);
            ctx.strokeStyle = 'rgba(200,200,200,0.3)';
            ctx.lineWidth = 1;
            ctx.stroke();

            // Teeth
            for (let i = 0; i < 4; i++) {
                const tx = size * 0.4 + i * 0.01;
                const ty = -size * 0.08 + i * size * 0.055;
                ctx.beginPath();
                ctx.moveTo(tx, ty);
                ctx.lineTo(tx + 3, ty + (i % 2 === 0 ? 3 : -3));
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.lineWidth = 0.8;
                ctx.stroke();
            }

            // Eye — large
            ctx.beginPath();
            ctx.arc(size * 0.15, -size * 0.12, size * 0.12, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(100,180,255,${0.3 + lureGlow * 0.2})`;
            ctx.fill();
            ctx.beginPath();
            ctx.arc(size * 0.17, -size * 0.13, size * 0.05, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0,0,0,0.8)';
            ctx.fill();

            ctx.restore();
        }

        // ── Draw squid ──
        function drawSquid(ctx, x, y, size, color, phase, dir) {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(dir > 0 ? 1 : -1, 1);
            const wobble = Math.sin(phase * 1.2) * 3;
            ctx.translate(0, wobble);

            // Mantle
            ctx.beginPath();
            ctx.ellipse(0, 0, size * 0.3, size * 0.7, 0, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();

            // Fins
            ctx.beginPath();
            ctx.ellipse(0, -size * 0.5, size * 0.5, size * 0.18, 0, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();

            // Tentacles
            for (let i = -2; i <= 2; i++) {
                ctx.beginPath();
                const sx = i * size * 0.08;
                ctx.moveTo(sx, size * 0.65);
                ctx.quadraticCurveTo(
                    sx + Math.sin(phase * 2 + i) * 8,
                    size * 0.65 + size * 0.4,
                    sx + Math.sin(phase + i * 0.7) * 12,
                    size * 0.65 + size * 0.7
                );
                ctx.strokeStyle = color;
                ctx.lineWidth = 1.2;
                ctx.stroke();
            }

            // Eye
            ctx.beginPath();
            ctx.arc(size * 0.12, -size * 0.05, size * 0.08, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.fill();

            ctx.restore();
        }

        // ── Draw small amphipod/isopod/snailfish silhouettes ──
        function drawSmallCreature(ctx, x, y, size, color, phase, shape) {
            ctx.save();
            ctx.translate(x, y + Math.sin(phase) * 2);
            ctx.beginPath();
            if (shape === 'amphipod') {
                ctx.ellipse(0, 0, size * 0.7, size * 0.35, 0, 0, Math.PI * 2);
                // Legs
                for (let i = -2; i <= 2; i++) {
                    ctx.moveTo(i * size * 0.2, size * 0.3);
                    ctx.lineTo(i * size * 0.2 + Math.sin(phase + i) * 2, size * 0.3 + size * 0.3);
                }
            } else if (shape === 'isopod') {
                // Segmented oval
                for (let s = -2; s <= 2; s++) {
                    ctx.ellipse(s * size * 0.15, 0, size * 0.18, size * 0.3, 0, 0, Math.PI * 2);
                }
            } else {
                // Snailfish — tadpole-ish
                ctx.ellipse(0, 0, size * 0.5, size * 0.35, 0, 0, Math.PI * 2);
                ctx.moveTo(-size * 0.4, 0);
                ctx.lineTo(-size * 0.9, -size * 0.15 + Math.sin(phase * 2) * 2);
                ctx.lineTo(-size * 0.9, size * 0.15 + Math.sin(phase * 2) * 2);
                ctx.closePath();
            }
            ctx.fillStyle = color;
            ctx.fill();
            ctx.strokeStyle = color;
            ctx.lineWidth = 0.8;
            ctx.stroke();
            ctx.restore();
        }

        // ── Render a school of small fish ──
        function drawSchool(ctx, x, y, size, color, phase, dir) {
            for (let i = 0; i < 15; i++) {
                const ox = (Math.sin(i * 2.3 + phase * 0.5) * 25) + i * dir * 4;
                const oy = (Math.cos(i * 1.7 + phase * 0.3) * 15);
                const sz = size * (0.8 + Math.sin(i + phase) * 0.2);
                drawFish(ctx, x + ox, y + oy, sz, color, phase + i * 0.3, dir > 0 ? 1 : -1);
            }
        }

        // ── Hydrothermal vent effect ──
        function drawHydrothermalVent(ctx, x, y, w, h, depth, time) {
            if (depth < 3500 || depth > 7000) return;
            const ventIntensity = Math.max(0, Math.min(1, (depth - 3500) / 1500));
            if (ventIntensity <= 0) return;

            const ventX = w * 0.7;
            const ventBaseY = h * 0.9;

            // Vent plume
            ctx.save();
            for (let i = 0; i < 20; i++) {
                const age = (time * 0.5 + i * 0.15) % 3;
                const py = ventBaseY - age * h * 0.25;
                const px = ventX + Math.sin(time * 0.5 + i * 0.8) * (8 + age * 15);
                const pr = 3 + age * 12;
                const alpha = Math.max(0, (1 - age / 3) * ventIntensity * 0.3);

                ctx.beginPath();
                ctx.arc(px, py, pr, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(120,80,40,${alpha})`;
                ctx.fill();

                // Heated glow
                if (age < 0.6) {
                    const gGrad = ctx.createRadialGradient(px, py, 0, px, py, pr * 1.5);
                    gGrad.addColorStop(0, `rgba(255,120,30,${alpha * 0.5})`);
                    gGrad.addColorStop(1, 'transparent');
                    ctx.fillStyle = gGrad;
                    ctx.fillRect(px - pr * 2, py - pr * 2, pr * 4, pr * 4);
                }
            }

            // Vent chimney base
            ctx.beginPath();
            ctx.moveTo(ventX - 15, ventBaseY);
            ctx.lineTo(ventX - 8, ventBaseY - 40);
            ctx.lineTo(ventX + 8, ventBaseY - 40);
            ctx.lineTo(ventX + 15, ventBaseY);
            ctx.fillStyle = `rgba(50,40,30,${ventIntensity * 0.6})`;
            ctx.fill();

            // Tube worms near vent
            for (let i = 0; i < 8; i++) {
                const tx = ventX - 40 + i * 10 + Math.sin(i * 1.5) * 5;
                const tBaseY = ventBaseY + 5;
                const tHeight = 25 + Math.sin(i * 2.3) * 10;
                const sway = Math.sin(time * 0.3 + i * 0.8) * 4;

                ctx.beginPath();
                ctx.moveTo(tx, tBaseY);
                ctx.quadraticCurveTo(tx + sway * 0.5, tBaseY - tHeight * 0.5, tx + sway, tBaseY - tHeight);
                ctx.strokeStyle = `rgba(200,60,40,${ventIntensity * 0.5})`;
                ctx.lineWidth = 2.5;
                ctx.stroke();

                // Tip plume
                ctx.beginPath();
                ctx.arc(tx + sway, tBaseY - tHeight, 3, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,100,80,${ventIntensity * 0.4})`;
                ctx.fill();
            }
            ctx.restore();
        }

        // ── Seabed terrain ──
        function drawSeabed(ctx, w, h, depth, time) {
            if (depth < 100) return;
            const seabedAlpha = Math.min(0.5, (depth - 100) / 2000);
            const yBase = h * 0.92;
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(0, yBase);
            for (let x = 0; x <= w; x += 8) {
                const undulation = Math.sin(x * 0.008 + time * 0.05) * 12 +
                    Math.sin(x * 0.02 + time * 0.02) * 5 +
                    Math.sin(x * 0.003) * 20;
                ctx.lineTo(x, yBase + undulation);
            }
            ctx.lineTo(w, h);
            ctx.lineTo(0, h);
            ctx.closePath();

            // Color darkens with depth
            const r = Math.max(5, 40 - depth * 0.003);
            const g = Math.max(5, 35 - depth * 0.003);
            const b = Math.max(8, 30 - depth * 0.002);
            ctx.fillStyle = `rgba(${r | 0},${g | 0},${b | 0},${seabedAlpha})`;
            ctx.fill();

            // Sediment specks
            if (depth > 500) {
                for (let i = 0; i < 30; i++) {
                    const sx = (i * 67 + Math.sin(i * 3.7) * 40) % w;
                    const sy = yBase + Math.sin(sx * 0.008 + time * 0.05) * 12 + Math.random() * 10;
                    ctx.beginPath();
                    ctx.arc(sx, sy, 0.5 + Math.random(), 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(100,90,70,${seabedAlpha * 0.5})`;
                    ctx.fill();
                }
            }

            // Coral / kelp in shallow zones
            if (depth < 400 && depth > 20) {
                const floraAlpha = Math.max(0, 1 - depth / 400) * 0.5;
                for (let i = 0; i < 15; i++) {
                    const cx = (i * 97 + 30) % w;
                    const cBaseY = yBase + Math.sin(cx * 0.008 + time * 0.05) * 12;
                    if (depth < 150) {
                        // Coral branches
                        for (let b = 0; b < 3; b++) {
                            const angle = -Math.PI / 2 + (b - 1) * 0.4 + Math.sin(time * 0.2 + i) * 0.05;
                            const len = 15 + Math.sin(i * 2.1 + b) * 8;
                            ctx.beginPath();
                            ctx.moveTo(cx, cBaseY);
                            ctx.lineTo(cx + Math.cos(angle) * len, cBaseY + Math.sin(angle) * len);
                            const hue = (i * 37 + b * 60) % 360;
                            ctx.strokeStyle = `hsla(${hue}, 70%, 55%, ${floraAlpha})`;
                            ctx.lineWidth = 2 + Math.sin(i + b) * 1;
                            ctx.lineCap = 'round';
                            ctx.stroke();
                        }
                    } else {
                        // Kelp strands
                        const sway = Math.sin(time * 0.3 + i * 0.7) * 10;
                        const kLen = 30 + Math.sin(i) * 15;
                        ctx.beginPath();
                        ctx.moveTo(cx, cBaseY);
                        ctx.quadraticCurveTo(cx + sway * 0.5, cBaseY - kLen * 0.5, cx + sway, cBaseY - kLen);
                        ctx.strokeStyle = `rgba(40,120,50,${floraAlpha})`;
                        ctx.lineWidth = 2;
                        ctx.stroke();
                    }
                }
            }
            ctx.restore();
        }

        // ── Main 3D scene render frame ──
        function renderDiveScene() {
            if (!diveMode) return;
            if (!dive3D) return;

            const dt = dive3D.clock.getDelta();
            dive3D.time += dt;
            diveTime += dt;
            const t = dive3D.time;
            const depthNorm = diveDepth / 11000;
            const depth = diveDepth;
            const D = dive3D;

            // ══════════════════════════════════════════════════════════════
            // DEPTH-BASED ENVIRONMENT
            // ══════════════════════════════════════════════════════════════
            const props = getWaterProps(depth);
            const wc = props.waterColor;
            const fc = props.fogColor;

            // Fog color & density — realistic visibility falloff
            const fogCol = new THREE.Color(fc[0], fc[1], fc[2]);
            D.scene.fog.color.copy(fogCol);
            D.scene.fog.density = 0.005 + depthNorm * 0.08; // gets much thicker with depth
            D.renderer.setClearColor(fogCol, 1);

            // Ambient light — fades from bright blue to near-zero
            const ambIntensity = Math.max(0.01, 0.6 * (1 - depthNorm * 3));
            D.ambLight.intensity = ambIntensity;
            D.ambLight.color.setRGB(
                Math.max(0.01, 0.27 - depthNorm * 0.8),
                Math.max(0.01, 0.53 - depthNorm * 1.2),
                Math.max(0.02, 0.8 - depthNorm * 1.5)
            );

            // Sun light — fades to zero by ~1500m
            const sunIntensity = Math.max(0, 1.5 * (1 - depthNorm * 7));
            D.sunLight.intensity = sunIntensity;

            // Headlight — ramps up as depth increases (submersible torch)
            const headIntensity = Math.min(4, Math.max(0, (depthNorm - 0.05) * 10));
            D.headlight.intensity = headIntensity;
            D.headGlow.intensity = headIntensity * 0.5;

            // Tone mapping exposure — darken the scene with depth
            D.renderer.toneMappingExposure = Math.max(0.15, 1.0 - depthNorm * 1.8);

            // Terrain color shift — sandy near surface, dark sediment deeper
            const terrainR = Math.max(0.02, 0.17 - depthNorm * 0.4);
            const terrainG = Math.max(0.02, 0.12 - depthNorm * 0.3);
            const terrainB = Math.max(0.02, 0.08 - depthNorm * 0.2);
            D.terrain.material.color.setRGB(terrainR, terrainG, terrainB);

            // ══════════════════════════════════════════════════════════════
            // CAUSTIC LIGHTS (near surface only)
            // ══════════════════════════════════════════════════════════════
            const causticVis = Math.max(0, 1 - depthNorm * 10);
            D.causticGroup.visible = causticVis > 0.01;
            for (const cl of D.causticLights) {
                cl.phase += dt * cl.speed;
                cl.light.intensity = causticVis * (0.2 + 0.15 * Math.sin(cl.phase));
                cl.light.position.x += Math.sin(cl.phase * 0.5) * 0.02;
                cl.light.position.z += Math.cos(cl.phase * 0.3) * 0.02;
            }

            // ══════════════════════════════════════════════════════════════
            // VOLUMETRIC LIGHT SHAFTS
            // ══════════════════════════════════════════════════════════════
            const shaftVis = Math.max(0, 1 - depthNorm * 5);
            D.shaftGroup.visible = shaftVis > 0.01;
            for (const s of D.shafts3D) {
                s.phase += dt * 0.3;
                s.mesh.material.opacity = s.baseOp * shaftVis * (0.6 + 0.4 * Math.sin(s.phase));
                s.mesh.rotation.y += s.drift;
            }

            // ══════════════════════════════════════════════════════════════
            // MARINE SNOW PARTICLES
            // ══════════════════════════════════════════════════════════════
            const snowPosArr = D.snowGeo.attributes.position.array;
            for (let i = 0; i < D.snowCount; i++) {
                const sd = D.snowData[i];
                sd.phase += dt * 0.5;
                snowPosArr[i * 3] += sd.vx + Math.sin(sd.phase) * 0.005;
                snowPosArr[i * 3 + 1] += sd.vy * (1 + depthNorm * 3);
                // Wrap around
                if (snowPosArr[i * 3 + 1] < -12) snowPosArr[i * 3 + 1] = 50;
                if (snowPosArr[i * 3] > 50) snowPosArr[i * 3] = -50;
                if (snowPosArr[i * 3] < -50) snowPosArr[i * 3] = 50;
            }
            D.snowGeo.attributes.position.needsUpdate = true;
            // Snow gets denser with depth
            D.snowMat.opacity = 0.15 + depthNorm * 0.6;
            D.snowMat.size = 0.1 + depthNorm * 0.2;

            // ══════════════════════════════════════════════════════════════
            // BIOLUMINESCENT PARTICLES (visible from ~200m+)
            // ══════════════════════════════════════════════════════════════
            const bioVis = Math.min(1, Math.max(0, (depthNorm - 0.02) / 0.1));
            D.bioMat.opacity = bioVis * 0.6;
            D.bioMat.size = 0.2 + bioVis * 0.3;
            if (bioVis > 0.01) {
                const bioPosArr = D.bioGeo.attributes.position.array;
                for (let i = 0; i < D.bioCount; i++) {
                    const bd = D.bioData[i];
                    bd.phase += dt * bd.pulseSpeed;
                    bioPosArr[i * 3] += Math.sin(bd.phase * 0.3) * 0.005;
                    bioPosArr[i * 3 + 1] = bd.baseY + Math.sin(bd.phase) * 0.5;
                    bioPosArr[i * 3 + 2] += Math.cos(bd.phase * 0.2) * 0.005;
                }
                D.bioGeo.attributes.position.needsUpdate = true;
            }

            // ══════════════════════════════════════════════════════════════
            // ZONE-BASED VISIBILITY — show/hide creature groups
            // ══════════════════════════════════════════════════════════════
            // Coral & kelp: visible 0–400m, fade out
            const shallowVis = Math.max(0, 1 - depthNorm * 5);
            D.coralGroup.visible = shallowVis > 0.01;
            D.kelpGroup.visible = shallowVis > 0.01;
            D.surfMesh.visible = depthNorm < 0.05;
            if (D.surfMesh.visible) {
                // Animate surface waves
                const surfPos = D.surfMesh.geometry.attributes.position;
                for (let i = 0; i < surfPos.count; i++) {
                    const x = surfPos.getX(i), z = surfPos.getZ(i);
                    surfPos.setY(i, 15 + Math.sin(x * 0.1 + t * 1.5) * 0.3 + Math.cos(z * 0.08 + t * 1.2) * 0.2);
                }
                surfPos.needsUpdate = true;
                D.surfMat.opacity = Math.max(0, 0.3 * (1 - depthNorm * 25));
            }

            // Fish schools: visible 0–300m
            const fishVis = Math.max(0, 1 - depthNorm * 8);
            D.fishGroup.visible = fishVis > 0.01;
            if (D.fishGroup.visible) {
                for (const school of D.fishSchools) {
                    for (let i = 0; i < school.data.length; i++) {
                        const fd = school.data[i];
                        fd.angle += dt * fd.speed;
                        fd.wobble += dt * 3;
                        school.dummy.position.set(
                            fd.cx + Math.cos(fd.angle) * fd.radius,
                            fd.cy + Math.sin(fd.wobble) * 0.3,
                            fd.cz + Math.sin(fd.angle) * fd.radius
                        );
                        school.dummy.rotation.y = -fd.angle + Math.PI / 2;
                        school.dummy.updateMatrix();
                        school.mesh.setMatrixAt(i, school.dummy.matrix);
                    }
                    school.mesh.instanceMatrix.needsUpdate = true;
                }
            }

            // Turtles: visible 0–200m
            const turtleVis = Math.max(0, 1 - depthNorm * 12);
            D.turtleGroup.visible = turtleVis > 0.01;
            if (D.turtleGroup.visible) {
                for (const tu of D.turtles) {
                    tu.angle += dt * tu.speed * 0.3;
                    tu.phase += dt * tu.speed;
                    tu.group.position.x = Math.cos(tu.angle) * tu.radius;
                    tu.group.position.z = Math.sin(tu.angle) * tu.radius;
                    tu.group.position.y = 4 + Math.sin(tu.phase) * 2;
                    tu.group.rotation.y = -tu.angle + Math.PI / 2;
                    // Flipper animation
                    tu.group.children.forEach((c, ci) => {
                        if (ci >= 2) c.rotation.x = Math.sin(tu.phase * 2 + ci) * 0.3;
                    });
                }
            }

            // Jellyfish: visible 100–2500m
            const jellyMinD = 0.009, jellyMaxD = 0.23;
            const jellyVis = depthNorm >= jellyMinD && depthNorm <= jellyMaxD ? 1 : Math.max(0, 1 - Math.abs(depthNorm - (jellyMinD + jellyMaxD) / 2) * 10);
            D.jellyGroup.visible = jellyVis > 0.01;
            if (D.jellyGroup.visible) {
                for (const j of D.jellies) {
                    j.phase += dt * j.speed;
                    // Pulsing bell
                    const pulse = 0.9 + Math.sin(j.phase * 2) * 0.15;
                    j.bell.scale.set(1, pulse, 1);
                    // Gentle drift
                    j.group.position.x += j.driftX + Math.sin(j.phase * 0.2) * 0.002;
                    j.group.position.y += Math.sin(j.phase * 0.5) * 0.003;
                    j.group.position.z += j.driftZ + Math.cos(j.phase * 0.15) * 0.002;
                    // Wrap
                    if (j.group.position.x > 30) j.group.position.x = -30;
                    if (j.group.position.x < -30) j.group.position.x = 30;
                    if (j.group.position.z > 30) j.group.position.z = -30;
                    if (j.group.position.z < -30) j.group.position.z = 30;
                    // Tentacles sway
                    j.tentacles.children.forEach((tent, ti) => {
                        tent.rotation.x = Math.sin(j.phase * 1.5 + ti) * 0.15;
                        tent.rotation.z = Math.cos(j.phase * 1.2 + ti * 0.7) * 0.1;
                    });
                    // Bioluminescence in deeper water
                    if (depthNorm > 0.05) {
                        const glow = Math.sin(j.phase * 1.5) * 0.1 + 0.15;
                        j.bell.material.emissiveIntensity = glow;
                    } else {
                        j.bell.material.emissiveIntensity = 0.05;
                    }
                }
            }

            // Anglerfish: visible 1000–5000m
            const anglerMinN = 0.09, anglerMaxN = 0.45;
            const anglerShow = depthNorm >= anglerMinN && depthNorm <= anglerMaxN;
            D.anglerGroup.visible = anglerShow;
            if (anglerShow) {
                for (const a of D.anglers) {
                    a.phase += dt * a.speed;
                    a.direction += dt * 0.05;
                    a.group.position.x += Math.cos(a.direction) * dt * a.speed * 2;
                    a.group.position.z += Math.sin(a.direction) * dt * a.speed * 2;
                    a.group.position.y += Math.sin(a.phase * 0.5) * 0.005;
                    a.group.rotation.y = a.direction;
                    // Wrap
                    if (a.group.position.x > 25) a.group.position.x = -25;
                    if (a.group.position.x < -25) a.group.position.x = 25;
                    if (a.group.position.z > 25) a.group.position.z = -25;
                    if (a.group.position.z < -25) a.group.position.z = 25;
                    // Lure flicker
                    const flicker = 0.5 + 0.5 * Math.sin(a.phase * 4);
                    a.lureLight.intensity = 1 + flicker * 3;
                    a.lureSphere.material.color.setHSL(0.5, 0.9, 0.5 + flicker * 0.3);
                }
            }

            // Giant squid: visible 800–4000m
            const squidMinN = 0.07, squidMaxN = 0.36;
            const squidShow = depthNorm >= squidMinN && depthNorm <= squidMaxN;
            D.squidGroup.visible = squidShow;
            if (squidShow) {
                for (const sq of D.squids) {
                    sq.phase += dt * sq.speed;
                    sq.direction += dt * 0.08 * Math.sin(sq.phase * 0.3);
                    sq.group.position.x += Math.cos(sq.direction) * dt * sq.speed * 3;
                    sq.group.position.z += Math.sin(sq.direction) * dt * sq.speed * 3;
                    sq.group.position.y += Math.sin(sq.phase * 0.4) * 0.008;
                    sq.group.rotation.y = sq.direction + Math.PI;
                    // Wrap
                    if (sq.group.position.x > 30) sq.group.position.x = -30;
                    if (sq.group.position.x < -30) sq.group.position.x = 30;
                    if (sq.group.position.z > 30) sq.group.position.z = -30;
                    if (sq.group.position.z < -30) sq.group.position.z = 30;
                    // Tentacle animation
                    sq.group.children.forEach((c, ci) => {
                        if (ci > 0 && ci <= 8) {
                            c.rotation.x = Math.sin(sq.phase * 2 + ci * 0.5) * 0.2;
                            c.rotation.z = Math.cos(sq.phase * 1.5 + ci * 0.3) * 0.15;
                        }
                    });
                }
            }

            // Hydrothermal vents: visible 3500–7000m
            const ventMinN = 0.32, ventMaxN = 0.64;
            const ventShow = depthNorm >= ventMinN && depthNorm <= ventMaxN;
            D.ventGroup.visible = ventShow;
            if (ventShow) {
                // Animate smoke particles
                const vsPosArr = D.ventSmokeGeo.attributes.position.array;
                for (let i = 0; i < D.ventSmokeCount; i++) {
                    const vsd = D.ventSmokeData[i];
                    vsd.life += dt * vsd.speed * 0.3;
                    if (vsd.life > 1) {
                        vsd.life = 0;
                        vsPosArr[i * 3] = vsd.baseX + (Math.random() - 0.5) * 2;
                        vsPosArr[i * 3 + 2] = vsd.baseZ + (Math.random() - 0.5) * 2;
                    }
                    vsPosArr[i * 3 + 1] = -10 + vsd.life * 18;
                    vsPosArr[i * 3] += Math.sin(t + i * 0.1) * 0.01;
                    vsPosArr[i * 3 + 2] += Math.cos(t * 0.7 + i * 0.1) * 0.01;
                }
                D.ventSmokeGeo.attributes.position.needsUpdate = true;
                D.ventSmokeMat.opacity = 0.25;
            }

            // Trench walls: visible 5500m+
            D.trenchGroup.visible = depthNorm > 0.5;

            // ══════════════════════════════════════════════════════════════
            // CAMERA — gentle orbit auto-animation
            // ══════════════════════════════════════════════════════════════
            D.camAngle += dt * 0.08;
            const camRadius = 18 + depthNorm * 10;
            const camY = 5 - depthNorm * 12;
            D.camera.position.x = Math.cos(D.camAngle) * camRadius;
            D.camera.position.z = Math.sin(D.camAngle) * camRadius;
            D.camera.position.y += (camY - D.camera.position.y) * 0.03;
            D.camera.lookAt(0, camY - 3, 0);

            // ══════════════════════════════════════════════════════════════
            // RENDER
            // ══════════════════════════════════════════════════════════════
            D.renderer.render(D.scene, D.camera);

            // ══════════════════════════════════════════════════════════════
            // 2D OVERLAY — vignette + depth fog overlay
            // ══════════════════════════════════════════════════════════════
            if (diveSceneCtx) {
                const ctx = diveSceneCtx;
                const w = ctx.canvas.width, h = ctx.canvas.height;
                ctx.clearRect(0, 0, w, h);

                // Depth vignette
                const vigStr = 0.2 + depthNorm * 0.6;
                const vGrad = ctx.createRadialGradient(w / 2, h / 2, Math.min(w, h) * 0.2, w / 2, h / 2, Math.max(w, h) * 0.7);
                vGrad.addColorStop(0, 'transparent');
                vGrad.addColorStop(1, `rgba(0,0,0,${vigStr})`);
                ctx.fillStyle = vGrad;
                ctx.fillRect(0, 0, w, h);

                // Pressure distortion at extreme depths
                if (depthNorm > 0.5) {
                    const distort = (depthNorm - 0.5) * 0.3;
                    const grd = ctx.createLinearGradient(0, 0, 0, h);
                    grd.addColorStop(0, `rgba(0,0,0,${distort * 0.5})`);
                    grd.addColorStop(0.5, 'transparent');
                    grd.addColorStop(1, `rgba(0,0,0,${distort * 0.5})`);
                    ctx.fillStyle = grd;
                    ctx.fillRect(0, 0, w, h);
                }
            }
        }

        // ── Update zone info card ──
        function updateDiveZoneCard(zoneIdx) {

        // ── Update environment card ──
        function updateDiveEnvCard(depth) {
            const card = document.getElementById('dive-env-card');
            if (!card) return;
            const z = OCEAN_ZONES[getCurrentZone(depth)];
            const props = getWaterProps(depth);
            const pressureATM = (1 + depth / 10).toFixed(0);
            const tempEst = depth < 200 ? (24 - depth * 0.03).toFixed(1) :
                depth < 1000 ? (18 - (depth - 200) * 0.016).toFixed(1) :
                    (5 - Math.min(4, (depth - 1000) * 0.0004)).toFixed(1);

    <div class="dive-env-row">
