        // ── Master update loop ──
        function updateDiveVisuals() {
            // Auto-descent
            if (diveAutoDescend) {
                diveTargetDepth = Math.min(11000, diveTargetDepth + 12);
                if (diveTargetDepth >= 11000) {
                    diveAutoDescend = false;
                    const ab = document.getElementById('dive-auto-btn');
                    if (ab) { ab.classList.remove('active'); ab.textContent = '▼ Begin Descent'; }
                }
            }

            // Smooth lerp depth
            diveDepth += (diveTargetDepth - diveDepth) * 0.06;
            if (Math.abs(diveDepth - diveTargetDepth) < 1) diveDepth = diveTargetDepth;

            const depthNorm = diveDepth / 11000;
            const zoneIdx = getCurrentZone(diveDepth);

            // Depth counter
            const depthNum = document.getElementById('dive-depth-number');
            if (depthNum) depthNum.textContent = Math.round(diveDepth).toLocaleString();

            // Rail thumb + fill
            const thumb = document.getElementById('dive-rail-thumb');
            const fill = document.getElementById('dive-rail-fill');
            if (thumb) thumb.style.top = (depthNorm * 100) + '%';
            if (fill) fill.style.height = (depthNorm * 100) + '%';

            // Zone ticks
            const ticks = document.querySelectorAll('.dive-rail-zone-tick');
            ticks.forEach(t => {
                const zi = parseInt(t.dataset.zone);
                t.classList.toggle('active', zi === zoneIdx);
            });

            // Zone card
            if (zoneIdx !== lastDiveZone) {
                lastDiveZone = zoneIdx;
                updateDiveZoneCard(zoneIdx);
            }

            // Env card updates every ~10 frames
            if (Math.round(diveTime * 60) % 10 === 0) {
                updateDiveEnvCard(diveDepth);
            }

            // Update audio mix based on current depth
            updateDiveAudioMix(diveDepth);

            // Render the full underwater 2D scene
            renderDiveScene();

            // Adjust main 3D scene camera subtly
            if (diveMode) {
                const cameraY = 22 - (depthNorm * 40);
                camera.position.y += (cameraY - camera.position.y) * 0.03;
                controls.target.y += (-depthNorm * 10 - controls.target.y) * 0.03;
                const uwFogNear = Math.max(5, 100 - depthNorm * 95);
                const uwFogFar = Math.max(50, 1800 - depthNorm * 1700);
                fogNear.value += (uwFogNear - fogNear.value) * 0.03;
                fogFar.value += (uwFogFar - fogFar.value) * 0.03;
                const targetExposure = Math.max(0.05, 0.6 - depthNorm * 0.55);
                renderer.toneMappingExposure += (targetExposure - renderer.toneMappingExposure) * 0.03;
            }
        }

        // ═══════════════════════════════════════════════════════════════════════
        // ─── Procedural Ambient Underwater Audio Engine (Web Audio API) ──────
        // ═══════════════════════════════════════════════════════════════════════
        // All sounds are synthesized in real-time — no audio files needed.
        // Layers: surface waves, dolphin clicks, whale songs, deep rumble,
        // hydrothermal crackling, pressure groans, bioluminescent pings,
        // breathing/regulator, and subtle sonar pulses.

        let diveAudioEnabled = false;
        let diveAudioCtx = null;
        let diveAudioMaster = null;
        let diveAudioLayers = {};
        let diveAudioScheduler = null;
        let diveAudioInitialized = false;
        let diveAudioUserVolume = 0.8;
        let diveHeartbeatBpm = 72;

        function initDiveAudioCtx() {
            if (diveAudioInitialized) return;
            try {
                diveAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
                diveAudioMaster = diveAudioCtx.createGain();
                diveAudioMaster.gain.value = 0;
                diveAudioMaster.connect(diveAudioCtx.destination);
                diveAudioInitialized = true;
            } catch (e) { console.warn('Web Audio not available:', e); }
        }

        // ── Utility: create noise buffer ──
        function createNoiseBuffer(duration, type) {
            const sr = diveAudioCtx.sampleRate;
            const len = sr * duration;
            const buf = diveAudioCtx.createBuffer(1, len, sr);
            const data = buf.getChannelData(0);
            if (type === 'pink') {
                let b0 = 0, b1 = 0, b2 = 0, b3 = 0, b4 = 0, b5 = 0, b6 = 0;
                for (let i = 0; i < len; i++) {
                    const w = Math.random() * 2 - 1;
                    b0 = 0.99886 * b0 + w * 0.0555179; b1 = 0.99332 * b1 + w * 0.0750759;
                    b2 = 0.96900 * b2 + w * 0.1538520; b3 = 0.86650 * b3 + w * 0.3104856;
                    b4 = 0.55000 * b4 + w * 0.5329522; b5 = -0.7616 * b5 - w * 0.0168980;
                    data[i] = (b0 + b1 + b2 + b3 + b4 + b5 + b6 + w * 0.5362) * 0.11;
                    b6 = w * 0.115926;
                }
            } else if (type === 'brown') {
                let last = 0;
                for (let i = 0; i < len; i++) {
                    const w = Math.random() * 2 - 1;
                    last = (last + (0.02 * w)) / 1.02;
                    data[i] = last * 3.5;
                }
            } else {
                for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
            }
            return buf;
        }

        // ── Layer: Surface waves (filtered white noise + slow LFO) ──
        function createSurfaceWavesLayer() {
            const ctx = diveAudioCtx;
            const gain = ctx.createGain();
            gain.gain.value = 0;

            const noiseSrc = ctx.createBufferSource();
            noiseSrc.buffer = createNoiseBuffer(4, 'pink');
            noiseSrc.loop = true;

            // Bandpass filter for wave-like sound
            const bp = ctx.createBiquadFilter();
            bp.type = 'bandpass';
            bp.frequency.value = 400;
            bp.Q.value = 0.6;

            // LFO for wave surge
            const lfo = ctx.createOscillator();
            lfo.type = 'sine';
            lfo.frequency.value = 0.15; // slow wave rhythm
            const lfoGain = ctx.createGain();
            lfoGain.gain.value = 0.3;
            lfo.connect(lfoGain);
            lfoGain.connect(gain.gain);

            // Second layer: deep rumble for wave body
            const rumbleSrc = ctx.createBufferSource();
            rumbleSrc.buffer = createNoiseBuffer(4, 'brown');
            rumbleSrc.loop = true;
            const rumbleLP = ctx.createBiquadFilter();
            rumbleLP.type = 'lowpass';
            rumbleLP.frequency.value = 180;
            const rumbleGain = ctx.createGain();
            rumbleGain.gain.value = 0.4;

            noiseSrc.connect(bp);
            bp.connect(gain);
            rumbleSrc.connect(rumbleLP);
            rumbleLP.connect(rumbleGain);
            rumbleGain.connect(gain);
            gain.connect(diveAudioMaster);

            noiseSrc.start();
            rumbleSrc.start();
            lfo.start();

            return { gain, nodes: [noiseSrc, rumbleSrc, lfo], bp, rumbleLP };
        }

        // ── Layer: Breathing / Regulator ──
        function createBreathingLayer() {
            const ctx = diveAudioCtx;
            const gain = ctx.createGain();
            gain.gain.value = 0;

            const noiseSrc = ctx.createBufferSource();
            noiseSrc.buffer = createNoiseBuffer(8, 'white');
            noiseSrc.loop = true;

            const bp = ctx.createBiquadFilter();
            bp.type = 'bandpass';
            bp.frequency.value = 800;
            bp.Q.value = 2;

            // Breathing rhythm LFO
            const lfo = ctx.createOscillator();
            lfo.type = 'sine';
            lfo.frequency.value = 0.2; // ~12 breaths/min
            const lfoGain = ctx.createGain();
            lfoGain.gain.value = 0.15;
            lfo.connect(lfoGain);
            lfoGain.connect(gain.gain);

            noiseSrc.connect(bp);
            bp.connect(gain);
            gain.connect(diveAudioMaster);

            noiseSrc.start();
            lfo.start();

            return { gain, nodes: [noiseSrc, lfo] };
        }

        // ── Layer: Dolphin clicks (scheduled short pulses) ──
        function createDolphinClicksLayer() {
            const ctx = diveAudioCtx;
            const gain = ctx.createGain();
            gain.gain.value = 0;
            gain.connect(diveAudioMaster);

            function scheduleClick() {
                if (!diveAudioEnabled) return;
                const now = ctx.currentTime;
                // Burst of 2-5 clicks
                const count = 2 + Math.floor(Math.random() * 4);
                for (let i = 0; i < count; i++) {
                    const t = now + i * (0.04 + Math.random() * 0.03);
                    const osc = ctx.createOscillator();
                    osc.type = 'sine';
                    osc.frequency.value = 3000 + Math.random() * 5000;
                    const clickGain = ctx.createGain();
                    clickGain.gain.setValueAtTime(0, t);
                    clickGain.gain.linearRampToValueAtTime(0.25 + Math.random() * 0.15, t + 0.002);
                    clickGain.gain.exponentialRampToValueAtTime(0.001, t + 0.015 + Math.random() * 0.01);
                    osc.connect(clickGain);
                    clickGain.connect(gain);
                    osc.start(t);
                    osc.stop(t + 0.03);
                }
                // Next burst in 2-6s
                setTimeout(scheduleClick, 2000 + Math.random() * 4000);
            }

            return { gain, nodes: [], schedule: scheduleClick };
        }

        // ── Layer: Whale song (slow sine sweeps with harmonics) ──
        function createWhaleSongLayer() {
            const ctx = diveAudioCtx;
            const gain = ctx.createGain();
            gain.gain.value = 0;
            gain.connect(diveAudioMaster);

            function scheduleCall() {
                if (!diveAudioEnabled) return;
                const now = ctx.currentTime;
                const duration = 2.5 + Math.random() * 4;
                const baseFreq = 80 + Math.random() * 120;

                // Main tone — frequency sweep
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(baseFreq, now);
                osc.frequency.linearRampToValueAtTime(baseFreq * (1.2 + Math.random() * 0.6), now + duration * 0.5);
                osc.frequency.linearRampToValueAtTime(baseFreq * (0.7 + Math.random() * 0.3), now + duration);

                // Harmonic
                const osc2 = ctx.createOscillator();
                osc2.type = 'sine';
                osc2.frequency.setValueAtTime(baseFreq * 2.01, now);
                osc2.frequency.linearRampToValueAtTime(baseFreq * 2.4, now + duration * 0.5);
                osc2.frequency.linearRampToValueAtTime(baseFreq * 1.8, now + duration);
                const harm2Gain = ctx.createGain();
                harm2Gain.gain.value = 0.2;

                // Third harmonic (subtle)
                const osc3 = ctx.createOscillator();
                osc3.type = 'sine';
                osc3.frequency.setValueAtTime(baseFreq * 3.02, now);
                osc3.frequency.linearRampToValueAtTime(baseFreq * 3.5, now + duration * 0.4);
                osc3.frequency.linearRampToValueAtTime(baseFreq * 2.8, now + duration);
                const harm3Gain = ctx.createGain();
                harm3Gain.gain.value = 0.08;

                // Envelope
                const env = ctx.createGain();
                env.gain.setValueAtTime(0, now);
                env.gain.linearRampToValueAtTime(0.35, now + duration * 0.15);
                env.gain.setValueAtTime(0.35, now + duration * 0.6);
                env.gain.linearRampToValueAtTime(0, now + duration);

                // Reverb-like: gentle feedback delay
                const delay = ctx.createDelay(1.0);
                delay.delayTime.value = 0.4 + Math.random() * 0.3;
                const fbGain = ctx.createGain();
                fbGain.gain.value = 0.25;
                const delayLP = ctx.createBiquadFilter();
                delayLP.type = 'lowpass';
                delayLP.frequency.value = 600;

                osc.connect(env);
                osc2.connect(harm2Gain); harm2Gain.connect(env);
                osc3.connect(harm3Gain); harm3Gain.connect(env);
                env.connect(gain);
                env.connect(delay);
                delay.connect(delayLP);
                delayLP.connect(fbGain);
                fbGain.connect(delay);
                delayLP.connect(gain);

                osc.start(now); osc.stop(now + duration + 0.5);
                osc2.start(now); osc2.stop(now + duration + 0.5);
                osc3.start(now); osc3.stop(now + duration + 0.5);

                // Next call: 5-15s gap
                setTimeout(scheduleCall, (duration + 5 + Math.random() * 10) * 1000);
            }

            return { gain, nodes: [], schedule: scheduleCall };
        }

        // ── Layer: Deep pressure groans (very low filtered noise bursts) ──
        function createDeepGroansLayer() {
            const ctx = diveAudioCtx;
            const gain = ctx.createGain();
            gain.gain.value = 0;
            gain.connect(diveAudioMaster);

            function scheduleGroan() {
                if (!diveAudioEnabled) return;
                const now = ctx.currentTime;
                const dur = 3 + Math.random() * 5;

                const noiseSrc = ctx.createBufferSource();
                noiseSrc.buffer = createNoiseBuffer(dur + 1, 'brown');

                const lp = ctx.createBiquadFilter();
                lp.type = 'lowpass';
                lp.frequency.setValueAtTime(40 + Math.random() * 30, now);
                lp.frequency.linearRampToValueAtTime(20 + Math.random() * 20, now + dur);
                lp.Q.value = 5;

                const env = ctx.createGain();
                env.gain.setValueAtTime(0, now);
                env.gain.linearRampToValueAtTime(0.6, now + dur * 0.2);
                env.gain.setValueAtTime(0.6, now + dur * 0.7);
                env.gain.linearRampToValueAtTime(0, now + dur);

                noiseSrc.connect(lp);
                lp.connect(env);
                env.connect(gain);
                noiseSrc.start(now);
                noiseSrc.stop(now + dur + 0.5);

                setTimeout(scheduleGroan, (dur + 6 + Math.random() * 12) * 1000);
            }

            return { gain, nodes: [], schedule: scheduleGroan };
        }

        // ── Layer: Hydrothermal vent crackles ──
        function createVentCracklesLayer() {
            const ctx = diveAudioCtx;
            const gain = ctx.createGain();
            gain.gain.value = 0;
            gain.connect(diveAudioMaster);

            function scheduleBurst() {
                if (!diveAudioEnabled) return;
                const now = ctx.currentTime;
                const crackleCnt = 5 + Math.floor(Math.random() * 15);

                for (let i = 0; i < crackleCnt; i++) {
                    const t = now + Math.random() * 0.8;
                    const nSrc = ctx.createBufferSource();
                    const dur = 0.01 + Math.random() * 0.04;
                    nSrc.buffer = createNoiseBuffer(dur + 0.02, 'white');

                    const hp = ctx.createBiquadFilter();
                    hp.type = 'highpass';
                    hp.frequency.value = 1500 + Math.random() * 3000;

                    const cEnv = ctx.createGain();
                    cEnv.gain.setValueAtTime(0, t);
                    cEnv.gain.linearRampToValueAtTime(0.3 + Math.random() * 0.4, t + 0.003);
                    cEnv.gain.exponentialRampToValueAtTime(0.001, t + dur);

                    nSrc.connect(hp);
                    hp.connect(cEnv);
                    cEnv.connect(gain);
                    nSrc.start(t);
                    nSrc.stop(t + dur + 0.05);
                }

                // Continuous low rumble for the vent
                const ventRumble = ctx.createBufferSource();
                ventRumble.buffer = createNoiseBuffer(2, 'brown');
                const ventLP = ctx.createBiquadFilter();
                ventLP.type = 'lowpass';
                ventLP.frequency.value = 100;
                const ventEnv = ctx.createGain();
                ventEnv.gain.setValueAtTime(0, now);
                ventEnv.gain.linearRampToValueAtTime(0.2, now + 0.3);
                ventEnv.gain.setValueAtTime(0.2, now + 1.2);
                ventEnv.gain.linearRampToValueAtTime(0, now + 2);
                ventRumble.connect(ventLP);
                ventLP.connect(ventEnv);
                ventEnv.connect(gain);
                ventRumble.start(now);
                ventRumble.stop(now + 2.5);

                setTimeout(scheduleBurst, 1500 + Math.random() * 3000);
            }

            return { gain, nodes: [], schedule: scheduleBurst };
        }

        // ── Layer: Bioluminescent pings (ethereal high-pitched resonant tones) ──
        function createBioPingsLayer() {
            const ctx = diveAudioCtx;
            const gain = ctx.createGain();
            gain.gain.value = 0;
            gain.connect(diveAudioMaster);

            function schedulePing() {
                if (!diveAudioEnabled) return;
                const now = ctx.currentTime;
                const freq = 1200 + Math.random() * 3000;
                const dur = 0.5 + Math.random() * 1.5;

                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, now);
                osc.frequency.exponentialRampToValueAtTime(freq * 0.6, now + dur);

                const env = ctx.createGain();
                env.gain.setValueAtTime(0, now);
                env.gain.linearRampToValueAtTime(0.12 + Math.random() * 0.08, now + 0.05);
                env.gain.exponentialRampToValueAtTime(0.001, now + dur);

                // Slight reverb via delay
                const dly = ctx.createDelay(0.5);
                dly.delayTime.value = 0.15 + Math.random() * 0.2;
                const dlyGain = ctx.createGain();
                dlyGain.gain.value = 0.3;

                osc.connect(env);
                env.connect(gain);
                env.connect(dly);
                dly.connect(dlyGain);
                dlyGain.connect(gain);

                osc.start(now);
                osc.stop(now + dur + 0.5);

                setTimeout(schedulePing, 1500 + Math.random() * 4000);
            }

            return { gain, nodes: [], schedule: schedulePing };
        }

        // ── Layer: Sonar pulse (subtle ping at extreme depths) ──
        function createSonarLayer() {
            const ctx = diveAudioCtx;
            const gain = ctx.createGain();
            gain.gain.value = 0;
            gain.connect(diveAudioMaster);

            function schedulePulse() {
                if (!diveAudioEnabled) return;
                const now = ctx.currentTime;

                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = 1500;

                const env = ctx.createGain();
                env.gain.setValueAtTime(0, now);
                env.gain.linearRampToValueAtTime(0.15, now + 0.01);
                env.gain.exponentialRampToValueAtTime(0.001, now + 2.5);

                // Long reverb tail
                const dly = ctx.createDelay(1.0);
                dly.delayTime.value = 0.6;
                const fb = ctx.createGain();
                fb.gain.value = 0.35;
                const dlyLP = ctx.createBiquadFilter();
                dlyLP.type = 'lowpass';
                dlyLP.frequency.value = 2000;

                osc.connect(env);
                env.connect(gain);
                env.connect(dly);
                dly.connect(dlyLP);
                dlyLP.connect(fb);
                fb.connect(dly);
                dlyLP.connect(gain);

                osc.start(now);
                osc.stop(now + 0.1);

                setTimeout(schedulePulse, 8000 + Math.random() * 12000);
            }

            return { gain, nodes: [], schedule: schedulePulse };
        }

        // ── Layer: Heartbeat (dual-pulse oscillator that speeds up with depth) ──
        function createHeartbeatLayer() {
            const ctx = diveAudioCtx;
            const gain = ctx.createGain();
            gain.gain.value = 0;
            gain.connect(diveAudioMaster);

            let heartbeatTimeout = null;
            let running = true;

            function scheduleHeartbeat() {
                if (!running || !diveAudioEnabled) return;
                const now = ctx.currentTime;

                // "lub" — lower pitch, slightly louder
                const lub = ctx.createOscillator();
                lub.type = 'sine';
                lub.frequency.value = 55;
                const lubEnv = ctx.createGain();
                lubEnv.gain.setValueAtTime(0, now);
                lubEnv.gain.linearRampToValueAtTime(0.55, now + 0.02);
                lubEnv.gain.exponentialRampToValueAtTime(0.001, now + 0.18);

                // Sub-harmonic body for lub
                const lubSub = ctx.createOscillator();
                lubSub.type = 'sine';
                lubSub.frequency.value = 35;
                const lubSubEnv = ctx.createGain();
                lubSubEnv.gain.setValueAtTime(0, now);
                lubSubEnv.gain.linearRampToValueAtTime(0.3, now + 0.015);
                lubSubEnv.gain.exponentialRampToValueAtTime(0.001, now + 0.15);

                // "dub" — slightly higher pitch, softer, comes ~0.12s after lub
                const dubDelay = 0.12;
                const dub = ctx.createOscillator();
                dub.type = 'sine';
                dub.frequency.value = 70;
                const dubEnv = ctx.createGain();
                dubEnv.gain.setValueAtTime(0, now + dubDelay);
                dubEnv.gain.linearRampToValueAtTime(0.35, now + dubDelay + 0.015);
                dubEnv.gain.exponentialRampToValueAtTime(0.001, now + dubDelay + 0.14);

                // Soft noise thud for body feel
                const thudSrc = ctx.createBufferSource();
                thudSrc.buffer = createNoiseBuffer(0.15, 'brown');
                const thudLP = ctx.createBiquadFilter();
                thudLP.type = 'lowpass';
                thudLP.frequency.value = 80;
                thudLP.Q.value = 3;
                const thudEnv = ctx.createGain();
                thudEnv.gain.setValueAtTime(0, now);
                thudEnv.gain.linearRampToValueAtTime(0.2, now + 0.01);
                thudEnv.gain.exponentialRampToValueAtTime(0.001, now + 0.12);

                lub.connect(lubEnv); lubEnv.connect(gain);
                lubSub.connect(lubSubEnv); lubSubEnv.connect(gain);
                dub.connect(dubEnv); dubEnv.connect(gain);
                thudSrc.connect(thudLP); thudLP.connect(thudEnv); thudEnv.connect(gain);

                lub.start(now); lub.stop(now + 0.25);
                lubSub.start(now); lubSub.stop(now + 0.2);
                dub.start(now + dubDelay); dub.stop(now + dubDelay + 0.2);
                thudSrc.start(now); thudSrc.stop(now + 0.2);

                // Calculate interval from current BPM
                const interval = 60000 / diveHeartbeatBpm;
                heartbeatTimeout = setTimeout(scheduleHeartbeat, interval);
            }

            return {
                gain,
                nodes: [],
                schedule: scheduleHeartbeat,
                stop: () => {
                    running = false;
                    if (heartbeatTimeout) clearTimeout(heartbeatTimeout);
                }
            };
        }

        // ── Master: Start all audio layers ──
        function startDiveAudio() {
            initDiveAudioCtx();
            if (!diveAudioCtx) return;

            if (diveAudioCtx.state === 'suspended') {
                diveAudioCtx.resume();
            }

            diveAudioEnabled = true;

            // Create all layers
            diveAudioLayers.surfaceWaves = createSurfaceWavesLayer();
            diveAudioLayers.breathing = createBreathingLayer();
            diveAudioLayers.dolphinClicks = createDolphinClicksLayer();
            diveAudioLayers.whaleSong = createWhaleSongLayer();
            diveAudioLayers.deepGroans = createDeepGroansLayer();
            diveAudioLayers.ventCrackles = createVentCracklesLayer();
            diveAudioLayers.bioPings = createBioPingsLayer();
            diveAudioLayers.sonar = createSonarLayer();
            diveAudioLayers.heartbeat = createHeartbeatLayer();

            // Start scheduled layers
            diveAudioLayers.dolphinClicks.schedule();
            diveAudioLayers.whaleSong.schedule();
            diveAudioLayers.deepGroans.schedule();
            diveAudioLayers.ventCrackles.schedule();
            diveAudioLayers.bioPings.schedule();
            diveAudioLayers.sonar.schedule();
            diveAudioLayers.heartbeat.schedule();

            // Fade in master using user's chosen volume
            diveAudioMaster.gain.cancelScheduledValues(diveAudioCtx.currentTime);
            diveAudioMaster.gain.setValueAtTime(diveAudioMaster.gain.value, diveAudioCtx.currentTime);
            diveAudioMaster.gain.linearRampToValueAtTime(diveAudioUserVolume, diveAudioCtx.currentTime + 1.5);
        }

        // ── Master: Stop all audio ──
        function stopDiveAudio() {
            diveAudioEnabled = false;
            if (!diveAudioCtx || !diveAudioMaster) return;

            // Fade out gracefully
            const now = diveAudioCtx.currentTime;
            diveAudioMaster.gain.cancelScheduledValues(now);
            diveAudioMaster.gain.setValueAtTime(diveAudioMaster.gain.value, now);
            diveAudioMaster.gain.linearRampToValueAtTime(0, now + 1.0);

            // Stop heartbeat scheduler explicitly
            if (diveAudioLayers.heartbeat && diveAudioLayers.heartbeat.stop) {
                diveAudioLayers.heartbeat.stop();
            }

            // After fade, disconnect everything
            setTimeout(() => {
                Object.values(diveAudioLayers).forEach(layer => {
                    if (layer.stop) { try { layer.stop(); } catch (e) { } }
                    if (layer.nodes) {
                        layer.nodes.forEach(n => { try { n.stop(); n.disconnect(); } catch (e) { } });
                    }
                    if (layer.gain) { try { layer.gain.disconnect(); } catch (e) { } }
                });
                diveAudioLayers = {};
            }, 1200);
        }

        // ── Update audio mix based on current depth ──
        // Called every frame from updateDiveVisuals
        function updateDiveAudioMix(depth) {
            if (!diveAudioEnabled || !diveAudioCtx || Object.keys(diveAudioLayers).length === 0) return;
            const now = diveAudioCtx.currentTime;
            const d = Math.max(0, Math.min(11000, depth));
            const ramp = 0.15; // smooth transition time

            // ── Surface Waves: full at 0m, fade out by 300m ──
            if (diveAudioLayers.surfaceWaves) {
                const vol = Math.max(0, 1 - d / 300);
                const g = diveAudioLayers.surfaceWaves.gain.gain;
                g.cancelScheduledValues(now);
                g.setValueAtTime(g.value, now);
                g.linearRampToValueAtTime(vol * 0.5, now + ramp);
                // Shift wave filter lower as we go deeper
                if (diveAudioLayers.surfaceWaves.bp) {
                    diveAudioLayers.surfaceWaves.bp.frequency.setValueAtTime(
                        Math.max(100, 400 - d * 1.5), now
                    );
                }
            }

            // ── Breathing: always present but subtler in deep zones ──
            if (diveAudioLayers.breathing) {
                const vol = d < 100 ? 0.12 : (d < 4000 ? 0.18 : 0.1);
                const g = diveAudioLayers.breathing.gain.gain;
                g.cancelScheduledValues(now);
                g.setValueAtTime(g.value, now);
                g.linearRampToValueAtTime(vol, now + ramp);
            }

            // ── Dolphin Clicks: only in sunlight zone (0-250m) ──
            if (diveAudioLayers.dolphinClicks) {
                const vol = d < 200 ? 0.35 * (1 - d / 250) : 0;
                const g = diveAudioLayers.dolphinClicks.gain.gain;
                g.cancelScheduledValues(now);
                g.setValueAtTime(g.value, now);
                g.linearRampToValueAtTime(vol, now + ramp);
            }

            // ── Whale Song: peak in twilight zone (150-1200m), faint beyond ──
            if (diveAudioLayers.whaleSong) {
                let vol = 0;
                if (d < 100) vol = d / 150 * 0.2;
                else if (d < 200) vol = 0.2 + (d - 100) / 100 * 0.3;
                else if (d < 1000) vol = 0.5;
                else if (d < 2000) vol = 0.5 * (1 - (d - 1000) / 1000);
                else vol = 0;
                const g = diveAudioLayers.whaleSong.gain.gain;
                g.cancelScheduledValues(now);
                g.setValueAtTime(g.value, now);
                g.linearRampToValueAtTime(vol, now + ramp);
            }

            // ── Deep Groans: start at midnight zone, peak in abyss ──
            if (diveAudioLayers.deepGroans) {
                let vol = 0;
                if (d > 800 && d < 1500) vol = (d - 800) / 700 * 0.3;
                else if (d >= 1500 && d < 6000) vol = 0.3 + (d - 1500) / 4500 * 0.35;
                else if (d >= 6000) vol = 0.65;
                const g = diveAudioLayers.deepGroans.gain.gain;
                g.cancelScheduledValues(now);
                g.setValueAtTime(g.value, now);
                g.linearRampToValueAtTime(vol, now + ramp);
            }

            // ── Vent Crackles: only near abyssal zone (3500-6500m) ──
            if (diveAudioLayers.ventCrackles) {
                let vol = 0;
                if (d > 3500 && d < 4000) vol = (d - 3500) / 500 * 0.45;
                else if (d >= 4000 && d <= 6000) vol = 0.45;
                else if (d > 6000 && d < 6500) vol = 0.45 * (1 - (d - 6000) / 500);
                const g = diveAudioLayers.ventCrackles.gain.gain;
                g.cancelScheduledValues(now);
                g.setValueAtTime(g.value, now);
                g.linearRampToValueAtTime(vol, now + ramp);
            }

            // ── Bioluminescent Pings: twilight + midnight zones (300-4000m) ──
            if (diveAudioLayers.bioPings) {
                let vol = 0;
                if (d > 200 && d < 500) vol = (d - 200) / 300 * 0.2;
                else if (d >= 500 && d < 3000) vol = 0.2;
                else if (d >= 3000 && d < 4500) vol = 0.2 * (1 - (d - 3000) / 1500);
                const g = diveAudioLayers.bioPings.gain.gain;
                g.cancelScheduledValues(now);
                g.setValueAtTime(g.value, now);
                g.linearRampToValueAtTime(vol, now + ramp);
            }

            // ── Sonar: only in hadal zone (7000m+) ──
            if (diveAudioLayers.sonar) {
                let vol = 0;
                if (d > 6000 && d < 7000) vol = (d - 6000) / 1000 * 0.15;
                else if (d >= 7000) vol = 0.15;
                const g = diveAudioLayers.sonar.gain.gain;
                g.cancelScheduledValues(now);
                g.setValueAtTime(g.value, now);
                g.linearRampToValueAtTime(vol, now + ramp);
            }

            // ── Heartbeat: fades in from 200m, BPM escalates with depth ──
            // Resting heartbeat at surface (72 BPM), rising to panicked 155 BPM at hadal
            if (diveAudioLayers.heartbeat) {
                // Volume: silent at surface, fades in 200-600m, full from 600m onward
                let hbVol = 0;
                if (d < 200) hbVol = 0;
                else if (d < 600) hbVol = (d - 200) / 400 * 0.35;
                else if (d < 2000) hbVol = 0.35;
                else if (d < 6000) hbVol = 0.35 + (d - 2000) / 4000 * 0.35; // builds to 0.7
                else hbVol = 0.7;
                const hbG = diveAudioLayers.heartbeat.gain.gain;
                hbG.cancelScheduledValues(now);
                hbG.setValueAtTime(hbG.value, now);
                hbG.linearRampToValueAtTime(hbVol, now + ramp);

                // BPM curve: 72 at surface → 90 at 1000m → 120 at 4000m → 155 at 11000m
                let bpm = 72;
                if (d < 1000) bpm = 72 + (d / 1000) * 18;
                else if (d < 4000) bpm = 90 + ((d - 1000) / 3000) * 30;
                else if (d < 8000) bpm = 120 + ((d - 4000) / 4000) * 25;
                else bpm = 145 + ((d - 8000) / 3000) * 10;
                diveHeartbeatBpm = Math.round(Math.min(155, bpm));

                // Update the BPM display and heartbeat icon animation speed
                const bpmEl = document.getElementById('dive-heartbeat-bpm');
                if (bpmEl) bpmEl.textContent = diveHeartbeatBpm;
                const hbIcon = document.querySelector('.dive-heartbeat-icon');
                if (hbIcon) {
                    const animDuration = Math.max(0.4, 60 / diveHeartbeatBpm);
                    hbIcon.style.animationDuration = animDuration.toFixed(2) + 's';
                }
                // Color shift: calm green-white → anxious red as BPM rises
                const bpmNorm = Math.max(0, (diveHeartbeatBpm - 72) / 83); // 0 at 72, 1 at 155
                if (bpmEl) {
                    const r = Math.round(80 + bpmNorm * 175);
                    const g2 = Math.round(230 - bpmNorm * 160);
                    const b2 = Math.round(160 - bpmNorm * 100);
                    bpmEl.style.color = `rgba(${r},${g2},${b2},0.9)`;
                }
                // Show/hide heartbeat indicator based on volume
                const hbIndicator = document.getElementById('dive-heartbeat-indicator');
                if (hbIndicator) {
                    if (hbVol > 0.01) hbIndicator.classList.add('visible');
                    else hbIndicator.classList.remove('visible');
                }
            }
        }
        // ═══════════════════════════════════════════════════════════════════════


        function openDiveMode() {
            diveMode = true;
            diveDepth = 0;
            diveTargetDepth = 0;
            lastDiveZone = -1;
            diveAutoDescend = false;
            diveTime = 0;
            diveToggle.classList.add('active');

            diveSavedCamPos = camera.position.clone();
            diveSavedTarget = controls.target.clone();
            diveSavedMaxPolar = controls.maxPolarAngle;
            controls.maxPolarAngle = Math.PI * 0.85;

            buildDiveOverlay();
            initDiveScene();
            updateDiveZoneCard(0);
            updateDiveEnvCard(0);
            diveOverlay.classList.add('open');
        }

        function closeDiveMode() {
            diveMode = false;
            diveAutoDescend = false;
            diveToggle.classList.remove('active');
            diveOverlay.classList.remove('open');
            diveSceneCtx = null;

            // Dispose 3D underwater scene
            if (dive3D) {
                try {
                    // Remove resize listener
                    if (dive3D._onResize) window.removeEventListener('resize', dive3D._onResize);
                    // Dispose renderer
                    dive3D.renderer.dispose();
                    // Traverse and dispose all geometries/materials
                    dive3D.scene.traverse(obj => {
                        if (obj.geometry) obj.geometry.dispose();
                        if (obj.material) {
                            if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
                            else obj.material.dispose();
                        }
                    });
                } catch (e) { console.warn('Dive 3D cleanup:', e); }
                dive3D = null;
            }
            // Remove the 3D canvas element
            const c3d = document.getElementById('dive-3d-canvas');
            if (c3d) c3d.remove();

            // Stop audio when leaving dive mode
            if (diveAudioEnabled) {
                stopDiveAudio();
                diveAudioEnabled = false;
            }

            if (diveSavedCamPos) {
                const restoreCam = () => {
                    const dy = diveSavedCamPos.y - camera.position.y;
                    camera.position.x += (diveSavedCamPos.x - camera.position.x) * 0.08;
                    camera.position.y += dy * 0.08;
                    camera.position.z += (diveSavedCamPos.z - camera.position.z) * 0.08;
                    controls.target.x += (diveSavedTarget.x - controls.target.x) * 0.08;
                    controls.target.y += (diveSavedTarget.y - controls.target.y) * 0.08;
                    controls.target.z += (diveSavedTarget.z - controls.target.z) * 0.08;
                    fogNear.value += (params.fogNear - fogNear.value) * 0.08;
                    fogFar.value += (params.fogFar - fogFar.value) * 0.08;
                    renderer.toneMappingExposure += (0.6 - renderer.toneMappingExposure) * 0.08;
                    if (Math.abs(dy) > 0.1) requestAnimationFrame(restoreCam);
                    else {
                        camera.position.copy(diveSavedCamPos);
                        controls.target.copy(diveSavedTarget);
                        controls.maxPolarAngle = diveSavedMaxPolar;
                        fogNear.value = params.fogNear;
                        fogFar.value = params.fogFar;
                        renderer.toneMappingExposure = 0.6;
                    }
                };
                restoreCam();
            }
        }

        diveToggle.addEventListener('click', () => {
            if (diveMode) closeDiveMode();
            else openDiveMode();
        });

        async function animate() {
            // Update NDBC smooth parameter lerp
            updateNDBCLerp();

            // Animate mini globe
            animateGlobe();

            // Update NDBC panel status text periodically
            const panelStatus = document.getElementById('ndbc-panel-status');
            if (panelStatus) {
                const ago = ndbcState.lastFetch ? Math.round((Date.now() - ndbcState.lastFetch) / 1000) : null;
                const agoText = ago !== null ? (ago < 60 ? `${ago}s ago` : `${Math.round(ago / 60)}m ago`) : '';
                panelStatus.textContent = `Status: ${ndbcState.status}${agoText ? ' · Updated ' + agoText : ''}`;
            }

            // Update deep dive visuals
            if (diveMode) updateDiveVisuals();

            renderer.compute(computeOceanCoarse);
            renderer.compute(computeOceanFine);
            // Skip stats GPU resolve when not visible
            controls.update();



            renderer.render(scene, camera);

            stats.update();
            await renderer.resolveTimestampsAsync('render');
            await renderer.resolveTimestampsAsync('compute');
        }
        renderer.setAnimationLoop(animate);

    </script>
